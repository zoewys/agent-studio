<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经纶 · 单次运行</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KaiTi&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'loom-ink': '#1C1B18',
        'loom-surface': '#252320',
        'loom-hover': '#2D2B27',
        'loom-border': '#3A3730',
        'gold-thread': '#D4A853',
        'jade-ink': '#5B7B6B',
        'silk': '#EBE5D9',
        'parchment': '#9E988B',
        'vermillion': '#C4684A',
        'amber-thread': '#C4964A',
      },
      fontFamily: {
        brand: ['"ZCOOL KaiTi"', 'serif'],
        display: ['"Noto Serif SC"', 'serif'],
        ui: ['Inter', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'monospace'],
      },
      borderRadius: { sm: '2px' },
    }
  }
}
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: #1C1B18; color: #EBE5D9; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #1C1B18; }
::-webkit-scrollbar-thumb { background: #3A3730; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #4A4740; }

.loom-grid {
  background-color: #1C1B18;
  background-image:
    linear-gradient(rgba(212,168,83,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,83,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.woven-border {
  border: 1px solid #3A3730;
  box-shadow: inset 0 0 0 1px rgba(212,168,83,0.06), 0 1px 3px rgba(0,0,0,0.3);
}

.gold-thread-glow {
  border-color: #D4A853 !important;
  box-shadow: inset 0 0 0 1px rgba(212,168,83,0.12), 0 0 10px rgba(212,168,83,0.15);
}

.bamboo-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #3A3730 20%, #3A3730 80%, transparent);
}

.seal-badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL KaiTi', serif; font-size: 10px;
  padding: 2px 8px; border: 1px solid #3A3730;
  color: #9E988B; background: rgba(37,35,32,0.8); letter-spacing: 1px;
  position: relative;
}
.seal-badge::before {
  content: ''; position: absolute; inset: 1px;
  border: 1px solid rgba(212,168,83,0.05); pointer-events: none;
}

@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.gold-shimmer-bg {
  background: linear-gradient(110deg, rgba(212,168,83,0) 40%, rgba(212,168,83,0.05) 50%, rgba(212,168,83,0) 60%);
  background-size: 200% 100%;
  animation: goldShimmer 3s ease-in-out infinite;
}

@keyframes threadTransition {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}
.thread-transition { animation: threadTransition 0.25s ease-out; }

@keyframes pulseDot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.pulse-dot { animation: pulseDot 1.4s ease-in-out infinite; }

input:focus, textarea:focus, select:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── CONFIG PANEL ─────────────────────────
function ConfigPanel({ config, onConfigChange }) {
  const [activeTab, setActiveTab] = useState('model');

  const tabs = [
    { key: 'model', label: '模型' },
    { key: 'prompt', label: '提示词' },
    { key: 'params', label: '参数' },
  ];

  return (
    <div style={{
      width: 280, flexShrink: 0,
      backgroundColor: '#252320',
      borderRight: '1px solid #3A3730',
      display: 'flex', flexDirection: 'column',
      overflowY: 'auto',
    }}>
      <div style={{ padding: '14px 16px', borderBottom: '1px solid #3A3730' }}>
        <span style={{ fontSize: 14, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>运行配置</span>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', borderBottom: '1px solid #3A3730' }}>
        {tabs.map(t => (
          <button key={t.key}
            onClick={() => setActiveTab(t.key)}
            style={{
              flex: 1, padding: '8px 0', fontSize: 12, cursor: 'pointer',
              backgroundColor: activeTab === t.key ? 'rgba(212,168,83,0.06)' : 'transparent',
              border: 'none', borderBottom: activeTab === t.key ? '2px solid #D4A853' : '2px solid transparent',
              color: activeTab === t.key ? '#D4A853' : '#9E988B',
              fontFamily: 'Inter, sans-serif', fontWeight: activeTab === t.key ? 600 : 400,
              transition: 'all 0.15s',
            }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab Content */}
      <div style={{ padding: '14px 16px', flex: 1, display: 'flex', flexDirection: 'column', gap: 14 }}>
        {activeTab === 'model' && (
          <>
            <Field label="Agent">
              <select style={inputStyle} value={config.agent} onChange={e => onConfigChange('agent', e.target.value)}>
                <option value="intent">意图识别 Agent</option>
                <option value="retrieval">知识检索 Agent</option>
                <option value="generate">内容生成 Agent</option>
              </select>
            </Field>
            <Field label="模型">
              <select style={inputStyle} value={config.model} onChange={e => onConfigChange('model', e.target.value)}>
                <option value="gpt4o">GPT-4o</option>
                <option value="claude3">Claude 3.5 Sonnet</option>
                <option value="claude-opus">Claude 4 Opus</option>
                <option value="deepseek">DeepSeek V4</option>
              </select>
            </Field>
            <Field label="API 提供商">
              <select style={inputStyle} value={config.provider} onChange={e => onConfigChange('provider', e.target.value)}>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="custom">自定义端点</option>
              </select>
            </Field>
          </>
        )}

        {activeTab === 'prompt' && (
          <>
            <Field label="系统提示词">
              <textarea style={{...inputStyle, height: 120, resize: 'vertical'}}
                value={config.systemPrompt}
                onChange={e => onConfigChange('systemPrompt', e.target.value)}
                placeholder="输入系统提示词…" />
            </Field>
            <Field label="用户提示词模板">
              <textarea style={{...inputStyle, height: 80, resize: 'vertical'}}
                value={config.userPrompt}
                onChange={e => onConfigChange('userPrompt', e.target.value)}
                placeholder="输入用户提示词模板…" />
            </Field>
          </>
        )}

        {activeTab === 'params' && (
          <>
            <Field label="温度">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <input type="range" min="0" max="2" step="0.1" value={config.temperature}
                  onChange={e => onConfigChange('temperature', parseFloat(e.target.value))}
                  style={{ flex: 1, accentColor: '#D4A853' }} />
                <span style={{ fontSize: 12, color: '#D4A853', fontFamily: 'JetBrains Mono, monospace', minWidth: 28 }}>{config.temperature}</span>
              </div>
            </Field>
            <Field label="最大 Token">
              <input style={inputStyle} type="number" value={config.maxTokens}
                onChange={e => onConfigChange('maxTokens', parseInt(e.target.value))} />
            </Field>
            <Field label="Top P">
              <input style={inputStyle} type="number" value={config.topP} min="0" max="1" step="0.05"
                onChange={e => onConfigChange('topP', parseFloat(e.target.value))} />
            </Field>
          </>
        )}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label style={{ display: 'block', fontSize: 11, color: '#9E988B', marginBottom: 4, fontWeight: 500, fontFamily: 'Inter, sans-serif' }}>
        {label}
      </label>
      {children}
    </div>
  );
}

const inputStyle = {
  width: '100%', padding: '7px 10px', fontSize: 12,
  backgroundColor: '#1C1B18', border: '1px solid #3A3730',
  color: '#EBE5D9', borderRadius: 2, fontFamily: 'Inter, sans-serif',
};

// ─── TRANSCRIPT ───────────────────────────
function Transcript({ messages, isStreaming }) {
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  return (
    <div className="loom-grid" style={{
      flex: 1, overflowY: 'auto', padding: '20px 24px',
      display: 'flex', flexDirection: 'column', gap: 16,
    }}>
      {messages.length === 0 && (
        <div style={{
          flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
          flexDirection: 'column', gap: 8,
        }}>
          <div style={{ width: 40, height: 40, borderRadius: '50%', border: '1px solid #3A3730', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontSize: 18, color: '#D4A853' }}>◆</span>
          </div>
          <span style={{ fontSize: 13, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>配置参数后，点击运行开始对话</span>
        </div>
      )}

      {messages.map((msg, i) => (
        <div key={i} className={`thread-transition ${msg.role === 'user' ? '' : 'woven-border'}`}
          style={{
            maxWidth: msg.role === 'user' ? '60%' : '85%',
            alignSelf: msg.role === 'user' ? 'flex-end' : 'flex-start',
            padding: msg.role === 'user' ? '10px 14px' : '14px 16px',
            backgroundColor: msg.role === 'user' ? 'rgba(212,168,83,0.08)' : '#252320',
            border: msg.role === 'user' ? '1px solid rgba(212,168,83,0.2)' : undefined,
            fontSize: 13,
            lineHeight: 1.7,
            color: '#EBE5D9',
            fontFamily: msg.role === 'user' ? 'Inter, sans-serif' : "'Noto Serif SC', serif",
          }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: msg.role === 'assistant' ? 8 : 0 }}>
            <span style={{
              fontSize: 10, fontWeight: 600, color: msg.role === 'user' ? '#C4964A' : '#5B7B6B',
              fontFamily: 'Inter, sans-serif', textTransform: 'uppercase',
            }}>
              {msg.role === 'user' ? '用户' : msg.agentName}
            </span>
            {msg.model && <span className="seal-badge" style={{ fontSize: 8 }}>{msg.model}</span>}
            {msg.tokens && (
              <span style={{ fontSize: 10, color: '#9E988B', fontFamily: 'JetBrains Mono, monospace', marginLeft: 'auto' }}>
                {msg.tokens} tokens
              </span>
            )}
          </div>
          <div>{msg.content}</div>
        </div>
      ))}

      {isStreaming && (
        <div style={{
          maxWidth: '85%', alignSelf: 'flex-start', padding: '14px 16px',
          backgroundColor: '#252320', border: '1px solid #3A3730', fontSize: 13,
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          <span className="pulse-dot" style={{ width: 6, height: 6, borderRadius: '50%', background: '#D4A853', display: 'inline-block' }} />
          <span style={{ color: '#9E988B', fontStyle: 'italic' }}>生成中…</span>
        </div>
      )}
      <div ref={bottomRef} />
    </div>
  );
}

// ─── COMPOSER BAR ─────────────────────────
function ComposerBar({ onSend, disabled }) {
  const [input, setInput] = useState('');

  const handleSend = () => {
    if (!input.trim() || disabled) return;
    onSend(input.trim());
    setInput('');
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  return (
    <div style={{
      borderTop: '1px solid #3A3730',
      backgroundColor: '#252320',
      padding: '10px 16px',
    }}>
      <div className="woven-border" style={{
        display: 'flex', alignItems: 'flex-end', gap: 8,
        padding: '6px 8px', backgroundColor: '#1C1B18',
        transition: 'border-color 0.2s',
      }}>
        <button style={{
          width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: 'transparent', border: 'none', color: '#9E988B', cursor: 'pointer', fontSize: 16,
        }} title="附件">📎</button>
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder="输入消息… (Enter 发送, Shift+Enter 换行)"
          disabled={disabled}
          style={{
            flex: 1, padding: '8px 4px', fontSize: 13,
            backgroundColor: 'transparent', border: 'none',
            color: '#EBE5D9', resize: 'none', outline: 'none',
            fontFamily: 'Inter, sans-serif', lineHeight: 1.5,
            maxHeight: 120, minHeight: 20,
          }}
          rows={1}
          onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
        />
        <button
          onClick={handleSend}
          disabled={disabled || !input.trim()}
          style={{
            width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
            backgroundColor: (disabled || !input.trim()) ? 'transparent' : 'rgba(212,168,83,0.12)',
            border: (disabled || !input.trim()) ? '1px solid #3A3730' : '1px solid rgba(212,168,83,0.3)',
            color: (disabled || !input.trim()) ? '#3A3730' : '#D4A853',
            cursor: (disabled || !input.trim()) ? 'not-allowed' : 'pointer',
            fontSize: 14, transition: 'all 0.15s',
          }}>
          ↑
        </button>
      </div>
    </div>
  );
}

// ─── HEADER ───────────────────────────────
function Header({ onRun, isRunning, onClear }) {
  return (
    <div style={{
      height: 44, display: 'flex', alignItems: 'center', padding: '0 16px',
      borderBottom: '1px solid #3A3730', backgroundColor: '#252320', gap: 10,
    }}>
      <span style={{ fontSize: 18, fontFamily: '"ZCOOL KaiTi", serif', color: '#D4A853', fontWeight: 700 }}>经纶</span>
      <span style={{ fontSize: 12, color: '#9E988B' }}>/</span>
      <span style={{ fontSize: 13, color: '#EBE5D9', fontWeight: 500, fontFamily: 'Inter, sans-serif' }}>单次运行</span>
      <div className="bamboo-divider" style={{ width: 1, height: 20, background: 'linear-gradient(180deg, transparent, #3A3730, transparent)' }} />
      <button
        onClick={onRun}
        style={{
          padding: '4px 14px', fontSize: 12, cursor: 'pointer', fontWeight: 500, fontFamily: 'Inter, sans-serif',
          backgroundColor: isRunning ? 'rgba(196,104,74,0.12)' : 'rgba(91,123,107,0.1)',
          border: isRunning ? '1px solid rgba(196,104,74,0.3)' : '1px solid rgba(91,123,107,0.25)',
          color: isRunning ? '#C4684A' : '#5B7B6B', transition: 'all 0.15s',
        }}>
        {isRunning ? '⏹ 停止' : '▶ 运行'}
      </button>
      <button onClick={onClear} style={{
        padding: '4px 10px', fontSize: 11, cursor: 'pointer',
        backgroundColor: 'transparent', border: '1px solid #3A3730', color: '#9E988B',
        fontFamily: 'Inter, sans-serif', transition: 'all 0.15s',
      }}>
        清空对话
      </button>
      <div style={{ flex: 1 }} />
      {isRunning && (
        <span style={{ fontSize: 11, color: '#C4964A', display: 'flex', alignItems: 'center', gap: 5, fontFamily: 'Inter, sans-serif' }}>
          <span className="pulse-dot" style={{ width: 5, height: 5, borderRadius: '50%', background: '#C4964A', display: 'inline-block' }} />
          运行中
        </span>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────
function App() {
  const [config, setConfig] = useState({
    agent: 'intent',
    model: 'gpt4o',
    provider: 'openai',
    systemPrompt: '你是一个专业的AI助手。',
    userPrompt: '请回答以下问题：{{query}}',
    temperature: 0.7,
    maxTokens: 4096,
    topP: 0.9,
  });
  const [messages, setMessages] = useState([]);
  const [isRunning, setIsRunning] = useState(false);
  const [isStreaming, setIsStreaming] = useState(false);

  const handleConfigChange = (key, value) => {
    setConfig(prev => ({ ...prev, [key]: value }));
  };

  const handleSend = (text) => {
    const userMsg = { role: 'user', content: text };
    setMessages(prev => [...prev, userMsg]);
    setIsRunning(true);
    setIsStreaming(true);

    // Simulate streaming response
    const responses = {
      intent: '我已理解您的意图。根据您的问题，我将执行以下步骤：\n\n1. 分析输入内容的语义结构\n2. 匹配最佳处理流程\n3. 路由至对应 Agent',
      retrieval: '检索完成。在知识库中找到 3 条相关内容：\n\n- 文档 A：相关度 94%\n- 文档 B：相关度 87%\n- 文档 C：相关度 76%',
      generate: '根据您的要求，以下是我的回复：\n\n您好！这是一个演示单次运行功能的示例回复。在经纶系统中，您可以配置 Agent、选择模型、调整参数，然后通过对话界面测试单次执行效果。\n\n实际使用时，系统将调用您选择的 API 提供商接口，返回真实的生成结果。',
    };

    setTimeout(() => {
      setIsStreaming(false);
      const resp = responses[config.agent] || responses.generate;
      setMessages(prev => [...prev, {
        role: 'assistant',
        agentName: config.agent === 'intent' ? '意图识别 Agent' : config.agent === 'retrieval' ? '知识检索 Agent' : '内容生成 Agent',
        model: config.model === 'gpt4o' ? 'GPT-4o' : config.model === 'claude3' ? 'Claude 3.5 Sonnet' : config.model === 'deepseek' ? 'DeepSeek V4' : 'Claude 4 Opus',
        content: resp,
        tokens: Math.floor(Math.random() * 300) + 100,
      }]);
      setIsRunning(false);
    }, 2000);
  };

  const handleClear = () => setMessages([]);

  const handleRun = () => {
    if (isRunning) { setIsRunning(false); setIsStreaming(false); return; }
    handleSend('你好，请展示你的能力。');
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header onRun={handleRun} isRunning={isRunning} onClear={handleClear} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <ConfigPanel config={config} onConfigChange={handleConfigChange} />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <Transcript messages={messages} isStreaming={isStreaming} />
          <ComposerBar onSend={handleSend} disabled={isStreaming} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
