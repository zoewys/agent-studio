<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经纶 · 设置</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KaiTi&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'loom-ink': '#1C1B18',
        'loom-surface': '#252320',
        'loom-hover': '#2D2B27',
        'loom-border': '#3A3730',
        'gold-thread': '#D4A853',
        'jade-ink': '#5B7B6B',
        'silk': '#EBE5D9',
        'parchment': '#9E988B',
        'vermillion': '#C4684A',
        'amber-thread': '#C4964A',
      },
      fontFamily: {
        brand: ['"ZCOOL KaiTi"', 'serif'],
        display: ['"Noto Serif SC"', 'serif'],
        ui: ['Inter', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'monospace'],
      },
      borderRadius: { sm: '2px' },
    }
  }
}
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: #1C1B18; color: #EBE5D9; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #1C1B18; }
::-webkit-scrollbar-thumb { background: #3A3730; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #4A4740; }

.loom-grid {
  background-color: #1C1B18;
  background-image:
    linear-gradient(rgba(212,168,83,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,83,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.woven-border {
  border: 1px solid #3A3730;
  box-shadow: inset 0 0 0 1px rgba(212,168,83,0.06), 0 1px 3px rgba(0,0,0,0.3);
}

.gold-thread-glow {
  border-color: #D4A853 !important;
  box-shadow: inset 0 0 0 1px rgba(212,168,83,0.12), 0 0 10px rgba(212,168,83,0.15);
}

.bamboo-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #3A3730 20%, #3A3730 80%, transparent);
}

.seal-badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL KaiTi', serif; font-size: 10px;
  padding: 2px 8px; border: 1px solid #3A3730;
  color: #9E988B; background: rgba(37,35,32,0.8); letter-spacing: 1px;
  position: relative;
}
.seal-badge::before {
  content: ''; position: absolute; inset: 1px;
  border: 1px solid rgba(212,168,83,0.05); pointer-events: none;
}

@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.gold-shimmer-bg {
  background: linear-gradient(110deg, rgba(212,168,83,0) 40%, rgba(212,168,83,0.05) 50%, rgba(212,168,83,0) 60%);
  background-size: 200% 100%;
  animation: goldShimmer 3s ease-in-out infinite;
}

@keyframes threadTransition {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}
.thread-transition { animation: threadTransition 0.2s ease-out; }

.focus-glow:focus { border-color: #D4A853; box-shadow: 0 0 0 1px rgba(212,168,83,0.2); }
input:focus, textarea:focus, select:focus { outline: none; }

@keyframes pulseDot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.pulse-dot { animation: pulseDot 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ─── NAV ITEMS ────────────────────────────
const NAV_ITEMS = [
  { id: 'providers', label: 'API 提供商', icon: '◇' },
  { id: 'general', label: '通用设置', icon: '○' },
  { id: 'appearance', label: '外观', icon: '◎' },
  { id: 'shortcuts', label: '快捷键', icon: '⌨' },
  { id: 'notifications', label: '通知', icon: '◉' },
  { id: 'about', label: '关于', icon: '◆' },
];

// ─── PROVIDERS DATA ───────────────────────
const INITIAL_PROVIDERS = [
  {
    id: 'openai', name: 'OpenAI', status: 'connected', icon: '◈',
    models: ['GPT-4o', 'GPT-4 Turbo', 'GPT-3.5 Turbo'],
    apiKey: 'sk-****a8f3',
    endpoint: 'https://api.openai.com/v1',
    lastChecked: '2026-06-13 10:23',
  },
  {
    id: 'anthropic', name: 'Anthropic', status: 'connected', icon: '◈',
    models: ['Claude 4 Opus', 'Claude 3.5 Sonnet', 'Claude 3 Haiku'],
    apiKey: 'sk-ant-****c2d1',
    endpoint: 'https://api.anthropic.com/v1',
    lastChecked: '2026-06-13 10:24',
  },
  {
    id: 'deepseek', name: 'DeepSeek', status: 'disconnected', icon: '◇',
    models: ['DeepSeek V4', 'DeepSeek Coder'],
    apiKey: '',
    endpoint: 'https://api.deepseek.com/v1',
    lastChecked: '从未',
  },
  {
    id: 'custom', name: '自定义端点', status: 'disconnected', icon: '○',
    models: [],
    apiKey: '',
    endpoint: '',
    lastChecked: '从未',
  },
];

// ─── SETTINGS NAV ─────────────────────────
function SettingsNav({ activeSection, onSelect }) {
  return (
    <div style={{
      width: 200, flexShrink: 0,
      backgroundColor: '#252320',
      borderRight: '1px solid #3A3730',
      display: 'flex', flexDirection: 'column',
      padding: '8px 0',
    }}>
      {NAV_ITEMS.map(item => {
        const isActive = activeSection === item.id;
        return (
          <button key={item.id}
            onClick={() => onSelect(item.id)}
            style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 18px', margin: '1px 8px',
              backgroundColor: isActive ? 'rgba(212,168,83,0.06)' : 'transparent',
              border: 'none', borderLeft: isActive ? '2px solid #D4A853' : '2px solid transparent',
              color: isActive ? '#D4A853' : '#9E988B',
              cursor: 'pointer', fontSize: 13, fontWeight: isActive ? 600 : 400,
              fontFamily: 'Inter, sans-serif', textAlign: 'left',
              transition: 'all 0.15s',
            }}
            onMouseEnter={e => { if (!isActive) { e.currentTarget.style.backgroundColor = '#2D2B27'; e.currentTarget.style.color = '#EBE5D9'; } }}
            onMouseLeave={e => { if (!isActive) { e.currentTarget.style.backgroundColor = 'transparent'; e.currentTarget.style.color = '#9E988B'; } }}
          >
            <span style={{ fontSize: 14 }}>{item.icon}</span>
            <span>{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── PROVIDER CARD ────────────────────────
function ProviderCard({ provider, isExpanded, onToggle, onSave, onTest, onDelete }) {
  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState({
    apiKey: provider.apiKey,
    endpoint: provider.endpoint,
  });

  const handleSave = () => {
    onSave(provider.id, form);
    setEditMode(false);
  };

  const statusColor = provider.status === 'connected' ? '#5B7B6B' : '#3A3730';
  const statusText = provider.status === 'connected' ? '已连接' : '未连接';

  return (
    <div className={`woven-border thread-transition ${isExpanded ? 'gold-thread-glow' : ''}`}
      style={{
        backgroundColor: '#252320',
        overflow: 'hidden',
      }}>
      {/* Card Header */}
      <div
        onClick={() => onToggle(provider.id)}
        style={{
          display: 'flex', alignItems: 'center', padding: '14px 18px', cursor: 'pointer',
          gap: 12, userSelect: 'none',
        }}>
        <span style={{ fontSize: 18, color: provider.status === 'connected' ? '#D4A853' : '#3A3730' }}>{provider.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>{provider.name}</span>
            <span className="seal-badge" style={{
              borderColor: statusColor, color: statusColor, fontSize: 9,
            }}>
              {statusText}
            </span>
          </div>
          <div style={{ fontSize: 11, color: '#9E988B', marginTop: 2, fontFamily: 'Inter, sans-serif' }}>
            {provider.models.length} 个模型 · 最后检查: {provider.lastChecked}
          </div>
        </div>
        <span style={{ color: '#9E988B', fontSize: 12, transition: 'transform 0.2s', transform: isExpanded ? 'rotate(180deg)' : 'none' }}>
          ▼
        </span>
      </div>

      {/* Expanded Content */}
      {isExpanded && (
        <div style={{ borderTop: '1px solid #3A3730', padding: '16px 18px' }}>
          <div className="bamboo-divider" style={{ marginBottom: 16, marginTop: -16 }} />

          {/* API Key */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>API Key</label>
            <div style={{ display: 'flex', gap: 8 }}>
              <input className="focus-glow" style={{
                ...inputStyle, flex: 1,
                borderColor: editMode ? 'rgba(212,168,83,0.3)' : '#3A3730',
              }}
                type="password"
                value={editMode ? form.apiKey : provider.apiKey}
                onChange={e => setForm(prev => ({ ...prev, apiKey: e.target.value }))}
                disabled={!editMode}
                placeholder="输入 API Key…" />
              <button onClick={() => setEditMode(!editMode)} style={smallBtnStyle}>
                {editMode ? '取消' : '编辑'}
              </button>
            </div>
          </div>

          {/* Endpoint */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>端点 URL</label>
            <input className="focus-glow" style={{
              ...inputStyle,
              borderColor: editMode ? 'rgba(212,168,83,0.3)' : '#3A3730',
            }}
              value={editMode ? form.endpoint : provider.endpoint}
              onChange={e => setForm(prev => ({ ...prev, endpoint: e.target.value }))}
              disabled={!editMode}
              placeholder="https://api.example.com/v1" />
          </div>

          {/* Models */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>可用模型</label>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {provider.models.length > 0 ? provider.models.map(m => (
                <span key={m} className="seal-badge" style={{ fontSize: 10, color: '#5B7B6B', borderColor: 'rgba(91,123,107,0.25)' }}>
                  {m}
                </span>
              )) : (
                <span style={{ fontSize: 12, color: '#9E988B', fontStyle: 'italic' }}>暂无模型</span>
              )}
            </div>
          </div>

          {/* Actions */}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <button onClick={() => onTest(provider.id)} style={{
              ...smallBtnStyle, color: provider.status === 'connected' ? '#5B7B6B' : '#C4684A',
              borderColor: provider.status === 'connected' ? 'rgba(91,123,107,0.25)' : 'rgba(196,104,74,0.25)',
            }}>
              {provider.status === 'connected' ? '✓ 测试连接' : '测试连接'}
            </button>
            {editMode && (
              <button onClick={handleSave} style={{...smallBtnStyle, backgroundColor: 'rgba(212,168,83,0.1)', borderColor: 'rgba(212,168,83,0.25)', color: '#D4A853'}}>
                保存
              </button>
            )}
            <button onClick={() => onDelete(provider.id)} style={{...smallBtnStyle, color: '#C4684A', borderColor: 'rgba(196,104,74,0.2)'}}>
              删除
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const labelStyle = { display: 'block', fontSize: 11, color: '#9E988B', marginBottom: 5, fontWeight: 500, fontFamily: 'Inter, sans-serif' };
const inputStyle = {
  width: '100%', padding: '7px 10px', fontSize: 12,
  backgroundColor: '#1C1B18', border: '1px solid #3A3730',
  color: '#EBE5D9', borderRadius: 2, fontFamily: 'Inter, sans-serif',
};
const smallBtnStyle = {
  padding: '5px 12px', fontSize: 11, cursor: 'pointer', fontWeight: 500, fontFamily: 'Inter, sans-serif',
  backgroundColor: 'transparent', border: '1px solid #3A3730', color: '#9E988B',
  transition: 'all 0.15s', whiteSpace: 'nowrap',
};

// ─── PROVIDERS PANEL ──────────────────────
function ProvidersPanel({ providers, onSave, onTest, onDelete, onAdd }) {
  const [expandedId, setExpandedId] = useState('openai');

  const handleToggle = (id) => {
    setExpandedId(prev => prev === id ? null : id);
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px' }}>
      <div style={{ maxWidth: 680, margin: '0 auto' }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <div>
            <h2 style={{ fontSize: 16, fontWeight: 600, color: '#EBE5D9', marginBottom: 4, fontFamily: 'Inter, sans-serif' }}>API 提供商</h2>
            <p style={{ fontSize: 12, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>管理 AI 模型 API 的连接配置</p>
          </div>
          <button onClick={onAdd} style={{
            padding: '7px 16px', fontSize: 12, cursor: 'pointer', fontWeight: 500, fontFamily: 'Inter, sans-serif',
            backgroundColor: 'rgba(212,168,83,0.08)', border: '1px solid rgba(212,168,83,0.25)',
            color: '#D4A853', transition: 'all 0.15s',
          }}>
            + 添加提供商
          </button>
        </div>

        <div className="bamboo-divider" style={{ marginBottom: 20 }} />

        {/* Summary Stats */}
        <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
          <div className="woven-border" style={{ flex: 1, padding: '12px 16px', backgroundColor: '#252320', textAlign: 'center' }}>
            <div style={{ fontSize: 20, fontWeight: 700, color: '#D4A853', fontFamily: 'JetBrains Mono, monospace' }}>
              {providers.filter(p => p.status === 'connected').length}
            </div>
            <div style={{ fontSize: 11, color: '#9E988B', marginTop: 2, fontFamily: 'Inter, sans-serif' }}>已连接</div>
          </div>
          <div className="woven-border" style={{ flex: 1, padding: '12px 16px', backgroundColor: '#252320', textAlign: 'center' }}>
            <div style={{ fontSize: 20, fontWeight: 700, color: '#9E988B', fontFamily: 'JetBrains Mono, monospace' }}>
              {providers.reduce((sum, p) => sum + p.models.length, 0)}
            </div>
            <div style={{ fontSize: 11, color: '#9E988B', marginTop: 2, fontFamily: 'Inter, sans-serif' }}>可用模型</div>
          </div>
          <div className="woven-border" style={{ flex: 1, padding: '12px 16px', backgroundColor: '#252320', textAlign: 'center' }}>
            <div style={{ fontSize: 20, fontWeight: 700, color: '#C4684A', fontFamily: 'JetBrains Mono, monospace' }}>
              {providers.filter(p => p.status === 'disconnected').length}
            </div>
            <div style={{ fontSize: 11, color: '#9E988B', marginTop: 2, fontFamily: 'Inter, sans-serif' }}>未连接</div>
          </div>
        </div>

        {/* Provider Cards */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {providers.map(p => (
            <ProviderCard
              key={p.id}
              provider={p}
              isExpanded={expandedId === p.id}
              onToggle={handleToggle}
              onSave={onSave}
              onTest={onTest}
              onDelete={onDelete}
            />
          ))}
        </div>

        {/* Info Footer */}
        <div className="woven-border" style={{ marginTop: 20, padding: '14px 16px', backgroundColor: 'rgba(37,35,32,0.5)' }}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <span style={{ fontSize: 16 }}>ℹ</span>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#EBE5D9', marginBottom: 4, fontFamily: 'Inter, sans-serif' }}>关于 API 提供商</div>
              <p style={{ fontSize: 11, color: '#9E988B', lineHeight: 1.7, fontFamily: 'Inter, sans-serif' }}>
                API 密钥经过加密存储，仅用于向所选提供商发送请求。请确保您的 API 密钥具有足够的配额和权限。
                添加自定义端点后，需确保其兼容 OpenAI API 格式。
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PLACEHOLDER PANELS ──────────────────
function PlaceholderPanel({ section }) {
  const titles = {
    general: '通用设置',
    appearance: '外观',
    shortcuts: '快捷键',
    notifications: '通知',
    about: '关于',
  };
  return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 10 }}>
      <div style={{ width: 48, height: 48, border: '1px solid #3A3730', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: 20, color: '#D4A853' }}>◆</span>
      </div>
      <span style={{ fontSize: 15, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>{titles[section] || section}</span>
      <span style={{ fontSize: 11, color: '#3A3730', fontFamily: 'Inter, sans-serif' }}>此面板正在开发中</span>
    </div>
  );
}

// ─── HEADER ───────────────────────────────
function Header() {
  return (
    <div style={{
      height: 44, display: 'flex', alignItems: 'center', padding: '0 16px',
      borderBottom: '1px solid #3A3730', backgroundColor: '#252320', gap: 10,
    }}>
      <span style={{ fontSize: 18, fontFamily: '"ZCOOL KaiTi", serif', color: '#D4A853', fontWeight: 700 }}>经纶</span>
      <span style={{ fontSize: 12, color: '#9E988B' }}>/</span>
      <span style={{ fontSize: 13, color: '#EBE5D9', fontWeight: 500, fontFamily: 'Inter, sans-serif' }}>设置</span>
      <div style={{ flex: 1 }} />
      <span className="seal-badge">v1.0.0</span>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState('providers');
  const [providers, setProviders] = useState(INITIAL_PROVIDERS);

  const handleProviderSave = (id, form) => {
    setProviders(prev => prev.map(p => p.id === id ? { ...p, apiKey: form.apiKey, endpoint: form.endpoint } : p));
  };

  const handleProviderTest = (id) => {
    setProviders(prev => prev.map(p => {
      if (p.id !== id) return p;
      const connected = p.status === 'disconnected';
      return {
        ...p,
        status: connected ? 'connected' : p.status,
        lastChecked: connected ? new Date().toISOString().slice(0, 16).replace('T', ' ') : p.lastChecked,
      };
    }));
  };

  const handleProviderDelete = (id) => {
    setProviders(prev => prev.filter(p => p.id !== id));
  };

  const handleProviderAdd = () => {
    const newId = 'provider-' + Date.now();
    setProviders(prev => [...prev, {
      id: newId, name: '新提供商', status: 'disconnected', icon: '○',
      models: [], apiKey: '', endpoint: '', lastChecked: '从未',
    }]);
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <SettingsNav activeSection={activeSection} onSelect={setActiveSection} />
        {activeSection === 'providers' ? (
          <ProvidersPanel
            providers={providers}
            onSave={handleProviderSave}
            onTest={handleProviderTest}
            onDelete={handleProviderDelete}
            onAdd={handleProviderAdd}
          />
        ) : (
          <PlaceholderPanel section={activeSection} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
