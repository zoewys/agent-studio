<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — Run Detail — 经纶 The Weaver's Study</title>

  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KaiTi&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'loom-ink':'#1C1B18','loom-surface':'#252320','loom-hover':'#2D2B27','loom-border':'#3A3730','loom-border-warm':'#3F3B33',
            'gold-thread':'#D4A853','gold-light':'#E0C478','gold-dim':'#B8953A',
            'jade-ink':'#5B7B6B','jade-light':'#7D9E8D',
            'vermillion':'#C4684A','vermillion-light':'#D4856B','amber-thread':'#C4964A',
            'silk':'#EBE5D9','silk-dim':'#C5BFAF','parchment':'#9E988B',
          },
          fontFamily: {
            brand:['"ZCOOL KaiTi"','"KaiTi"','serif'],
            display:['"Noto Serif SC"','"Source Han Serif SC"','Georgia','serif'],
            ui:['"Inter"','system-ui','sans-serif'],
            mono:['"JetBrains Mono"','monospace'],
          },
          animation: {
            'weave':'weave 3s ease-in-out infinite','weave-slow':'weave 5s ease-in-out infinite',
            'thread-slide':'threadSlide 3s linear infinite',
            'seal-stamp':'sealStamp 0.35s cubic-bezier(0.34,1.56,0.64,1)',
            'scroll-reveal':'scrollReveal 0.4s ease-out',
            'gold-shimmer':'goldShimmer 4s ease-in-out infinite',
          },
          keyframes: {
            weave:{'0%,100%':{opacity:'0.7',transform:'scale(1)'},'50%':{opacity:'1',transform:'scale(1.03)'}},
            threadSlide:{'0%':{strokeDashoffset:'40'},'100%':{strokeDashoffset:'0'}},
            sealStamp:{'0%':{transform:'scale(1.2)',opacity:'0'},'60%':{transform:'scale(0.96)',opacity:'0.9'},'100%':{transform:'scale(1)',opacity:'1'}},
            scrollReveal:{'0%':{opacity:'0',transform:'translateY(5px)'},'100%':{opacity:'1',transform:'translateY(0)'}},
            goldShimmer:{'0%,100%':{backgroundPosition:'0% 50%'},'50%':{backgroundPosition:'100% 50%'}},
          },
        }
      }
    }
  </script>

  <style>
    *{scrollbar-width:thin;scrollbar-color:rgba(212,168,83,0.12) transparent;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.1);border-radius:2px;}

    /* 经纬网格 */
    .loom-grid::before{
      content:'';position:absolute;inset:0;opacity:0.018;pointer-events:none;z-index:0;
      background-image:linear-gradient(0deg,rgba(212,168,83,0.3) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,83,0.2) 1px,transparent 1px);
      background-size:40px 40px;
    }
    .loom-grid-dense::before{background-size:24px 24px;opacity:0.015;}

    /* 金线发光 */
    .gold-thread-glow{box-shadow:0 0 0 1px rgba(212,168,83,0.1),0 0 12px rgba(212,168,83,0.04);}
    .gold-thread-strong{box-shadow:0 0 0 1px rgba(212,168,83,0.25),0 0 20px rgba(212,168,83,0.08);}

    /* 金线流动 */
    .gold-shimmer-bg{
      background:linear-gradient(110deg,rgba(212,168,83,0.06) 0%,rgba(212,168,83,0.14) 25%,rgba(212,168,83,0.06) 50%,rgba(212,168,83,0.14) 75%,rgba(212,168,83,0.06) 100%);
      background-size:200% 100%;animation:goldShimmer 4s ease-in-out infinite;
    }

    /* 织边边框 */
    .woven-border{border:1px solid rgba(212,168,83,0.08);position:relative;}
    .woven-border::before{content:'';position:absolute;inset:3px;border:1px solid rgba(212,168,83,0.03);pointer-events:none;}

    /* 竹简分隔线 */
    .bamboo-divider{height:1px;background:linear-gradient(90deg,transparent 0%,rgba(212,168,83,0.06) 25%,rgba(212,168,83,0.15) 50%,rgba(212,168,83,0.06) 75%,transparent 100%);}

    /* 事件类型左边框 */
    .evt-think{border-left:2px solid #9E988B;}
    .evt-tool{border-left:2px solid #D4A853;}
    .evt-text{border-left:2px solid #5B7B6B;}
    .evt-error{border-left:2px solid #C4684A;}
    .evt-result{border-left:2px solid #6B7B8B;}

    /* 过渡 */
    .thread-transition{transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}

    /* 织梭光标 */
    .shuttle-cursor{position:relative;}
  </style>
</head>
<body class="bg-loom-ink text-silk font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    // ─── DATA ───
    const STEPS = [
      { id:1,label:'分析',status:'done',agent:'Code Reviewer',desc:'分析需求' },
      { id:2,label:'设计',status:'done',agent:'Architect',desc:'设计方案' },
      { id:3,label:'前端',status:'running',agent:'Frontend Dev',desc:'实现前端',parallel:[
        { id:'3a',label:'组件',status:'running' },{ id:'3b',label:'样式',status:'running' },{ id:'3c',label:'测试',status:'pending' }
      ]},
      { id:4,label:'后端',status:'pending',agent:'Backend Dev',desc:'实现后端' },
      { id:5,label:'审查',status:'pending',agent:'QA Reviewer',desc:'最终审查' },
    ];

    const RUNS = [
      { name:'Feature: Auth System',status:'completed',time:'2分钟前',duration:'4分32秒',agents:4,tokens:'8.2k'},
      { name:'Bugfix: Memory Leak',status:'running',time:'现在',duration:'1分15秒',agents:2,tokens:'3.1k'},
      { name:'Refactor: API Layer',status:'completed',time:'1小时前',duration:'12分08秒',agents:5,tokens:'24.6k'},
      { name:'Code Review: PR #142',status:'error',time:'3小时前',duration:'2分41秒',agents:1,tokens:'1.8k'},
      { name:'Deploy: v2.1.0',status:'aborted',time:'5小时前',duration:'45秒',agents:3,tokens:'0.5k'},
      { name:'Test: E2E Suite',status:'completed',time:'1天前',duration:'8分20秒',agents:2,tokens:'15.1k'},
    ];

    const TRANSCRIPT = [
      { type:'think',content:'分析需求脉络：JWT token 需添加自动 refresh 机制...',time:'12:03:01' },
      { type:'tool',content:'读取文件: src/auth/token.ts',time:'12:03:02' },
      { type:'result',content:'文件长度: 156 行',time:'12:03:02' },
      { type:'think',content:'当前实现缺少 refresh 逻辑，需添加 refreshToken 函数...',time:'12:03:05' },
      { type:'tool',content:'编辑文件: src/auth/token.ts',time:'12:03:08' },
      { type:'text',content:'实现完成 ✓\n\n新增内容：\n• refreshToken() — 过期前 5 分钟自动刷新\n• 指数退避重试，最多 3 次\n• 添加 28 行，移除 3 行\n• 所有已有测试通过',time:'12:03:15' },
    ];

    const ARTIFACTS = [
      { name:'token.ts',type:'ts',size:'+28/−3' },
      { name:'test_token.ts',type:'ts',size:'+42' },
      { name:'CHANGELOG.md',type:'md',size:'+5' },
    ];

    const MEMORIES = [
      { text:'JWT 密钥存储在环境变量中',strength:0.85,cat:'preference',scope:'项目' },
      { text:'上次 auth 重构使用了 bcrypt',strength:0.72,cat:'knowledge',scope:'全局' },
      { text:'避免使用过期的 jsonwebtoken 版本',strength:0.91,cat:'avoidance',scope:'全局' },
    ];

    // ─── ICONS ───
    const Svg = {
      Search: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="6" cy="6" r="4"/><path d="M9.5 9.5L12.5 12.5"/></svg>,
      ChevronDown: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 5L7 9l4-4"/></svg>,
      Shuttle: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M3 7L11 7"/><path d="M6 4L11 7l-5 3"/></svg>,
      Send: <svg className="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M2 2l12 6-12 6 3-6z"/></svg>,
      Memory: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="7" r="5"/><circle cx="7" cy="7" r="2"/><path d="M7 2V1M7 13v-1M2 7H1M13 7h-1"/></svg>,
    };

    // ─── COMPONENTS ───

    function StatusBadge({ status }) {
      const m={
        running:{bg:'bg-amber-thread/8',text:'text-amber-thread',dot:'bg-amber-thread',label:'运行中',anim:'animate-weave'},
        completed:{bg:'bg-jade-ink/8',text:'text-jade-light',dot:'bg-jade-ink',label:'完成'},
        error:{bg:'bg-vermillion/8',text:'text-vermillion-light',dot:'bg-vermillion',label:'错误'},
        aborted:{bg:'bg-parchment/8',text:'text-parchment',dot:'bg-parchment',label:'已中止'},
        pending:{bg:'bg-loom-hover/50',text:'text-parchment',dot:'bg-parchment',label:'待执行'},
        done:{bg:'bg-jade-ink/5',text:'text-jade-ink',dot:'bg-jade-ink',label:'完成'},
      };
      const s=m[status]||m.pending;
      return (
        <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 text-[10px] font-medium seal-badge ${s.bg} ${s.text}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${s.dot} ${s.anim||''}`}/>{s.label}
        </span>
      );
    }

    function DetailHeader() {
      return (
        <div className="h-12 flex items-center justify-between px-4 border-b border-loom-border bg-loom-surface/80 shrink-0">
          <div className="flex items-center gap-3">
            <button className="text-parchment hover:text-silk thread-transition p-1 rounded hover:bg-loom-hover">
              <svg className="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M10 3L5 8l5 5"/></svg>
            </button>
            <input className="bg-transparent text-sm font-display text-silk border-b border-transparent hover:border-loom-border focus:border-gold-thread/30 outline-none px-1 py-0.5 thread-transition w-48" defaultValue="修补: Memory Leak"/>
            <StatusBadge status="running"/>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-[11px] text-parchment">Tokens <span className="font-mono text-silk-dim/80 font-medium ml-1">3,128</span></span>
            <span className="text-[11px] text-parchment">费用 <span className="font-mono text-silk-dim/80 font-medium ml-1">$0.42</span></span>
            <div className="w-px h-4 bg-loom-border"/>
            <button className="px-3 py-1.5 rounded-sm text-xs font-medium text-vermillion/70 hover:text-vermillion hover:bg-vermillion/5 border border-transparent hover:border-vermillion/15 thread-transition">中止</button>
            <button className="px-3 py-1.5 rounded-sm text-xs font-medium text-gold-thread/70 hover:text-gold-thread hover:bg-gold-thread/5 border border-transparent hover:border-gold-thread/15 gold-thread-glow thread-transition flex items-center gap-1">{Svg.Shuttle}重跑</button>
          </div>
        </div>
      );
    }

    function RunsSidebar({ activeRun, onSelect }) {
      return (
        <aside className="w-56 shrink-0 border-r border-loom-border bg-loom-surface/40 flex flex-col">
          <div className="p-3 space-y-2 border-b border-loom-border">
            <div className="flex items-center gap-2 px-3 py-2 rounded-sm bg-loom-ink border border-loom-border text-parchment text-[11px]">
              {Svg.Search}
              <input className="bg-transparent outline-none flex-1 placeholder:text-parchment/40" placeholder="搜索运行记录..."/>
            </div>
            <div className="flex gap-1.5">
              {['全部','运行中','已完成','错误'].map((f,i)=>(
                <button key={f} className={`px-2.5 py-1 rounded-sm text-[10px] font-medium thread-transition ${
                  i===0?'bg-gold-thread/5 text-gold-thread border border-gold-thread/10':'text-parchment hover:text-silk-dim border border-transparent'
                }`}>{f}</button>
              ))}
            </div>
          </div>
          <div className="flex-1 overflow-y-auto">
            {RUNS.map((r,i)=>(
              <div key={i} onClick={()=>onSelect(i)}
                className={`px-3 py-3 cursor-pointer thread-transition border-b border-loom-border/50 ${
                  activeRun===i ? 'gold-shimmer-bg border-l-[3px] border-l-gold-thread' : 'border-l-[3px] border-l-transparent hover:bg-loom-hover/30'
                }`}>
                <div className="flex items-start justify-between gap-2">
                  <span className="text-[12px] font-display text-silk/90 truncate">{r.name}</span>
                  <StatusBadge status={r.status}/>
                </div>
                <div className="flex items-center gap-2 mt-1.5 text-[10px] text-parchment/60 font-mono">
                  <span>{r.time}</span><span className="opacity-25">·</span><span>{r.duration}</span><span className="opacity-25">·</span><span>{r.tokens}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="p-2 border-t border-loom-border">
            <button className="w-full py-2.5 rounded-sm border border-gold-thread/12 text-gold-thread/60 text-xs font-display
              hover:bg-gold-thread/4 hover:border-gold-thread/25 hover:text-gold-thread thread-transition gold-shimmer-bg">
              + 新任务
            </button>
          </div>
        </aside>
      );
    }

    function StepChips({ steps, activeStep, onStepClick }) {
      return (
        <div className="flex items-center gap-1 px-4 py-2.5 overflow-x-auto border-b border-loom-border shrink-0">
          {steps.map((s,i)=>(
            <React.Fragment key={s.id}>
              {i>0&&(
                <svg className="w-3 h-3 text-loom-border shrink-0 mx-0.5" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.2">
                  <path d="M3 2.5L6 6l-3 3.5"/>
                </svg>
              )}
              <button onClick={()=>onStepClick(i)}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-sm text-xs font-medium thread-transition group ${
                  activeStep===i
                    ? 'gold-shimmer-bg text-gold-thread gold-thread-strong'
                    : 'text-parchment hover:text-silk hover:bg-loom-hover/40 border border-transparent'
                }`}>
                <span className={`w-5 h-5 rounded-sm flex items-center justify-center text-[10px] font-mono font-bold ${
                  s.status==='done'?'bg-jade-ink/10 text-jade-light':
                  s.status==='running'?'bg-amber-thread/10 text-amber-thread animate-weave':
                  s.status==='error'?'bg-vermillion/10 text-vermillion-light':
                  'bg-loom-hover text-parchment'}`}>
                  {s.status==='done'?'✓':s.status==='running'?'◇':s.id}
                </span>
                <span>{s.label}</span>
                <span className="text-[10px] opacity-40 font-normal hidden sm:inline">{s.agent}</span>
              </button>
            </React.Fragment>
          ))}
        </div>
      );
    }

    function ParallelGroup({ group }) {
      return (
        <div className="flex items-center gap-2 px-3 py-1.5 rounded-sm border border-gold-thread/8 bg-gold-thread/3">
          <svg className="w-3.5 h-3.5 text-gold-thread/45" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3">
            <path d="M2 3H5 M2 6H8 M2 9H6"/>
          </svg>
          {group.map(g=>(
            <span key={g.id} className={`text-[10px] px-2 py-0.5 rounded-sm font-mono ${
              g.status==='running'?'text-amber-thread bg-amber-thread/6':'text-parchment bg-loom-hover/50'
            }`}>{g.label}</span>
          ))}
          <span className="text-[9px] text-parchment/45 italic ml-auto">并行中...</span>
        </div>
      );
    }

    function PromptViewer() {
      const [expanded,setExpanded]=useState(false);
      return (
        <div className="border-b border-loom-border shrink-0">
          <button onClick={()=>setExpanded(!expanded)}
            className="w-full flex items-center justify-between px-4 py-2.5 text-xs text-parchment hover:text-silk-dim thread-transition">
            <span className="flex items-center gap-2 font-display text-[11px]">📐 Prompt</span>
            <span className={`thread-transition transform ${expanded?'rotate-180':''}`}>{Svg.ChevronDown}</span>
          </button>
          {expanded&&(
            <div className="px-4 pb-3 animate-scroll-reveal">
              <div className="p-3 rounded-sm bg-loom-ink border border-loom-border text-xs font-mono text-parchment leading-relaxed whitespace-pre-wrap loom-grid-dense">
{`你是一名资深前端工程师。请在 src/auth/token.ts 中实现 JWT Token 自动刷新机制。

要求：
1. Token 过期前 5 分钟自动刷新
2. 失败重试最多 3 次
3. 使用指数退避策略

上下文 (注入记忆):
- JWT 密钥存储在 ENV 环境变量中`}
              </div>
            </div>
          )}
        </div>
      );
    }

    function TranscriptViewer({ events }) {
      const typeStyles={
        think:'text-parchment/70 italic',
        tool:'text-gold-thread/80',
        text:'text-silk/90',
        error:'text-vermillion-light',
        result:'text-parchment/50',
      };
      return (
        <div className="flex-1 overflow-y-auto px-4 py-3 space-y-2 min-h-0 loom-grid-dense">
          {/* 织造日志头 */}
          <div className="text-[9px] font-mono text-parchment/40 mb-3 pb-2 border-b border-loom-border flex items-center gap-2">
            <span className="w-20 h-px bg-gold-thread/15"/>
            <span>运行日志 // BUGFIX:MEMORY_LEAK</span>
            <span className="flex-1 h-px bg-gold-thread/10"/>
          </div>

          {events.map((e,i)=>(
            <div key={i} className={`pl-4 py-2 rounded-r-sm ${e.type==='text'?'bg-loom-surface/30':''}`}
              style={{borderLeftWidth:'2px',borderLeftStyle:'solid',
                borderLeftColor:e.type==='think'?'#9E988B':e.type==='tool'?'#D4A853':e.type==='text'?'#5B7B6B':e.type==='error'?'#C4684A':'#6B7B8B'}}>
              <div className="flex items-center gap-2 mb-1">
                <span className="text-[9px] font-mono text-parchment/40 uppercase tracking-wider">{e.time}</span>
                <span className="text-[9px] text-parchment/30">
                  {{think:'思考',tool:'工具',text:'输出',error:'错误',result:'结果'}[e.type]}
                </span>
              </div>
              <div className={`text-xs leading-relaxed ${typeStyles[e.type]||'text-parchment'}`}>{e.content}</div>
            </div>
          ))}

          {/* 织梭动画指示器 */}
          <div className="flex items-center gap-2 pl-4 py-1.5 text-amber-thread text-[11px] animate-scroll-reveal">
            <svg className="w-4 h-4 animate-weave" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3">
              <path d="M3 7L11 7"/><path d="M6 4L11 7l-5 3"/>
            </svg>
            <span className="font-display">Agent 运行中...</span>
          </div>
        </div>
      );
    }

    function ArtifactCards({ artifacts, onPreview }) {
      const extCols={ts:'text-blue-300/70',tsx:'text-blue-300/70',md:'text-purple-300/70',json:'text-amber-thread'};
      return (
        <div className="border-t border-loom-border px-4 py-3 shrink-0">
          <span className="text-[10px] text-parchment/50 mb-2 block font-display">🧶 产出物</span>
          <div className="flex gap-2 overflow-x-auto">
            {artifacts.map((a,i)=>(
              <button key={i} onClick={()=>onPreview(a)}
                className="flex items-center gap-2 px-3 py-2 rounded-sm woven-border bg-loom-surface hover:border-gold-thread/20 hover:bg-loom-hover thread-transition shrink-0">
                <span className={`text-xs font-mono font-medium ${extCols[a.type]||'text-parchment'}`}>.{a.type}</span>
                <span className="text-[11px] text-silk-dim">{a.name}</span>
                <span className="text-[10px] font-mono text-jade-light/60">{a.size}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function MemoryRefs({ memories }) {
      const [expanded,setExpanded]=useState(false);
      return (
        <div className="border-t border-loom-border shrink-0">
          <button onClick={()=>setExpanded(!expanded)}
            className="w-full flex items-center justify-between px-4 py-2.5 text-xs text-parchment hover:text-silk-dim thread-transition">
            <span className="flex items-center gap-2 font-display text-[11px]">{Svg.Memory} 记忆引用 ({memories.length})</span>
            <span className={`thread-transition transform ${expanded?'rotate-180':''}`}>{Svg.ChevronDown}</span>
          </button>
          {expanded&&(
            <div className="px-4 pb-2 space-y-1.5 animate-scroll-reveal">
              {memories.map((m,i)=>(
                <div key={i} className="flex items-center justify-between p-2.5 rounded-sm bg-loom-ink/60 woven-border text-[11px]">
                  <div className="flex items-center gap-2 flex-1 min-w-0">
                    <span className={`shrink-0 px-2 py-0.5 rounded-sm text-[9px] font-medium ${
                      m.cat==='preference'?'bg-gold-thread/8 text-gold-light':
                      m.cat==='knowledge'?'bg-jade-ink/8 text-jade-light':
                      'bg-vermillion/8 text-vermillion-light'}`}>{m.cat}</span>
                    <span className="text-parchment truncate">{m.text}</span>
                  </div>
                  <div className="flex items-center gap-2 ml-2 shrink-0">
                    <span className="text-[9px] text-parchment/40">{m.scope}</span>
                    <div className="w-12 h-1.5 rounded-full bg-loom-hover overflow-hidden">
                      <div className="h-full rounded-full bg-gold-thread/45 thread-transition" style={{width:`${m.strength*100}%`}}/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ComposerBar() {
      return (
        <div className="border-t border-loom-border p-3 shrink-0 bg-loom-surface/60">
          <div className="flex items-end gap-2">
            <textarea className="flex-1 bg-loom-ink border border-loom-border rounded-sm px-3 py-2.5 text-xs text-silk placeholder:text-parchment/35 outline-none focus:border-gold-thread/25 gold-thread-glow thread-transition resize-none font-ui"
              rows={2} placeholder="输入消息发送给 Frontend Dev..."/>
            <button className="shrink-0 p-3 rounded-sm bg-gold-thread/8 text-gold-thread border border-gold-thread/12
              hover:bg-gold-thread/15 hover:border-gold-thread/25 gold-thread-glow thread-transition flex items-center gap-1.5">
              <span className="text-[10px] font-display hidden sm:inline">发送</span>
              {Svg.Send}
            </button>
          </div>
          <div className="flex items-center gap-3 mt-1.5 text-[10px] text-parchment/45">
            <span>对话: <span className="text-gold-thread/60">Frontend Dev (Claude Sonnet 4.6)</span></span>
            <span className="opacity-25">·</span>
            <span>Enter 发送 · Shift+Enter 换行</span>
          </div>
        </div>
      );
    }

    function FilePreviewPanel({ file, onClose }) {
      const [tab,setTab]=useState('code');
      if(!file) return null;

      const codeContent=`// src/auth/token.ts
import jwt from 'jsonwebtoken';
import { env } from '../config';

const REFRESH_WINDOW = 5 * 60 * 1000; // 5 分钟刷新窗口
const MAX_RETRIES = 3;               // 最多重试次数

export async function refreshToken(
  currentToken: string
): Promise<string> {
  const decoded = jwt.decode(currentToken);
  const expiresAt = decoded.exp * 1000;
  if (expiresAt - Date.now() > REFRESH_WINDOW)
    return currentToken; // 仍在有效期内

  let retries = 0;
  while (retries < MAX_RETRIES) {
    try {
      return (await fetch(/*...*/)).data.token;
    } catch {
      retries++;
      await sleep(2 ** retries * 100); // 指数退避
    }
  }
  throw new Error('Token refresh 失败');
}`;

      return (
        <aside className="w-80 shrink-0 border-l border-loom-border bg-loom-surface flex flex-col animate-seal-stamp">
          <div className="flex items-center justify-between px-4 py-3 border-b border-loom-border">
            <div className="flex items-center gap-2">
              <span className="text-sm">🧵</span>
              <span className="text-xs font-mono font-medium text-silk">{file.name}</span>
              <span className="text-[10px] text-jade-light/60">{file.size}</span>
            </div>
            <button onClick={onClose} className="p-1 rounded-sm hover:bg-loom-hover thread-transition text-parchment hover:text-silk font-bold">✕</button>
          </div>

          <div className="flex border-b border-loom-border font-display text-[11px]">
            {['代码','预览','差异'].map(t=>(
              <button key={t} onClick={()=>setTab(t)}
                className={`px-4 py-2.5 thread-transition border-b-2 font-medium ${
                  tab===t?'border-gold-thread text-gold-thread':'border-transparent text-parchment hover:text-silk-dim'
                }`}>{t}</button>
            ))}
          </div>

          <div className="flex-1 overflow-y-auto p-3">
            {tab==='代码'&&<pre className="text-[10px] font-mono text-silk-dim leading-relaxed whitespace-pre overflow-x-auto"><code>{codeContent}</code></pre>}
            {tab==='预览'&&(
              <div className="text-xs text-parchment space-y-3">
                <div className="p-3 rounded-sm woven-border bg-loom-ink loom-grid-dense">
                  <h3 className="font-display text-silk mb-2">Token 刷新逻辑</h3>
                  <p className="mb-1.5">🪡 过期前 <code className="px-1.5 py-0.5 rounded-sm bg-amber-thread/8 text-amber-thread text-[10px]">5 分钟</code> 自动刷新</p>
                  <p className="mb-1.5">🔄 最多重试 <code className="px-1.5 py-0.5 rounded-sm bg-amber-thread/8 text-amber-thread text-[10px]">3 次</code></p>
                  <div className="flex gap-2 mt-3 text-[10px]">
                    <span className="px-2 py-0.5 rounded-sm bg-jade-ink/8 text-jade-light">+28 行</span>
                    <span className="px-2 py-0.5 rounded-sm bg-vermillion/8 text-vermillion-light">−3 行</span>
                  </div>
                </div>
              </div>
            )}
            {tab==='差异'&&(
              <pre className="text-[10px] font-mono leading-relaxed overflow-x-auto">
                <code>
                  <span className="text-parchment/50">{'@@ -3,6 +3,28 @@\n'}</span>
                  <span className="text-parchment/70">{' import jwt...\n'}</span>
                  <span className="text-jade-light">{'+const REFRESH_WINDOW = 5 * 60 * 1000;\n+const MAX_RETRIES = 3;\n+export async function refreshToken...\n'}</span>
                </code>
              </pre>
            )}
          </div>
        </aside>
      );
    }

    function RunDetail() {
      const [activeStep,setActiveStep]=useState(2);
      const [previewFile,setPreviewFile]=useState(null);
      const cur=STEPS[activeStep];
      return (
        <div className="flex-1 flex flex-col min-w-0 bg-loom-ink relative loom-grid">
          <DetailHeader/>
          <div className="px-4 pt-3 pb-2 shrink-0">
            <StepChips steps={STEPS} activeStep={activeStep} onStepClick={setActiveStep}/>
            {cur?.parallel&&<div className="mt-2 animate-scroll-reveal"><ParallelGroup group={cur.parallel}/></div>}
          </div>
          <div className="bamboo-divider mx-4"/>
          <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
            <PromptViewer/>
            <TranscriptViewer events={TRANSCRIPT}/>
          </div>
          <ArtifactCards artifacts={ARTIFACTS} onPreview={setPreviewFile}/>
          <MemoryRefs memories={MEMORIES}/>
          <ComposerBar/>
          <FilePreviewPanel file={previewFile} onClose={()=>setPreviewFile(null)}/>
        </div>
      );
    }

    function App() {
      const [activeRun,setActiveRun]=useState(1);
      return (
        <div className="h-screen w-screen flex bg-loom-ink overflow-hidden">
          <RunsSidebar activeRun={activeRun} onSelect={setActiveRun}/>
          <RunDetail/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
