<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — App Shell — 经纶 The Weaver's Study</title>

  <!-- 字体: 楷体/书法风品牌 + 宋体书卷感UI + 等宽代码 -->
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KaiTi&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'loom-ink': '#1C1B18',
            'loom-surface': '#252320',
            'loom-hover': '#2D2B27',
            'loom-border': '#3A3730',
            'loom-border-warm': '#3F3B33',
            'gold-thread': '#D4A853',
            'gold-light': '#E0C478',
            'gold-dim': '#B8953A',
            'jade-ink': '#5B7B6B',
            'jade-light': '#7D9E8D',
            'vermillion': '#C4684A',
            'vermillion-light': '#D4856B',
            'amber-thread': '#C4964A',
            'silk': '#EBE5D9',
            'silk-dim': '#C5BFAF',
            'parchment': '#9E988B',
          },
          fontFamily: {
            brand: ['"ZCOOL KaiTi"', '"KaiTi"', 'serif'],
            display: ['"Noto Serif SC"', '"Source Han Serif SC"', 'Georgia', 'serif'],
            ui: ['"Inter"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          animation: {
            'weave': 'weave 4s ease-in-out infinite',
            'thread-slide': 'threadSlide 3s linear infinite',
            'seal-stamp': 'sealStamp 0.4s cubic-bezier(0.34,1.56,0.64,1)',
            'scroll-reveal': 'scrollReveal 0.5s ease-out',
            'gold-shimmer': 'goldShimmer 3s ease-in-out infinite',
          },
          keyframes: {
            weave: {
              '0%,100%': { opacity: '0.6', transform: 'scale(1)' },
              '50%': { opacity: '1', transform: 'scale(1.02)' },
            },
            threadSlide: {
              '0%': { strokeDashoffset: '40' },
              '100%': { strokeDashoffset: '0' },
            },
            sealStamp: {
              '0%': { transform: 'scale(1.3)', opacity: '0' },
              '60%': { transform: 'scale(0.95)', opacity: '0.9' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            scrollReveal: {
              '0%': { opacity: '0', transform: 'translateY(6px)', maxHeight: '0' },
              '100%': { opacity: '1', transform: 'translateY(0)', maxHeight: '500px' },
            },
            goldShimmer: {
              '0%,100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
          },
        }
      }
    }
  </script>

  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(212,168,83,0.15) transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,168,83,0.12); border-radius: 2px; }

    /* ── 经纬网格暗纹 (warp & weft) ── */
    .loom-grid {
      position: relative;
    }
    .loom-grid::before {
      content: '';
      position: absolute; inset: 0; opacity: 0.03; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(0deg, rgba(212,168,83,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,168,83,0.2) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .loom-grid-dense::before {
      background-size: 20px 20px;
      opacity: 0.02;
    }

    /* ── 丝织光泽表面 ── */
    .silk-sheen {
      position: relative;
      overflow: hidden;
    }
    .silk-sheen::after {
      content: '';
      position: absolute; inset: 0; opacity: 0.04; pointer-events: none;
      background: linear-gradient(135deg,
        transparent 0%, rgba(212,168,83,0.3) 30%, transparent 50%,
        rgba(212,168,83,0.1) 70%, transparent 100%);
    }

    /* ── 金线边框渐变 ── */
    .gold-thread-border {
      border: 1px solid transparent;
      border-image: linear-gradient(135deg,
        rgba(212,168,83,0.4) 0%, rgba(212,168,83,0.1) 40%,
        rgba(212,168,83,0.3) 60%, rgba(212,168,83,0.05) 100%) 1;
    }
    .gold-thread-glow {
      box-shadow: 0 0 0 1px rgba(212,168,83,0.12), 0 0 15px rgba(212,168,83,0.05);
    }
    .gold-thread-strong {
      box-shadow: 0 0 0 1px rgba(212,168,83,0.2), 0 0 25px rgba(212,168,83,0.08);
    }

    /* ── 金线流动光泽动画 (用于按钮等) ── */
    .gold-shimmer-bg {
      background: linear-gradient(110deg,
        rgba(212,168,83,0.08) 0%, rgba(212,168,83,0.16) 25%,
        rgba(212,168,83,0.08) 50%, rgba(212,168,83,0.16) 75%,
        rgba(212,168,83,0.08) 100%);
      background-size: 200% 100%;
      animation: goldShimmer 4s ease-in-out infinite;
    }

    /* ── 印章式状态徽章 ── */
    .seal-badge {
      border-radius: 3px;
      position: relative;
    }
    .seal-badge::after {
      content: ''; position: absolute; inset: -1px;
      border-radius: 4px; opacity: 0.3; pointer-events: none;
    }

    /* ── 竹简式分隔线 ── */
    .bamboo-divider {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%, rgba(212,168,83,0.08) 10%, rgba(212,168,83,0.18) 30%,
        rgba(212,168,83,0.22) 50%, rgba(212,168,83,0.18) 70%,
        rgba(212,168,83,0.08) 90%, transparent 100%);
      position: relative;
    }
    .bamboo-divider::after {
      content: ''; position: absolute; left: 50%; top: -2px; transform: translateX(-50%);
      width: 4px; height: 4px; border-radius: 2px;
      background: rgba(212,168,83,0.25);
    }
    .bamboo-divider-v {
      width: 1px;
      background: linear-gradient(180deg,
        transparent 0%, rgba(212,168,83,0.1) 20%, rgba(212,168,83,0.18) 50%,
        rgba(212,168,83,0.1) 80%, transparent 100%);
    }

    /* ── 织纹边框 (用于卡片) ── */
    .woven-border {
      border: 1px solid rgba(212,168,83,0.1);
      position: relative;
    }
    .woven-border::before {
      content: ''; position: absolute; inset: 3px;
      border: 1px solid rgba(212,168,83,0.04);
      pointer-events: none;
    }

    /* ── 模式激活线 ── */
    .mode-active-thread {
      position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px;
      background: linear-gradient(180deg, transparent 0%, #D4A853 15%, #D4A853 85%, transparent 100%);
      border-radius: 0 2px 2px 0;
    }

    /* ── 过渡 ── */
    .thread-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-loom-ink text-silk font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    // ─── SVG Icons — 织造工具风格 ───
    const Icons = {
      Workflow: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#D4A853':'#9E988B'}
          strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          {/* 经线 (vertical warp) */}
          <line x1="6" y1="3" x2="6" y2="19" opacity="0.6"/>
          <line x1="11" y1="3" x2="11" y2="19" opacity="0.6"/>
          <line x1="16" y1="3" x2="16" y2="19" opacity="0.6"/>
          {/* 纬线 (horizontal weft — active) */}
          <path d="M4 7 Q11 6,18 7" opacity="0.9"/>
          <path d="M4 13 Q11 12,18 13" opacity="0.7"/>
          <path d="M4 17 Q11 16,18 17" opacity="0.5"/>
          {/* 梭子 */}
          <rect x="7" y="12" width="8" height="3" rx="1" fill={active?'#D4A853':'none'} opacity="0.7"/>
        </svg>
      ),
      Templates: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#D4A853':'#9E988B'}
          strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          {/* 织锦图样 */}
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="13" y="3" width="6" height="7" rx="1.5"/>
          <rect x="3" y="13" width="6" height="6" rx="1.5"/>
          <rect x="13" y="13" width="6" height="6" rx="1.5"/>
          {/* 编织连线 */}
          <path d="M10 6.5 L13 6.5" opacity="0.5"/>
          <path d="M10 16 L13 16" opacity="0.5"/>
        </svg>
      ),
      Agents: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#D4A853':'#9E988B'}
          strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          {/* 丝线汇聚 */}
          <circle cx="11" cy="7" r="3"/>
          <path d="M5 17 C5 13, 8 12, 11 12 C14 12, 17 13, 17 17"/>
          <path d="M3 10 L7 7" opacity="0.4"/>
          <path d="M19 10 L15 7" opacity="0.4"/>
        </svg>
      ),
      SingleRun: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#D4A853':'#9E988B'}
          strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          {/* 单根丝线 */}
          <path d="M7 3 L7 19"/>
          <path d="M15 3 L15 19"/>
          <path d="M4 7 L18 7"/>
          <circle cx="11" cy="13" r="2"/>
        </svg>
      ),
      Settings: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#D4A853':'#9E988B'}
          strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          {/* 织机调校 */}
          <circle cx="11" cy="11" r="3"/>
          <path d="M11 3 L11 5 M11 17 L11 19 M3 11 L5 11 M17 11 L19 11"/>
          <path d="M5.5 5.5 L6.8 6.8 M15.2 15.2 L16.5 16.5 M5.5 16.5 L6.8 15.2 M15.2 6.8 L16.5 5.5"/>
        </svg>
      ),
    };

    const MODES = [
      { id:'workflow', label:'工作流', icon:Icons.Workflow, hint:'运行与监控' },
      { id:'templates', label:'模板', icon:Icons.Templates, hint:'编排设计' },
      { id:'agents', label:'Agent', icon:Icons.Agents, hint:'管理 Agent' },
      { id:'single', label:'单次', icon:Icons.SingleRun, hint:'快速对话' },
      { id:'settings', label:'设置', icon:Icons.Settings, hint:'系统配置' },
    ];

    // ─── COMPONENTS ───

    function Header() {
      return (
        <header className="h-12 flex items-center justify-between px-5 border-b border-loom-border bg-loom-ink/95 backdrop-blur-sm shrink-0 select-none relative z-10">
          {/* Brand */}
          <div className="flex items-center gap-3">
            {/* Logo: 织梭 */}
            <div className="w-8 h-8 relative flex items-center justify-center">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                {/* 织框 */}
                <rect x="3" y="3" width="22" height="22" rx="3" stroke="#D4A853" strokeWidth="1.3" opacity="0.5"/>
                {/* 经线 */}
                <line x1="9" y1="5" x2="9" y2="23" stroke="#D4A853" strokeWidth="0.6" opacity="0.4"/>
                <line x1="14" y1="5" x2="14" y2="23" stroke="#D4A853" strokeWidth="0.6" opacity="0.4"/>
                <line x1="19" y1="5" x2="19" y2="23" stroke="#D4A853" strokeWidth="0.6" opacity="0.4"/>
                {/* 梭子 (weft shuttle) */}
                <path d="M7 12 L21 16" stroke="#D4A853" strokeWidth="1.5" strokeLinecap="round"/>
                <path d="M7 16 L21 12" stroke="#D4A853" strokeWidth="1" strokeLinecap="round" opacity="0.5"/>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <h1 className="text-base font-brand text-gold-thread tracking-wider">经纶</h1>
              <span className="text-[10px] text-parchment font-display tracking-wide hidden sm:inline">Agent Studio</span>
            </div>
          </div>

          {/* Status */}
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-1.5 px-3 py-1 rounded-sm border border-loom-border bg-loom-surface/60 text-[11px] text-parchment">
              <span className="w-1.5 h-1.5 rounded-full bg-gold-thread animate-weave"/>
              <span>运行中 3</span>
            </div>
            <div className="flex items-center gap-1.5 px-3 py-1 rounded-sm border border-loom-border bg-loom-surface/60 text-[11px] text-parchment">
              <span className="font-mono text-silk-dim/80 text-[10px]">12.5k</span>
              <span>tokens</span>
            </div>
          </div>
        </header>
      );
    }

    function ModeRail({ activeMode, onModeChange }) {
      return (
        <nav className="w-[72px] shrink-0 bg-loom-ink/90 flex flex-col items-center pt-5 pb-3 gap-0.5 select-none relative z-10"
          style={{borderRight:'1px solid rgba(212,168,83,0.08)'}}>
          {/* 顶部织纹装饰线 */}
          <div className="w-8 h-px mb-3" style={{background:'linear-gradient(90deg,transparent,rgba(212,168,83,0.3),transparent)'}}/>

          {MODES.map(mode => {
            const isActive = activeMode === mode.id;
            const Icon = mode.icon;
            return (
              <button key={mode.id} onClick={()=>onModeChange(mode.id)}
                className={`relative w-12 h-12 flex flex-col items-center justify-center gap-0.5 rounded-md thread-transition group ${
                  isActive
                    ? 'gold-shimmer-bg text-gold-thread'
                    : 'text-parchment hover:text-silk-dim hover:bg-loom-hover/50'
                }`}
                title={mode.hint}>
                {isActive && <div className="mode-active-thread"/>}
                <Icon active={isActive}/>
                <span className={`text-[9px] font-medium tracking-wider ${isActive?'text-gold-thread':'text-parchment/60'}`}>
                  {mode.label}
                </span>
              </button>
            );
          })}

          <div className="flex-1"/>

          {/* 底部装饰: 梭子图标 */}
          <div className="flex flex-col items-center gap-1.5 mb-2 opacity-25">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#D4A853" strokeWidth="1" strokeLinecap="round">
              <path d="M3 7 L11 7"/>
              <path d="M6 4 L11 7 L6 10"/>
            </svg>
            <span className="text-[7px] text-parchment font-mono">v0.1</span>
          </div>
        </nav>
      );
    }

    function EmptyWorkspace({ activeMode }) {
      const modeInfo = MODES.find(m=>m.id===activeMode);
      const descriptions = {
        templates:'编排 AI Agent 工作流，将多个 Agent 组织为有序的协作流程。',
        workflow:'运行与监控工作流，追踪每一步的执行状态与产出。',
        agents:'定义你的 AI Agent，赋予每个 Agent 独特的角色与能力。',
        single:'与单个 Agent 快速对话，灵感一闪，即刻开始。',
        settings:'配置系统环境与连接，为创作准备完备的工具链。',
      };

      return (
        <div className="flex-1 flex items-center justify-center relative overflow-hidden loom-grid">
          {/* 织机背景暗纹 */}
          <svg className="absolute inset-0 w-full h-full opacity-[0.02]" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            {/* 经线群 */}
            {Array.from({length:20},(_,i)=>(
              <line key={`w${i}`} x1={i*40+20} y1="0" x2={i*40+20} y2="600" stroke="#D4A853" strokeWidth="1"/>
            ))}
            {/* 纬线 (编织中的) */}
            {Array.from({length:5},(_,i)=>(
              <line key={`h${i}`} x1="0" y1={150+i*80} x2="800" y2={130+i*80} stroke="#D4A853" strokeWidth="1.5" opacity="0.6"/>
            ))}
            {/* 梭子轨迹 */}
            <path d="M50 200 Q400 180,750 220" fill="none" stroke="#D4A853" strokeWidth="1" opacity="0.4" strokeDasharray="6 3"/>
            <path d="M50 350 Q400 370,750 330" fill="none" stroke="#D4A853" strokeWidth="1" opacity="0.3" strokeDasharray="4 4"/>
            <rect x="350" y="192" width="30" height="12" rx="4" fill="#D4A853" opacity="0.2"/>
          </svg>

          <div className="relative z-10 text-center animate-seal-stamp">
            {/* 织锦纹样中心 */}
            <div className="w-28 h-28 mx-auto mb-6 relative flex items-center justify-center">
              {/* 外框 */}
              <div className="absolute inset-0 rounded-sm border border-gold-thread/10 woven-border"/>
              {/* 内框 */}
              <div className="absolute inset-3 rounded-sm border border-gold-thread/6"/>
              {/* 经纬线 */}
              <svg width="80" height="80" viewBox="0 0 80 80" className="opacity-30">
                {[20,30,40,50,60].map(x=><line key={x} x1={x} y1="15" x2={x} y2="65" stroke="#D4A853" strokeWidth="0.5"/>)}
                {[20,30,40,50,60].map(y=><line key={y} x1="15" y1={y} x2="65" y2={y} stroke="#D4A853" strokeWidth="0.5"/>)}
                {/* 织纹菱形 */}
                <path d="M40 20 L55 40 L40 60 L25 40 Z" fill="#D4A853" opacity="0.15"/>
              </svg>
              <span className="absolute text-3xl font-brand text-gold-thread/25">經</span>
            </div>

            <h2 className="text-lg font-display font-medium text-silk mb-2 tracking-wide">
              {modeInfo?.label}
            </h2>
            <p className="text-sm text-parchment max-w-sm leading-relaxed">
              {descriptions[activeMode] || 'Agent Studio — 编织 AI 工作流'}
            </p>

            <button className="mt-6 px-5 py-2.5 rounded-sm border border-gold-thread/15 text-gold-thread/60 text-sm
              hover:bg-gold-thread/5 hover:border-gold-thread/30 hover:text-gold-thread
              thread-transition font-medium gold-shimmer-bg">
              + 开始
            </button>
          </div>
        </div>
      );
    }

    function StatusBar() {
      return (
        <footer className="h-7 flex items-center justify-between px-4 border-t border-loom-border bg-loom-surface/60 text-[10px] text-parchment/50 font-mono select-none shrink-0">
          <div className="flex items-center gap-3">
            <span className="flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-jade-ink animate-weave"/>
              System Ready
            </span>
            <span className="opacity-25">·</span>
            <span>CLI: Claude Code v2.3.1</span>
          </div>
          <div className="flex items-center gap-3">
            <span>macOS</span>
            <span className="opacity-25">·</span>
            <span>Memory: 42</span>
          </div>
        </footer>
      );
    }

    function App() {
      const [activeMode, setActiveMode] = useState('templates');
      return (
        <div className="h-screen w-screen flex flex-col bg-loom-ink overflow-hidden">
          <Header/>
          <div className="flex flex-1 overflow-hidden">
            <ModeRail activeMode={activeMode} onModeChange={setActiveMode}/>
            <main className="flex-1 flex flex-col overflow-hidden relative">
              <EmptyWorkspace activeMode={activeMode}/>
            </main>
          </div>
          <StatusBar/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
