<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经纶 · Agent 编辑器</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KaiTi&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'loom-ink': '#1C1B18',
        'loom-surface': '#252320',
        'loom-hover': '#2D2B27',
        'loom-border': '#3A3730',
        'gold-thread': '#D4A853',
        'jade-ink': '#5B7B6B',
        'silk': '#EBE5D9',
        'parchment': '#9E988B',
        'vermillion': '#C4684A',
        'amber-thread': '#C4964A',
      },
      fontFamily: {
        brand: ['"ZCOOL KaiTi"', 'serif'],
        display: ['"Noto Serif SC"', 'serif'],
        ui: ['Inter', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'monospace'],
      },
      borderRadius: { sm: '2px' },
    }
  }
}
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: #1C1B18; color: #EBE5D9; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #1C1B18; }
::-webkit-scrollbar-thumb { background: #3A3730; border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #4A4740; }

.loom-grid {
  background-color: #1C1B18;
  background-image:
    linear-gradient(rgba(212,168,83,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,83,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.woven-border {
  border: 1px solid #3A3730;
  box-shadow: inset 0 0 0 1px rgba(212,168,83,0.06), 0 1px 3px rgba(0,0,0,0.3);
}

.gold-thread-glow {
  border-color: #D4A853 !important;
  box-shadow: inset 0 0 0 1px rgba(212,168,83,0.12), 0 0 10px rgba(212,168,83,0.15);
}

.bamboo-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #3A3730 20%, #3A3730 80%, transparent);
}

.seal-badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'ZCOOL KaiTi', serif; font-size: 10px;
  padding: 2px 8px; border: 1px solid #3A3730;
  color: #9E988B; background: rgba(37,35,32,0.8); letter-spacing: 1px;
  position: relative;
}
.seal-badge::before {
  content: ''; position: absolute; inset: 1px;
  border: 1px solid rgba(212,168,83,0.05); pointer-events: none;
}

@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.gold-shimmer-bg {
  background: linear-gradient(110deg, rgba(212,168,83,0) 40%, rgba(212,168,83,0.05) 50%, rgba(212,168,83,0) 60%);
  background-size: 200% 100%;
  animation: goldShimmer 3s ease-in-out infinite;
}

@keyframes threadTransition {
  0% { opacity: 0; transform: translateX(-4px); }
  100% { opacity: 1; transform: translateX(0); }
}
.thread-transition { animation: threadTransition 0.2s ease-out; }

.focus-glow:focus { border-color: #D4A853; box-shadow: 0 0 0 1px rgba(212,168,83,0.2); }
input:focus, textarea:focus, select:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ─── DATA ─────────────────────────────────
const INITIAL_AGENTS = [
  { id: 'a1', name: '意图识别', model: 'GPT-4o', category: '分析', status: 'active', description: '分析用户输入意图并路由至对应处理流程', systemPrompt: '你是一个意图识别专家，请分析用户输入。', temperature: 0.3, maxTokens: 1024, memory: true },
  { id: 'a2', name: '知识检索', model: 'RAG', category: '检索', status: 'active', description: '从知识库中检索相关信息', systemPrompt: '你是一个知识检索引擎。', temperature: 0.1, maxTokens: 2048, memory: false },
  { id: 'a3', name: '内容生成', model: 'Claude 3.5', category: '生成', status: 'active', description: '根据上下文生成高质量内容', systemPrompt: '你是一个内容创作专家。', temperature: 0.8, maxTokens: 8192, memory: true },
  { id: 'a4', name: '结果校验', model: 'GPT-4o', category: '分析', status: 'idle', description: '校验输出结果的准确性和完整性', systemPrompt: '请校验以下内容的准确性。', temperature: 0.2, maxTokens: 2048, memory: false },
  { id: 'a5', name: '数据清洗', model: 'Claude 3.5', category: '处理', status: 'draft', description: '清洗和标准化输入数据', systemPrompt: '请清洗以下数据。', temperature: 0.1, maxTokens: 4096, memory: false },
];

// ─── AGENT LIST ───────────────────────────
function AgentList({ agents, selectedId, onSelect, onNew, onDelete }) {
  const [filter, setFilter] = useState('');
  const categories = ['全部', '分析', '检索', '生成', '处理'];

  const filtered = agents.filter(a => {
    const matchSearch = a.name.includes(filter) || a.model.toLowerCase().includes(filter.toLowerCase());
    return matchSearch;
  });

  return (
    <div style={{
      width: 250, flexShrink: 0,
      backgroundColor: '#252320',
      borderRight: '1px solid #3A3730',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ padding: '14px 14px 10px', borderBottom: '1px solid #3A3730' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>Agent 列表</span>
          <button onClick={onNew} style={{
            width: 24, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center',
            backgroundColor: 'rgba(212,168,83,0.08)', border: '1px solid rgba(212,168,83,0.2)',
            color: '#D4A853', cursor: 'pointer', fontSize: 16, fontWeight: 700, transition: 'all 0.15s',
          }}>+</button>
        </div>
        <input
          placeholder="搜索 Agent…"
          value={filter}
          onChange={e => setFilter(e.target.value)}
          style={{
            width: '100%', padding: '6px 10px', fontSize: 12,
            backgroundColor: '#1C1B18', border: '1px solid #3A3730', color: '#EBE5D9',
            borderRadius: 2, fontFamily: 'Inter, sans-serif',
          }}
        />
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 0' }}>
        {filtered.map(a => {
          const isSelected = selectedId === a.id;
          return (
            <div key={a.id}
              onClick={() => onSelect(a.id)}
              className={`woven-border thread-transition ${isSelected ? 'gold-shimmer-bg' : ''}`}
              style={{
                margin: '3px 8px', padding: '10px 12px', cursor: 'pointer',
                backgroundColor: isSelected ? 'rgba(37,35,32,0.95)' : 'rgba(37,35,32,0.5)',
                borderColor: isSelected ? '#D4A853' : 'transparent',
                boxShadow: isSelected ? 'inset 0 0 0 1px rgba(212,168,83,0.1), 0 0 8px rgba(212,168,83,0.1)' : 'none',
                transition: 'all 0.15s',
              }}
              onMouseEnter={e => { if (!isSelected) { e.currentTarget.style.borderColor = '#3A3730'; e.currentTarget.style.backgroundColor = '#2D2B27'; } }}
              onMouseLeave={e => { if (!isSelected) { e.currentTarget.style.borderColor = 'transparent'; e.currentTarget.style.backgroundColor = 'rgba(37,35,32,0.5)'; } }}
            >
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 5 }}>
                <span style={{ fontSize: 13, fontWeight: 500, color: isSelected ? '#D4A853' : '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>
                  {a.name}
                </span>
                <span style={{
                  width: 6, height: 6, borderRadius: '50%',
                  backgroundColor: a.status === 'active' ? '#5B7B6B' : a.status === 'draft' ? '#C4964A' : '#3A3730',
                }} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span className="seal-badge">{a.model}</span>
                <span className="seal-badge" style={{ fontSize: 9, color: '#5B7B6B', borderColor: 'rgba(91,123,107,0.3)' }}>
                  {a.category}
                </span>
              </div>
              <div style={{ fontSize: 11, color: '#9E988B', marginTop: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', fontFamily: 'Inter, sans-serif' }}>
                {a.description}
              </div>
            </div>
          );
        })}
      </div>
      <div className="bamboo-divider" style={{ margin: '0 14px' }} />
      <div style={{ padding: '10px 14px', fontSize: 10, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>
        共 {agents.length} 个 Agent
      </div>
    </div>
  );
}

// ─── EDITOR FORM ──────────────────────────
function EditorForm({ agent, onChange, onSave, onDuplicate }) {
  if (!agent) return (
    <div className="loom-grid" style={{
      flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column', gap: 8,
    }}>
      <div style={{ width: 48, height: 48, border: '1px solid #3A3730', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <span style={{ fontSize: 20, color: '#D4A853' }}>◆</span>
      </div>
      <span style={{ fontSize: 14, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>选择一个 Agent 进行编辑</span>
      <span style={{ fontSize: 11, color: '#3A3730', fontFamily: 'Inter, sans-serif' }}>或点击 + 新建 Agent</span>
    </div>
  );

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px' }}>
      <div style={{ maxWidth: 640 }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 16, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>
              {agent.name || '新建 Agent'}
            </span>
            <span className="seal-badge" style={{
              borderColor: agent.status === 'active' ? 'rgba(91,123,107,0.4)' : agent.status === 'draft' ? 'rgba(196,150,74,0.4)' : '#3A3730',
              color: agent.status === 'active' ? '#5B7B6B' : agent.status === 'draft' ? '#C4964A' : '#9E988B',
            }}>
              {agent.status === 'active' ? '活跃' : agent.status === 'draft' ? '草稿' : '空闲'}
            </span>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={onDuplicate} style={actionBtnStyle}>复制</button>
            <button onClick={onSave} style={{...actionBtnStyle, backgroundColor: 'rgba(212,168,83,0.1)', borderColor: 'rgba(212,168,83,0.25)', color: '#D4A853' }}>
              保存
            </button>
          </div>
        </div>

        <div className="bamboo-divider" style={{ marginBottom: 20 }} />

        {/* Basic Info Section */}
        <Section title="基本信息">
          <FormField label="名称">
            <input style={formInput} value={agent.name} onChange={e => onChange('name', e.target.value)} placeholder="Agent 名称" />
          </FormField>
          <FormField label="描述">
            <textarea style={{...formInput, height: 64, resize: 'vertical'}} value={agent.description}
              onChange={e => onChange('description', e.target.value)} placeholder="简要描述 Agent 的功能" />
          </FormField>
          <div style={{ display: 'flex', gap: 12 }}>
            <div style={{ flex: 1 }}>
              <FormField label="模型">
                <select style={formInput} value={agent.model} onChange={e => onChange('model', e.target.value)}>
                  <option value="GPT-4o">GPT-4o</option>
                  <option value="GPT-4 Turbo">GPT-4 Turbo</option>
                  <option value="Claude 3.5">Claude 3.5 Sonnet</option>
                  <option value="Claude 4">Claude 4 Opus</option>
                  <option value="DeepSeek V4">DeepSeek V4</option>
                  <option value="RAG">RAG</option>
                </select>
              </FormField>
            </div>
            <div style={{ flex: 1 }}>
              <FormField label="分类">
                <select style={formInput} value={agent.category} onChange={e => onChange('category', e.target.value)}>
                  <option value="分析">分析</option>
                  <option value="检索">检索</option>
                  <option value="生成">生成</option>
                  <option value="处理">处理</option>
                </select>
              </FormField>
            </div>
          </div>
        </Section>

        <div className="bamboo-divider" style={{ margin: '16px 0' }} />

        {/* System Prompt Section */}
        <Section title="系统提示词">
          <div className="woven-border" style={{ backgroundColor: '#1C1B18' }}>
            <textarea
              className="focus-glow"
              style={{
                ...formInput, height: 140, resize: 'vertical', border: 'none',
                backgroundColor: 'transparent', fontFamily: 'JetBrains Mono, monospace', fontSize: 12,
              }}
              value={agent.systemPrompt}
              onChange={e => onChange('systemPrompt', e.target.value)}
              placeholder="输入系统提示词…" />
          </div>
        </Section>

        <div className="bamboo-divider" style={{ margin: '16px 0' }} />

        {/* Parameters Section */}
        <Section title="参数设置">
          <div style={{ display: 'flex', gap: 12 }}>
            <div style={{ flex: 1 }}>
              <FormField label="温度">
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <input type="range" min="0" max="2" step="0.1" value={agent.temperature}
                    onChange={e => onChange('temperature', parseFloat(e.target.value))}
                    style={{ flex: 1, accentColor: '#D4A853' }} />
                  <span style={{ fontSize: 12, color: '#D4A853', fontFamily: 'JetBrains Mono, monospace', minWidth: 28, textAlign: 'right' }}>
                    {agent.temperature}
                  </span>
                </div>
              </FormField>
            </div>
            <div style={{ flex: 1 }}>
              <FormField label="最大 Token">
                <input style={formInput} type="number" value={agent.maxTokens}
                  onChange={e => onChange('maxTokens', parseInt(e.target.value))} />
              </FormField>
            </div>
          </div>
          <FormField label="启用记忆">
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <button onClick={() => onChange('memory', !agent.memory)} style={{
                width: 36, height: 20, borderRadius: 10, border: 'none', cursor: 'pointer', position: 'relative',
                backgroundColor: agent.memory ? 'rgba(91,123,107,0.6)' : '#3A3730', transition: 'background-color 0.2s',
              }}>
                <div style={{
                  width: 16, height: 16, borderRadius: '50%', backgroundColor: '#EBE5D9',
                  position: 'absolute', top: 2, left: agent.memory ? 18 : 2, transition: 'left 0.2s',
                }} />
              </button>
              <span style={{ fontSize: 12, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>
                {agent.memory ? '已启用 — Agent 将保留对话上下文' : '已禁用'}
              </span>
            </div>
          </FormField>
        </Section>

        {/* Save bar */}
        <div style={{ marginTop: 24, padding: '14px 16px', backgroundColor: '#252320', border: '1px solid #3A3730', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 11, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>修改于 2026-06-13 14:30</span>
          <div style={{ display: 'flex', gap: 8 }}>
            <button style={actionBtnStyle}>重置</button>
            <button onClick={onSave} style={{...actionBtnStyle, backgroundColor: 'rgba(212,168,83,0.1)', borderColor: 'rgba(212,168,83,0.25)', color: '#D4A853' }}>
              保存修改
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div>
      <div style={{ fontSize: 12, fontWeight: 600, color: '#D4A853', marginBottom: 12, fontFamily: 'Inter, sans-serif', letterSpacing: '0.5px' }}>
        {title}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {children}
      </div>
    </div>
  );
}

function FormField({ label, children }) {
  return (
    <div>
      <label style={{ display: 'block', fontSize: 11, color: '#9E988B', marginBottom: 5, fontWeight: 500, fontFamily: 'Inter, sans-serif' }}>
        {label}
      </label>
      {children}
    </div>
  );
}

const formInput = {
  width: '100%', padding: '7px 10px', fontSize: 12,
  backgroundColor: '#1C1B18', border: '1px solid #3A3730',
  color: '#EBE5D9', borderRadius: 2, fontFamily: 'Inter, sans-serif',
};

const actionBtnStyle = {
  padding: '5px 14px', fontSize: 11, cursor: 'pointer', fontWeight: 500, fontFamily: 'Inter, sans-serif',
  backgroundColor: 'transparent', border: '1px solid #3A3730', color: '#9E988B',
  transition: 'all 0.15s',
};

// ─── MEMORY PANEL ─────────────────────────
function MemoryPanel({ agent }) {
  if (!agent) return (
    <div style={{
      width: 240, flexShrink: 0,
      backgroundColor: '#252320',
      borderLeft: '1px solid #3A3730',
      padding: 16,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <span style={{ color: '#9E988B', fontSize: 12, fontFamily: 'Inter, sans-serif', textAlign: 'center' }}>
        选择 Agent 查看记忆
      </span>
    </div>
  );

  const memories = agent.memory ? [
    { key: '会话数', value: '24' },
    { key: '总 Token', value: '128,450' },
    { key: '平均延迟', value: '1.2s' },
    { key: '成功率', value: '98.7%' },
  ] : [];

  return (
    <div style={{
      width: 240, flexShrink: 0,
      backgroundColor: '#252320',
      borderLeft: '1px solid #3A3730',
      display: 'flex', flexDirection: 'column',
      overflowY: 'auto',
    }}>
      <div style={{ padding: '14px 16px', borderBottom: '1px solid #3A3730' }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>记忆与统计</span>
      </div>

      {agent.memory ? (
        <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          {/* Memory status */}
          <div className="woven-border" style={{ padding: 10, backgroundColor: 'rgba(91,123,107,0.04)' }}>
            <div style={{ fontSize: 11, color: '#5B7B6B', marginBottom: 6, fontFamily: 'Inter, sans-serif', fontWeight: 500 }}>记忆状态</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ flex: 1, height: 4, backgroundColor: '#1C1B18', borderRadius: 2, overflow: 'hidden' }}>
                <div style={{ width: '45%', height: '100%', backgroundColor: '#5B7B6B' }} />
              </div>
              <span style={{ fontSize: 10, color: '#9E988B', fontFamily: 'JetBrains Mono, monospace' }}>45%</span>
            </div>
          </div>

          {/* Stats */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#9E988B', marginBottom: 8, fontFamily: 'Inter, sans-serif' }}>统计</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {memories.map(m => (
                <div key={m.key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0' }}>
                  <span style={{ fontSize: 12, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>{m.key}</span>
                  <span style={{ fontSize: 12, fontWeight: 600, color: '#EBE5D9', fontFamily: 'JetBrains Mono, monospace' }}>{m.value}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="bamboo-divider" />

          {/* Recent conversations */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#9E988B', marginBottom: 8, fontFamily: 'Inter, sans-serif' }}>最近对话</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {['用户询问产品特性', '系统返回检索结果', '用户追问细节', 'Agent 生成回复'].map((item, i) => (
                <div key={i} style={{
                  padding: '6px 8px', fontSize: 11, color: '#EBE5D9',
                  backgroundColor: '#1C1B18', borderLeft: '2px solid #3A3730',
                  fontFamily: 'Inter, sans-serif',
                }}>
                  {item}
                </div>
              ))}
            </div>
          </div>

          <button style={{
            width: '100%', padding: '6px 0', fontSize: 11, cursor: 'pointer',
            backgroundColor: 'transparent', border: '1px solid #C4684A', color: '#C4684A',
            fontFamily: 'Inter, sans-serif', transition: 'all 0.15s',
          }}>
            清除记忆
          </button>
        </div>
      ) : (
        <div style={{ padding: '14px 16px' }}>
          <div className="woven-border" style={{ padding: 12, textAlign: 'center' }}>
            <span style={{ fontSize: 12, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>此 Agent 未启用记忆功能</span>
          </div>
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#9E988B', marginBottom: 8, fontFamily: 'Inter, sans-serif' }}>统计</div>
            {memories.map(m => (
              <div key={m.key} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0' }}>
                <span style={{ fontSize: 12, color: '#9E988B' }}>{m.key}</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: '#EBE5D9', fontFamily: 'JetBrains Mono, monospace' }}>{m.value}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── HEADER ───────────────────────────────
function Header() {
  return (
    <div style={{
      height: 44, display: 'flex', alignItems: 'center', padding: '0 16px',
      borderBottom: '1px solid #3A3730', backgroundColor: '#252320', gap: 10,
    }}>
      <span style={{ fontSize: 18, fontFamily: '"ZCOOL KaiTi", serif', color: '#D4A853', fontWeight: 700 }}>经纶</span>
      <span style={{ fontSize: 12, color: '#9E988B' }}>/</span>
      <span style={{ fontSize: 13, color: '#EBE5D9', fontWeight: 500, fontFamily: 'Inter, sans-serif' }}>Agent 编辑器</span>
      <div style={{ flex: 1 }} />
      <span className="seal-badge">本地开发</span>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────
function App() {
  const [agents, setAgents] = useState(INITIAL_AGENTS);
  const [selectedId, setSelectedId] = useState('a1');

  const selectedAgent = agents.find(a => a.id === selectedId) || null;

  const handleSelect = (id) => setSelectedId(id);

  const handleChange = (key, value) => {
    setAgents(prev => prev.map(a => a.id === selectedId ? { ...a, [key]: value } : a));
  };

  const handleSave = () => {
    // Simulated save
    alert('Agent 配置已保存');
  };

  const handleNew = () => {
    const newId = 'a' + (agents.length + 1);
    const newAgent = {
      id: newId, name: '新建 Agent', model: 'GPT-4o', category: '分析',
      status: 'draft', description: '', systemPrompt: '', temperature: 0.7, maxTokens: 4096, memory: false,
    };
    setAgents(prev => [...prev, newAgent]);
    setSelectedId(newId);
  };

  const handleDuplicate = () => {
    if (!selectedAgent) return;
    const newId = 'a' + (agents.length + 1);
    setAgents(prev => [...prev, { ...selectedAgent, id: newId, name: selectedAgent.name + ' (副本)', status: 'draft' }]);
    setSelectedId(newId);
  };

  const handleDelete = (id) => {
    setAgents(prev => prev.filter(a => a.id !== id));
    if (selectedId === id) setSelectedId(null);
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <AgentList
          agents={agents}
          selectedId={selectedId}
          onSelect={handleSelect}
          onNew={handleNew}
          onDelete={handleDelete}
        />
        <EditorForm
          agent={selectedAgent}
          onChange={handleChange}
          onSave={handleSave}
          onDuplicate={handleDuplicate}
        />
        <MemoryPanel agent={selectedAgent} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
