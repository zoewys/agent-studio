<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经纶 · 画布 — Agent 工作流编辑器</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KaiTi&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'loom-ink': '#1C1B18',
        'loom-surface': '#252320',
        'loom-hover': '#2D2B27',
        'loom-border': '#3A3730',
        'gold-thread': '#D4A853',
        'jade-ink': '#5B7B6B',
        'silk': '#EBE5D9',
        'parchment': '#9E988B',
        'vermillion': '#C4684A',
        'amber-thread': '#C4964A',
      },
      fontFamily: {
        brand: ['"ZCOOL KaiTi"', 'serif'],
        display: ['"Noto Serif SC"', 'serif'],
        ui: ['Inter', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'monospace'],
      },
      borderRadius: {
        sm: '2px',
      },
    }
  }
}
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: #1C1B18;
  color: #EBE5D9;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #1C1B18; }
::-webkit-scrollbar-thumb { background: #3A3730; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4A4740; }

/* Loom Grid Background */
.loom-grid {
  background-color: #1C1B18;
  background-image:
    linear-gradient(rgba(212,168,83,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,83,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Woven Border — double-nested border effect */
.woven-border {
  border: 1px solid #3A3730;
  box-shadow:
    inset 0 0 0 1px rgba(212,168,83,0.08),
    0 1px 3px rgba(0,0,0,0.3);
}
.woven-border:hover {
  border-color: rgba(212,168,83,0.25);
}

/* Gold Thread Glow */
.gold-thread-glow {
  border-color: #D4A853 !important;
  box-shadow:
    inset 0 0 0 1px rgba(212,168,83,0.15),
    0 0 12px rgba(212,168,83,0.2),
    0 0 24px rgba(212,168,83,0.08);
}

/* Bamboo Divider */
.bamboo-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #3A3730 20%, #3A3730 80%, transparent);
  position: relative;
}
.bamboo-divider::after {
  content: '';
  position: absolute;
  left: 50%;
  top: -2px;
  transform: translateX(-50%);
  width: 16px;
  height: 5px;
  background: #3A3730;
  border-radius: 2px;
}

/* Seal Badge */
.seal-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'ZCOOL KaiTi', serif;
  font-size: 10px;
  padding: 2px 8px;
  border: 1px solid #3A3730;
  color: #9E988B;
  background: rgba(37,35,32,0.8);
  letter-spacing: 1px;
  position: relative;
}
.seal-badge::before {
  content: '';
  position: absolute;
  inset: 1px;
  border: 1px solid rgba(212,168,83,0.06);
  pointer-events: none;
}

/* Gold Shimmer Animation */
@keyframes goldShimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
.gold-shimmer-bg {
  background: linear-gradient(110deg,
    rgba(212,168,83,0) 40%,
    rgba(212,168,83,0.06) 50%,
    rgba(212,168,83,0) 60%
  );
  background-size: 200% 100%;
  animation: goldShimmer 3s ease-in-out infinite;
}

/* Thread Transition */
@keyframes threadTransition {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
.thread-transition {
  animation: threadTransition 0.3s ease-out;
}

/* Node Handle */
.node-handle {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #3A3730;
  border: 1.5px solid #4A4740;
  transition: all 0.2s;
}
.node-handle:hover { background: #D4A853; border-color: #D4A853; }

/* SVG edge styling */
.edge-path {
  fill: none;
  stroke: #3A3730;
  stroke-width: 2;
}
.edge-path.running {
  stroke: #D4A853;
  stroke-dasharray: 6 3;
  animation: dashFlow 0.6s linear infinite;
}
@keyframes dashFlow {
  to { stroke-dashoffset: -18; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── CONSTANTS ────────────────────────────
const INITIAL_NODES = [
  { id: 'start', x: 260, y: 100, label: '用户输入', model: '入口', type: 'trigger', status: 'done' },
  { id: 'agent1', x: 260, y: 240, label: '意图识别', model: 'GPT-4o', type: 'agent', status: 'done' },
  { id: 'agent2', x: 120, y: 380, label: '知识检索', model: 'RAG', type: 'agent', status: 'running' },
  { id: 'agent3', x: 400, y: 380, label: '内容生成', model: 'Claude 3', type: 'agent', status: 'pending' },
  { id: 'end', x: 260, y: 520, label: '结果输出', model: '出口', type: 'output', status: 'pending' },
];
const EDGES = [
  { from: 'start', to: 'agent1' },
  { from: 'agent1', to: 'agent2' },
  { from: 'agent1', to: 'agent3' },
  { from: 'agent2', to: 'end' },
  { from: 'agent3', to: 'end' },
];

const AGENTS = [
  { id: 'a1', name: '意图识别', model: 'GPT-4o', status: 'active' },
  { id: 'a2', name: '知识检索', model: 'RAG', status: 'active' },
  { id: 'a3', name: '内容生成', model: 'Claude 3', status: 'active' },
  { id: 'a4', name: '结果校验', model: 'GPT-4o', status: 'idle' },
  { id: 'a5', name: '数据清洗', model: 'Claude 3', status: 'idle' },
  { id: 'a6', name: '摘要提取', model: 'GPT-3.5', status: 'idle' },
];

// ─── NODE SHAPE ───────────────────────────
function CanvasNode({ node, selected, onSelect, onDragStart }) {
  const statusColors = {
    done: { dot: '#5B7B6B', bg: 'rgba(91,123,107,0.08)', text: '#5B7B6B' },
    running: { dot: '#C4964A', bg: 'rgba(196,150,74,0.08)', text: '#C4964A' },
    pending: { dot: '#3A3730', bg: 'rgba(58,55,48,0.08)', text: '#9E988B' },
    error: { dot: '#C4684A', bg: 'rgba(196,104,74,0.08)', text: '#C4684A' },
  };
  const sc = statusColors[node.status] || statusColors.pending;

  return (
    <div
      className={`woven-border thread-transition`}
      title={node.label}
      style={{
        position: 'absolute',
        left: node.x - 90,
        top: node.y - 32,
        width: 180,
        padding: '12px 14px',
        backgroundColor: selected ? '#252320' : 'rgba(37,35,32,0.9)',
        cursor: 'pointer',
        userSelect: 'none',
        transition: 'border-color 0.2s, box-shadow 0.2s',
      }}
      className={`woven-border thread-transition ${selected ? 'gold-thread-glow' : ''}`}
      onClick={(e) => { e.stopPropagation(); onSelect(node.id); }}
      onMouseDown={(e) => { if (e.target === e.currentTarget) onDragStart(node.id, e); }}
    >
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 7, height: 7, borderRadius: '50%', background: sc.dot }} />
          <span style={{ fontSize: 13, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>
            {node.label}
          </span>
        </div>
        <span className="seal-badge">{node.model}</span>
      </div>
      <div style={{ fontSize: 11, color: sc.text, fontFamily: 'JetBrains Mono, monospace' }}>
        {node.status === 'running' ? '运行中…' : node.status === 'done' ? '完成' : node.status === 'error' ? '错误' : '待执行'}
      </div>
    </div>
  );
}

// ─── SVG EDGES ────────────────────────────
function EdgeLayer({ edges, nodes }) {
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  const paths = edges.map((e, i) => {
    const from = nodeMap[e.from];
    const to = nodeMap[e.to];
    if (!from || !to) return null;
    const x1 = from.x, y1 = from.y + 32;
    const x2 = to.x, y2 = to.y - 32;
    const midY = (y1 + y2) / 2;
    const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;
    const isRunning = from.status === 'done' && (to.status === 'running' || to.status === 'done');
    return <path key={i} d={d} className={`edge-path ${isRunning ? 'running' : ''}`} />;
  });

  return (
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0 }}>
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#3A3730" />
        </marker>
      </defs>
      {paths}
    </svg>
  );
}

// ─── MINIMAP ──────────────────────────────
function MiniMap({ nodes, edges, viewportW, viewportH }) {
  const scale = 0.2;
  const w = 800 * scale;
  const h = 700 * scale;
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  return (
    <div style={{
      position: 'absolute', bottom: 12, right: 12,
      width: w + 16, padding: 8,
      backgroundColor: 'rgba(37,35,32,0.92)',
      border: '1px solid #3A3730',
      zIndex: 20,
    }}>
      <svg width={w} height={h} style={{ display: 'block' }}>
        {edges.map((e, i) => {
          const f = nodeMap[e.from], t = nodeMap[e.to];
          if (!f || !t) return null;
          return <line key={i} x1={f.x*scale} y1={f.y*scale} x2={t.x*scale} y2={t.y*scale} stroke="#3A3730" strokeWidth={1} />;
        })}
        {nodes.map(n => (
          <rect key={n.id} x={n.x*scale-18} y={n.y*scale-6} width={36} height={12} rx={1}
            fill={n.status==='done'?'#5B7B6B':n.status==='running'?'#C4964A':'#252320'}
            stroke="#3A3730" strokeWidth={0.5}
          />
        ))}
        <rect x={(viewportW/2-300)*scale} y={50*scale} width={600*scale} height={400*scale}
          fill="none" stroke="rgba(212,168,83,0.3)" strokeWidth={1} strokeDasharray="3 2" />
      </svg>
      <div style={{ fontSize: 9, color: '#9E988B', textAlign: 'center', marginTop: 4, fontFamily: 'Inter, sans-serif' }}>缩略图</div>
    </div>
  );
}

// ─── TOOLBAR ──────────────────────────────
function Toolbar({ onRun, isRunning }) {
  return (
    <div style={{
      height: 48, display: 'flex', alignItems: 'center', padding: '0 16px',
      borderBottom: '1px solid #3A3730',
      backgroundColor: '#252320',
      gap: 8,
    }}>
      <span style={{ fontSize: 20, fontFamily: '"ZCOOL KaiTi", serif', color: '#D4A853', fontWeight: 700, marginRight: 16 }}>
        经纶
      </span>
      <div className="bamboo-divider" style={{ width: 1, height: 24, background: 'linear-gradient(180deg, transparent, #3A3730, transparent)' }} />
      <button style={toolbarBtnStyle} title="保存">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button style={{...toolbarBtnStyle, background: isRunning ? 'rgba(196,150,74,0.15)' : 'rgba(91,123,107,0.12)', borderColor: isRunning ? 'rgba(196,150,74,0.3)' : 'rgba(91,123,107,0.25)'}}
        onClick={onRun}>
        {isRunning ? '⏹ 停止' : '▶ 运行'}
      </button>
      <div style={{ flex: 1 }} />
      <span style={{ fontSize: 12, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>未命名工作流</span>
      <div className="bamboo-divider" style={{ width: 1, height: 24, background: 'linear-gradient(180deg, transparent, #3A3730, transparent)' }} />
      <button style={toolbarBtnStyle} title="撤销">↩</button>
      <button style={toolbarBtnStyle} title="重做">↪</button>
      <button style={toolbarBtnStyle} title="放大">⊕</button>
      <span style={{ fontSize: 12, color: '#9E988B', fontFamily: 'JetBrains Mono, monospace', minWidth: 36, textAlign: 'center' }}>100%</span>
      <button style={toolbarBtnStyle} title="缩小">⊖</button>
    </div>
  );
}

const toolbarBtnStyle = {
  width: 32, height: 32,
  display: 'flex', alignItems: 'center', justifyContent: 'center',
  background: 'transparent', border: '1px solid transparent',
  color: '#9E988B', cursor: 'pointer', fontSize: 14, borderRadius: 2,
  fontFamily: 'Inter, sans-serif',
  transition: 'all 0.15s',
};

// ─── AGENT SIDEBAR ────────────────────────
function AgentSidebar({ agents, onDragAgent }) {
  const [filter, setFilter] = useState('');

  const filtered = agents.filter(a => a.name.includes(filter) || a.model.toLowerCase().includes(filter.toLowerCase()));

  return (
    <div style={{
      width: 220, flexShrink: 0,
      backgroundColor: '#252320',
      borderRight: '1px solid #3A3730',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ padding: '12px', borderBottom: '1px solid #3A3730' }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: '#EBE5D9', marginBottom: 8, fontFamily: 'Inter, sans-serif' }}>Agent 列表</div>
        <input
          placeholder="搜索 Agent…"
          value={filter}
          onChange={e => setFilter(e.target.value)}
          style={{
            width: '100%', padding: '6px 10px', fontSize: 12,
            backgroundColor: '#1C1B18', border: '1px solid #3A3730', color: '#EBE5D9',
            borderRadius: 2, outline: 'none', fontFamily: 'Inter, sans-serif',
          }}
          onFocus={e => e.target.style.borderColor = '#D4A853'}
          onBlur={e => e.target.style.borderColor = '#3A3730'}
        />
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 0' }}>
        {filtered.map(a => (
          <div
            key={a.id}
            draggable
            onDragStart={(e) => onDragAgent(a, e)}
            style={{
              padding: '10px 12px', margin: '2px 8px',
              cursor: 'grab',
              backgroundColor: a.status === 'active' ? 'rgba(91,123,107,0.06)' : 'transparent',
              borderLeft: a.status === 'active' ? '2px solid #5B7B6B' : '2px solid transparent',
              transition: 'all 0.15s',
            }}
            onMouseEnter={e => { if (a.status !== 'active') e.currentTarget.style.backgroundColor = 'rgba(45,43,39,0.5)'; }}
            onMouseLeave={e => { if (a.status !== 'active') e.currentTarget.style.backgroundColor = 'transparent'; }}
          >
            <div style={{ fontSize: 13, color: '#EBE5D9', marginBottom: 3, fontFamily: 'Inter, sans-serif' }}>{a.name}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span className="seal-badge" style={{ fontSize: 9 }}>{a.model}</span>
              <span style={{ fontSize: 10, color: a.status === 'active' ? '#5B7B6B' : '#9E988B' }}>
                {a.status === 'active' ? '活跃' : '空闲'}
              </span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── PROPERTY PANEL ───────────────────────
function PropertyPanel({ node }) {
  if (!node) return (
    <div style={{
      width: 240, flexShrink: 0,
      backgroundColor: '#252320',
      borderLeft: '1px solid #3A3730',
      padding: 16,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <span style={{ color: '#9E988B', fontSize: 12, fontFamily: 'Inter, sans-serif' }}>选择一个节点查看属性</span>
    </div>
  );

  return (
    <div style={{
      width: 240, flexShrink: 0,
      backgroundColor: '#252320',
      borderLeft: '1px solid #3A3730',
      display: 'flex', flexDirection: 'column',
      overflowY: 'auto',
    }}>
      <div style={{ padding: '14px 16px', borderBottom: '1px solid #3A3730' }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: '#EBE5D9', fontFamily: 'Inter, sans-serif' }}>节点属性</span>
      </div>
      <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div>
          <label style={propLabel}>名称</label>
          <input style={propInput} defaultValue={node.label} />
        </div>
        <div>
          <label style={propLabel}>模型</label>
          <input style={propInput} defaultValue={node.model} />
        </div>
        <div>
          <label style={propLabel}>类型</label>
          <select style={propSelect} defaultValue={node.type}>
            <option value="trigger">触发器</option>
            <option value="agent">Agent</option>
            <option value="output">输出</option>
          </select>
        </div>
        <div>
          <label style={propLabel}>状态</label>
          <div style={{ marginTop: 4 }}>
            <span className="seal-badge" style={{
              borderColor: node.status === 'done' ? '#5B7B6B' : node.status === 'running' ? '#C4964A' : '#3A3730',
              color: node.status === 'done' ? '#5B7B6B' : node.status === 'running' ? '#C4964A' : '#9E988B',
            }}>
              {node.status === 'done' ? '完成' : node.status === 'running' ? '运行中' : node.status === 'error' ? '错误' : '待执行'}
            </span>
          </div>
        </div>
        <div className="bamboo-divider" style={{ margin: '4px 0' }} />
        <div>
          <label style={propLabel}>系统提示词</label>
          <textarea style={{...propInput, height: 80, resize: 'vertical'}} defaultValue="你是一个专业的AI助手，请根据用户输入执行相应任务。" />
        </div>
        <div>
          <label style={propLabel}>温度</label>
          <input style={propInput} type="number" defaultValue="0.7" min="0" max="2" step="0.1" />
        </div>
        <div>
          <label style={propLabel}>最大 Token</label>
          <input style={propInput} type="number" defaultValue="4096" />
        </div>
      </div>
    </div>
  );
}

const propLabel = { fontSize: 11, color: '#9E988B', display: 'block', marginBottom: 4, fontWeight: 500, fontFamily: 'Inter, sans-serif' };
const propInput = {
  width: '100%', padding: '6px 8px', fontSize: 12,
  backgroundColor: '#1C1B18', border: '1px solid #3A3730', color: '#EBE5D9',
  borderRadius: 2, outline: 'none', fontFamily: 'Inter, sans-serif',
};
const propSelect = {
  ...propInput, cursor: 'pointer',
};

// ─── MAIN APP ─────────────────────────────
function App() {
  const [nodes, setNodes] = useState(INITIAL_NODES);
  const [selectedId, setSelectedId] = useState(null);
  const [isRunning, setIsRunning] = useState(false);
  const [dragging, setDragging] = useState(null);
  const canvasRef = useRef(null);

  const selectedNode = nodes.find(n => n.id === selectedId) || null;

  const handleSelect = useCallback((id) => {
    setSelectedId(id);
  }, []);

  const handleCanvasClick = useCallback(() => {
    setSelectedId(null);
  }, []);

  const handleDragStart = useCallback((id, e) => {
    setDragging({ id, ox: e.clientX, oy: e.clientY });
  }, []);

  useEffect(() => {
    if (!dragging) return;
    const onMove = (e) => {
      setNodes(prev => prev.map(n => {
        if (n.id !== dragging.id) return n;
        return { ...n, x: n.x + (e.clientX - dragging.ox), y: n.y + (e.clientY - dragging.oy) };
      }));
      setDragging({ id: dragging.id, ox: e.clientX, oy: e.clientY });
    };
    const onUp = () => setDragging(null);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [dragging]);

  const handleRun = () => {
    if (isRunning) { setIsRunning(false); return; }
    setIsRunning(true);
    setNodes(prev => prev.map(n => ({ ...n, status: n.id === 'agent2' || n.id === 'agent3' ? 'running' : n.status })));
  };

  const handleDragAgent = (agent, e) => {
    e.dataTransfer.setData('text/plain', agent.id);
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Toolbar onRun={handleRun} isRunning={isRunning} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <AgentSidebar agents={AGENTS} onDragAgent={handleDragAgent} />
        <div
          ref={canvasRef}
          className="loom-grid"
          onClick={handleCanvasClick}
          style={{
            flex: 1, position: 'relative', overflow: 'hidden',
            minWidth: 0,
          }}
        >
          <EdgeLayer edges={EDGES} nodes={nodes} />
          {nodes.map(node => (
            <CanvasNode
              key={node.id}
              node={node}
              selected={selectedId === node.id}
              onSelect={handleSelect}
              onDragStart={handleDragStart}
            />
          ))}
          <MiniMap nodes={nodes} edges={EDGES} viewportW={800} viewportH={700} />
        </div>
        <PropertyPanel node={selectedNode} />
      </div>
      <div style={{
        height: 28, display: 'flex', alignItems: 'center', padding: '0 12px',
        borderTop: '1px solid #3A3730',
        backgroundColor: '#1C1B18',
        gap: 16,
      }}>
        <span style={{ fontSize: 10, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>节点: {nodes.length}</span>
        <span style={{ fontSize: 10, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>连线: {EDGES.length}</span>
        <span style={{ fontSize: 10, color: '#9E988B', fontFamily: 'Inter, sans-serif' }}>缩放: 100%</span>
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 10, color: '#5B7B6B', fontFamily: 'Inter, sans-serif' }}>
          {isRunning ? '工作流运行中…' : '就绪'}
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
