<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — Run Detail — 霓渊 Neon Abyss</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'abyss':'#0A0A0F','abyss-surface':'#12121A','abyss-hover':'#1A1A2E','abyss-border':'#2A2A40',
            'neon-pink':'#FF006E','neon-pink-dim':'#CC0058','tritium':'#00F0FF','tritium-dim':'#00B8CC',
            'neon-purple':'#B367FF','neon-green':'#00FF88','neon-red':'#FF3355','neon-amber':'#FFAA00',
            'text-neon':'#E0E0F0','text-neon-dim':'#7B7B9A',
          },
          fontFamily: {
            display:['"Orbitron"','sans-serif'],ui:['"Inter"','system-ui','sans-serif'],mono:['"JetBrains Mono"','monospace'],
          },
          animation: {
            'neon-pulse':'neonPulse 2s ease-in-out infinite','scan-line':'scanLine 8s linear infinite',
            'glitch-text':'glitch 0.3s ease-in-out infinite','fade-in':'fadeIn 0.2s ease-out',
            'terminal-cursor':'blink 1s step-end infinite',
          },
          keyframes: {
            neonPulse:{'0%,100%':{opacity:'1'},'50%':{opacity:'0.6'}},
            scanLine:{'0%':{transform:'translateY(-100%)'},'100%':{transform:'translateY(100vh)'}},
            glitch:{'0%,100%':{transform:'translate(0)'},'20%':{transform:'translate(-1px,1px)'},'40%':{transform:'translate(1px,-1px)'},'60%':{transform:'translate(-1px,-1px)'},'80%':{transform:'translate(1px,1px)'}},
            fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},
            blink:{'0%,100%':{opacity:'1'},'50%':{opacity:'0'}},
          },
        }
      }
    }
  </script>

  <style>
    * { scrollbar-width:thin;scrollbar-color:rgba(0,240,255,0.12) transparent; }
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.12);}

    .scanlines::after{
      content:'';position:absolute;inset:0;pointer-events:none;z-index:100;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,0.012) 2px,rgba(0,240,255,0.012) 4px);
    }
    .neon-glow{box-shadow:0 0 5px rgba(255,0,110,0.4),0 0 15px rgba(255,0,110,0.1);}
    .neon-glow-blue{box-shadow:0 0 5px rgba(0,240,255,0.4),0 0 15px rgba(0,240,255,0.1);}
    .neon-text-pink{text-shadow:0 0 10px rgba(255,0,110,0.5);}
    .neon-text-cyan{text-shadow:0 0 10px rgba(0,240,255,0.5);}
    .neon-text-green{text-shadow:0 0 10px rgba(0,255,136,0.5);}

    /* Terminal transcript */
    .terminal-line{border-left:1px solid rgba(0,255,136,0.15);position:relative;}
    .terminal-line::before{content:'>';position:absolute;left:-14px;color:rgba(0,255,136,0.3);font-size:10px;font-family:'JetBrains Mono',monospace;}

    .smooth-neon{transition:all 0.2s ease-out;}
    .hud-panel{border:1px solid rgba(0,240,255,0.1);position:relative;}
    .hud-panel::before{content:'';position:absolute;top:-1px;left:4px;right:4px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.2),transparent);}
  </style>
</head>
<body class="bg-abyss text-text-neon font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    function DetailHeader() {

              <svg className="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 3L5 8l5 5"/></svg>
            </button>
            <input className="bg-transparent text-xs font-mono font-bold text-tritium border-b border-transparent hover:border-tritium/30 focus:border-tritium/50 outline-none px-1 w-52" defaultValue="BUGFIX: MEMORY_LEAK"/>
            <StatusBadge status="running"/>
          </div>
          <div className="flex items-center gap-2 font-mono text-[9px]">
            <span className="text-text-neon-dim">TOK:<span className="text-tritium neon-text-cyan ml-1">3,128</span></span>
            <span className="text-abyss-border">|</span>
            <span className="text-text-neon-dim">COST:<span className="text-neon-amber ml-1">$0.42</span></span>

    function RunsSidebar({ activeRun, onSelect }) {
      return (
        <aside className="w-52 shrink-0 border-r border-abyss-border bg-abyss-surface/40 flex flex-col">
          <div className="p-3 space-y-2 border-b border-abyss-border">
            <div className="flex items-center gap-2 px-2 py-1.5 bg-abyss border border-abyss-border text-text-neon-dim text-[10px] font-mono">
              <span className="text-tritium/50">&gt;</span>

              {['ALL','RUN','DONE','ERR'].map(f=>(
                <button key={f} className={`px-2 py-0.5 border smooth-neon ${f==='ALL'?'border-tritium/20 bg-tritium/5 text-tritium':'border-transparent text-text-neon-dim hover:text-tritium'}`}>{f}</button>

          </div>
          <div className="flex-1 overflow-y-auto">
            {RUNS.map((r,i)=>(
              <div key={i} onClick={()=>onSelect(i)}
                className={`px-3 py-2.5 cursor-pointer smooth-neon border-b border-abyss-border/50 ${
                  activeRun===i ? 'bg-neon-pink/5 border-l-[2px] border-l-neon-pink neon-glow' : 'border-l-[2px] border-l-transparent hover:bg-abyss-hover/40'

                <div className="flex items-start justify-between gap-1">
                  <span className="text-[10px] font-mono font-bold text-text-neon-dim truncate">{r.name}</span>

                <div className="flex items-center gap-2 mt-1 text-[8px] font-mono text-text-neon-dim/60">

                </div>
              </div>
            ))}
          </div>
          <div className="p-2 border-t border-abyss-border">
            <button className="w-full py-2 font-mono text-[9px] font-bold uppercase tracking-wider text-neon-pink border border-neon-pink/25 bg-neon-pink/5 hover:bg-neon-pink/10 neon-glow smooth-neon">+ NEW TASK</button>
          </div>
        </aside>
      );
    }

    function StepChips({ steps, activeStep, onStepClick }) {
      return (
        <div className="flex items-center gap-1 px-4 py-2.5 overflow-x-auto border-b border-abyss-border shrink-0 font-mono text-[9px]">
          {steps.map((s,i)=>(
            <React.Fragment key={s.id}>
              {i>0&&<span className="text-abyss-border mx-0.5 font-bold">→</span>}
              <button onClick={()=>onStepClick(i)}

                }`}>
                <span className={`w-4 h-4 flex items-center justify-center text-[8px] font-bold ${
                  s.status==='done'?'bg-neon-green/15 text-neon-green':
                  s.status==='running'?'bg-neon-amber/15 text-neon-amber animate-neon-pulse':
                  'bg-abyss-hover text-text-neon-dim'}`}>
                  {s.status==='done'?'✓':s.status==='running'?'▶':s.id}
                </span>
                {s.label}
              </button>
            </React.Fragment>
          ))}
        </div>
      );
    }

    function ParallelGroup({ group }) {
      return (
        <div className="flex items-center gap-1.5 px-2 py-1 border border-tritium/15 bg-tritium/3">
          <span className="text-[8px] font-mono text-tritium-dim">PAR:</span>
          {group.map(g=>(
            <span key={g.id} className={`text-[8px] px-1.5 py-0.5 font-mono ${
              g.status==='running'?'text-neon-amber bg-neon-amber/8':'text-text-neon-dim bg-abyss-hover/50'
            }`}>{g.label}</span>
          ))}
        </div>
      );
    }

    function PromptViewer() {
      const [expanded,setExpanded]=useState(false);
      return (
        <div className="border-b border-abyss-border shrink-0">
          <button onClick={()=>setExpanded(!expanded)}
            className="w-full flex items-center justify-between px-4 py-2 text-[10px] font-mono text-text-neon-dim hover:text-tritium smooth-neon uppercase tracking-wider">
            <span className="flex items-center gap-2">[ PROMPT ]</span>
            <span className="transform smooth-neon" style={{transform:expanded?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
          </button>
          {expanded&&(
            <div className="px-4 pb-3 animate-fade-in">
              <pre className="p-3 bg-abyss border border-abyss-border text-[10px] font-mono text-tritium-dim leading-relaxed whitespace-pre-wrap">
                {'>'} 在 src/auth/token.ts 中实现 JWT 自动刷新{'\n'}
                {'>'} 要求：过期前 5min 刷新 / 重试 3 次 / 指数退避{'\n'}
                {'>'} 上下文：密钥存储在 ENV 变量中</pre>
            </div>
          )}

      );
    }

    function TerminalTranscript({ events }) {
      return (
        <div className="flex-1 overflow-y-auto px-4 py-3 min-h-0 bg-abyss">
          <div className="text-[8px] font-mono text-text-neon-dim/50 mb-3 uppercase tracking-widest border-b border-abyss-border pb-2">
            ── SESSION_LOG // BUGFIX:MEMORY_LEAK ──────────────────────────
          </div>
          {events.map((e,i)=>(
            <div key={i} className="terminal-line pl-5 py-1.5 text-[10px] font-mono leading-relaxed">
              <span className="text-text-neon-dim/40 mr-2">[{e.time}]</span>
              <span className={
                e.type==='think'?'text-neon-purple/70 italic':
                e.type==='tool'?'text-neon-amber':
                e.type==='text'?'text-neon-green neon-text-green':
                e.type==='error'?'text-neon-red':
                'text-text-neon-dim/60'
              }>{e.content}</span>
            </div>

            <span className="text-neon-green animate-pulse">█</span>
            <span className="text-neon-green/50 ml-1 animate-neon-pulse">processing...</span>
          </div>
        </div>
      );
    }

    function ArtifactCards({ artifacts, onPreview }) {
      const extCol={ts:'text-tritium',tsx:'text-tritium',md:'text-neon-purple',json:'text-neon-amber'};
      return (
        <div className="border-t border-abyss-border px-4 py-2.5 shrink-0">
          <span className="text-[8px] font-mono text-text-neon-dim/60 uppercase tracking-widest mb-2 block">// ARTIFACTS</span>

            {artifacts.map((a,i)=>(

                <span className={`text-[10px] font-mono font-bold ${extCol[a.type]||'text-text-neon-dim'}`}>.{a.type}</span>

    function MemoryRefs({ memories }) {
      const [expanded,setExpanded]=useState(false);
      return (
        <div className="border-t border-abyss-border shrink-0">
          <button onClick={()=>setExpanded(!expanded)}
            className="w-full flex items-center justify-between px-4 py-2 text-[10px] font-mono text-text-neon-dim hover:text-tritium smooth-neon uppercase tracking-wider">

            <span className="transform smooth-neon" style={{transform:expanded?'rotate(180deg)':'rotate(0deg)'}}>▼</span>

          {expanded&&(
            <div className="px-4 pb-2 space-y-1 animate-fade-in">

                      m.cat==='preference'?'bg-neon-pink/10 text-neon-pink':
                      m.cat==='knowledge'?'bg-tritium/10 text-tritium':
                      'bg-neon-red/10 text-neon-red'}`}>{m.cat}</span>
                    <span className="text-text-neon-dim truncate">{m.text}</span>
                  </div>

                    <span className="text-[7px] text-text-neon-dim/50">{m.scope}</span>

    function ComposerBar() {
      return (
        <div className="border-t border-abyss-border p-3 shrink-0 bg-abyss-surface/60">

          </div>
          <div className="flex items-center gap-3 mt-1.5 text-[8px] font-mono text-text-neon-dim/50 uppercase">
            <span>TARGET: <span className="text-neon-pink/70">Frontend_Dev [CLAUDE_SONNET]</span></span>
            <span>|</span>
            <span>ENTER:SEND // SHIFT+ENTER:NEWLINE</span>
          </div>
        </div>
      );
    }

    function FilePreviewPanel({ file, onClose }) {
      const [tab,setTab]=useState('code');
      if(!file) return null;
      const content=`// src/auth/token.ts
import jwt from 'jsonwebtoken';
import { env } from '../config';

const REFRESH_WINDOW = 5 * 60 * 1000;
const MAX_RETRIES = 3;

export async function refreshToken(
  currentToken: string
): Promise<string> {
  const decoded = jwt.decode(currentToken);
  const expiresAt = decoded.exp * 1000;
  if (expiresAt - Date.now() > REFRESH_WINDOW)
    return currentToken;

  let retries = 0;
  while (retries < MAX_RETRIES) {
    try {
      return (await fetch(/*...*/)).data.token;
    } catch {
      retries++;
      await sleep(2 ** retries * 100);
    }
  }
  throw new Error('REFRESH_FAILED');
}`;

      return (
        <aside className="w-80 shrink-0 border-l border-abyss-border bg-abyss-surface flex flex-col animate-fade-in scanlines">
          <div className="flex items-center justify-between px-3 py-2 border-b border-abyss-border font-mono text-[9px]">
            <div className="flex items-center gap-2">
              <span className="text-tritium">📄</span>
              <span className="text-tritium font-bold">{file.name}</span>
              <span className="text-neon-green/60">{file.size}</span>
            </div>
            <button onClick={onClose} className="p-1 text-text-neon-dim hover:text-neon-red smooth-neon font-bold">✕</button>
          </div>
          <div className="flex border-b border-abyss-border font-mono text-[9px] uppercase tracking-wider">
            {['CODE','PREVIEW','DIFF'].map(t=>(
              <button key={t} onClick={()=>setTab(t.toLowerCase())}
                className={`px-4 py-2 smooth-neon border-b-2 font-bold ${
                  tab===t.toLowerCase()?'border-neon-pink text-neon-pink neon-text-pink':'border-transparent text-text-neon-dim hover:text-tritium'
                }`}>{t}</button>
            ))}
          </div>
          <div className="flex-1 overflow-y-auto p-3">
            {tab==='code'&&<pre className="text-[10px] font-mono text-neon-green leading-relaxed whitespace-pre overflow-x-auto neon-text-green"><code>{content}</code></pre>}
            {tab==='preview'&&(
              <div className="text-[10px] font-mono text-text-neon-dim space-y-3">
                <div className="p-3 border border-abyss-border bg-abyss">
                  <div className="text-tritium font-bold mb-2">/// TOKEN REFRESH</div>
                  <div className="text-text-neon-dim">Window: <span className="text-neon-amber">5min</span></div>
                  <div className="text-text-neon-dim">Retries: <span className="text-neon-amber">3</span></div>
                  <div className="flex gap-2 mt-2 text-[8px]">
                    <span className="text-neon-green">+28 LINES</span>
                    <span className="text-neon-red">-3 LINES</span>
                  </div>
                </div>
              </div>
            )}
            {tab==='diff'&&(
              <pre className="text-[10px] font-mono leading-relaxed overflow-x-auto">
                <code>
                  <span className="text-text-neon-dim/60">{'@@ -3,6 +3,28 @@'}{'\n'}</span>
                  <span className="text-text-neon-dim">{' import jwt...\n'}</span>
                  <span className="text-neon-green">{'+const REFRESH_WINDOW = 5 * 60 * 1000;\n+const MAX_RETRIES = 3;\n+export async function refreshToken...\n'}</span>
                </code>
              </pre>
            )}
          </div>
        </aside>
      );
    }

    function RunDetail() {
      const [activeStep,setActiveStep]=useState(2);
      const [previewFile,setPreviewFile]=useState(null);
      const cur=STEPS[activeStep];
      return (
        <div className="flex-1 flex flex-col min-w-0 bg-abyss relative scanlines">
          <DetailHeader/>
          <div className="px-4 pt-3 pb-2 shrink-0">
            <StepChips steps={STEPS} activeStep={activeStep} onStepClick={setActiveStep}/>
            {cur?.parallel&&<div className="mt-2 animate-fade-in"><ParallelGroup group={cur.parallel}/></div>}
          </div>
          <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
            <PromptViewer/>
            <TerminalTranscript events={TRANSCRIPT}/>
          </div>
          <ArtifactCards artifacts={ARTIFACTS} onPreview={setPreviewFile}/>
          <MemoryRefs memories={MEMORIES}/>
          <ComposerBar/>
          <FilePreviewPanel file={previewFile} onClose={()=>setPreviewFile(null)}/>
        </div>
      );
    }

    function App() {
      const [activeRun,setActiveRun]=useState(1);
      return (
        <div className="h-screen w-screen flex bg-abyss overflow-hidden">
          <RunsSidebar activeRun={activeRun} onSelect={setActiveRun}/>
          <RunDetail/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
