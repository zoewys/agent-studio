<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — App Shell — 霓渊 Neon Abyss</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'abyss': '#0A0A0F', 'abyss-surface': '#12121A',
            'abyss-hover': '#1A1A2E', 'abyss-border': '#2A2A40',
            'neon-pink': '#FF006E', 'neon-pink-dim': '#CC0058',
            'tritium': '#00F0FF', 'tritium-dim': '#00B8CC',
            'neon-purple': '#B367FF',
            'neon-green': '#00FF88', 'neon-red': '#FF3355', 'neon-amber': '#FFAA00',
            'text-neon': '#E0E0F0', 'text-neon-dim': '#7B7B9A',
          },
          fontFamily: {
            display: ['"Orbitron"', 'sans-serif'],
            ui: ['"Inter"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          animation: {
            'neon-pulse': 'neonPulse 2s ease-in-out infinite',
            'scan-line': 'scanLine 8s linear infinite',
            'glitch-1': 'glitch1 0.3s ease-in-out infinite',
            'flicker': 'flicker 0.15s ease-in-out infinite',
          },
          keyframes: {
            neonPulse: { '0%,100%': {opacity:'1',boxShadow:'0 0 5px rgba(255,0,110,0.3), 0 0 20px rgba(255,0,110,0.1)'}, '50%': {opacity:'0.7',boxShadow:'0 0 10px rgba(255,0,110,0.5), 0 0 40px rgba(255,0,110,0.2)'} },
            scanLine: { '0%': {transform:'translateY(-100%)'}, '100%': {transform:'translateY(100vh)'} },
            glitch1: { '0%,100%': {transform:'translate(0)'}, '20%': {transform:'translate(-2px,2px)'}, '40%': {transform:'translate(2px,-1px)'}, '60%': {transform:'translate(-1px,1px)'}, '80%': {transform:'translate(1px,-2px)'} },
            flicker: { '0%,100%': {opacity:'1'}, '50%': {opacity:'0.8'}, '75%': {opacity:'0.9'}, '25%': {opacity:'0.85'} },
          },
        }
      }
    }
  </script>

  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(0,240,255,0.15) transparent; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.15); border-radius: 0; }

    /* ── 全局扫描线 ── */
    .scanlines {
      position: relative;
    }
    .scanlines::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,240,255,0.015) 2px,
        rgba(0,240,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── 画布网格背景 ── */
    .grid-bg {
      background-image:
        linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── 霓虹发光效果 ── */
    .neon-glow-pink {
      box-shadow: 0 0 5px rgba(255,0,110,0.4), 0 0 20px rgba(255,0,110,0.15), 0 0 40px rgba(255,0,110,0.05);
    }
    .neon-glow-blue {
      box-shadow: 0 0 5px rgba(0,240,255,0.4), 0 0 20px rgba(0,240,255,0.15), 0 0 40px rgba(0,240,255,0.05);
    }
    .neon-border-pink {
      border-color: rgba(255,0,110,0.4);
      box-shadow: 0 0 8px rgba(255,0,110,0.15), inset 0 0 8px rgba(255,0,110,0.05);
    }
    .neon-border-blue {
      border-color: rgba(0,240,255,0.4);
      box-shadow: 0 0 8px rgba(0,240,255,0.15), inset 0 0 8px rgba(0,240,255,0.05);
    }

    /* ── 模式激活指示器 ── */
    .mode-active-neon {
      box-shadow: 0 0 8px rgba(255,0,110,0.6), 0 0 20px rgba(255,0,110,0.2);
    }

    /* ── HUD 边框 ── */
    .hud-border {
      border: 1px solid rgba(0,240,255,0.15);
      position: relative;
    }
    .hud-border::before {
      content: '';
      position: absolute;
      top: -1px; left: 8px; right: 8px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,240,255,0.3), transparent);
    }

    /* ── 状态芯片 ── */
    .chip-neon {
      background: rgba(0,240,255,0.05);
      border: 1px solid rgba(0,240,255,0.15);
      color: #7B7B9A;
      transition: all 0.2s;
    }
    .chip-neon:hover {
      background: rgba(0,240,255,0.1);
      border-color: rgba(0,240,255,0.3);
      color: #00F0FF;
      box-shadow: 0 0 8px rgba(0,240,255,0.1);
    }

    /* ── 过渡 ── */
    .glitch-transition { transition: all 0.2s steps(3); }
    .smooth-neon { transition: all 0.2s ease-out; }
  </style>
</head>
<body class="bg-abyss text-text-neon font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const Icons = {
      Workflow: ({ active }) => (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke={active?'#FF006E':'#7B7B9A'} strokeWidth="1.6">
          <circle cx="5" cy="4" r="2.5"/><circle cx="15" cy="4" r="2.5"/><circle cx="10" cy="16" r="2.5"/>
          <path d="M7.2 5.8 C9 8.5,11 8.5,12.8 5.8"/><path d="M7.5 15 L7.5 6.5"/><path d="M12.5 15 L12.5 6.5"/>
        </svg>
      ),
      Templates: ({ active }) => (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke={active?'#FF006E':'#7B7B9A'} strokeWidth="1.6">
          <rect x="2" y="2" width="7" height="7" rx="1"/><rect x="12" y="2" width="6" height="7" rx="1"/>
          <rect x="2" y="12" width="7" height="6" rx="1"/><rect x="12" y="12" width="6" height="6" rx="1"/>
          <path d="M9 5.5 L12 5.5"/><path d="M9 15 L12 15"/>
        </svg>
      ),
      Agents: ({ active }) => (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke={active?'#FF006E':'#7B7B9A'} strokeWidth="1.6">
          <circle cx="10" cy="6" r="3"/><path d="M5 18 C5 14,6 12,10 12 C14 12,15 14,15 18"/>
          <circle cx="7" cy="5" r="1" fill={active?'#FF006E':'#7B7B9A'} opacity="0.5"/>
        </svg>
      ),
      SingleRun: ({ active }) => (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke={active?'#FF006E':'#7B7B9A'} strokeWidth="1.6">
          <path d="M6 3 L6 17"/><path d="M14 3 L14 17"/><path d="M3 7 L17 7"/><circle cx="10" cy="12" r="2"/>
        </svg>
      ),
      Settings: ({ active }) => (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke={active?'#FF006E':'#7B7B9A'} strokeWidth="1.6">
          <circle cx="10" cy="10" r="3"/><path d="M10 2 L10 4 M10 16 L10 18 M2 10 L4 10 M16 10 L18 10"/>
          <path d="M4.5 4.5 L5.8 5.8 M14.2 14.2 L15.5 15.5 M4.5 15.5 L5.8 14.2 M14.2 5.8 L15.5 4.5"/>
        </svg>
      ),
    };

    const MODES = [
      { id:'workflow', label:'工作流', icon:Icons.Workflow },
      { id:'templates', label:'模板', icon:Icons.Templates },
      { id:'agents', label:'Agent', icon:Icons.Agents },
      { id:'single', label:'单次', icon:Icons.SingleRun },
      { id:'settings', label:'设置', icon:Icons.Settings },
    ];

    function Header() {
      return (
        <header className="h-12 flex items-center justify-between px-4 border-b border-abyss-border bg-abyss/95 backdrop-blur-sm shrink-0 select-none relative z-10">
          <div className="flex items-center gap-3">
            {/* Logo mark */}
            <div className="w-7 h-7 rounded-sm bg-neon-pink/10 border border-neon-pink/30 flex items-center justify-center"
              style={{boxShadow:'0 0 10px rgba(255,0,110,0.2)'}}>
              <span className="text-[13px] font-display font-black text-neon-pink tracking-tighter">AS</span>
            </div>
            <div className="flex items-baseline gap-2">
              <h1 className="text-sm font-display font-bold text-neon-pink tracking-[0.15em] uppercase"
                style={{textShadow:'0 0 20px rgba(255,0,110,0.4)'}}>
                Agent Studio
              </h1>
              <span className="text-[9px] text-text-neon-dim font-mono tracking-wider hidden sm:inline">// v2.0</span>
            </div>
          </div>

          {/* Status HUD */}
          <div className="flex items-center gap-2 font-mono text-[10px]">
            <div className="chip-neon flex items-center gap-1.5 px-2.5 py-1">
              <span className="text-text-neon-dim">RUNS</span>
              <span className="text-tritium font-bold" style={{textShadow:'0 0 8px rgba(0,240,255,0.3)'}}>003</span>
            </div>
            <div className="chip-neon flex items-center gap-1.5 px-2.5 py-1">
              <span className="text-text-neon-dim">TOK</span>
              <span className="text-neon-amber font-bold" style={{textShadow:'0 0 8px rgba(255,170,0,0.3)'}}>12.5K</span>
            </div>
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-sm bg-neon-green/5 border border-neon-green/20">
              <span className="w-1.5 h-1.5 rounded-full bg-neon-green animate-neon-pulse"/>
              <span className="text-neon-green text-[10px] font-bold" style={{textShadow:'0 0 8px rgba(0,255,136,0.3)'}}>ONLINE</span>
            </div>
          </div>
        </header>
      );
    }

    function ModeRail({ activeMode, onModeChange }) {
      return (
        <nav className="w-14 shrink-0 border-r border-abyss-border bg-abyss/90 flex flex-col items-center pt-4 pb-2 gap-0.5 select-none relative z-10">
          {MODES.map(mode => {
            const isActive = activeMode === mode.id;
            const Icon = mode.icon;
            return (
              <button key={mode.id} onClick={()=>onModeChange(mode.id)}
                className={`relative w-11 h-11 flex flex-col items-center justify-center gap-0.5 smooth-neon group ${
                  isActive
                    ? 'bg-neon-pink/8 text-neon-pink border border-neon-pink/25 neon-glow-pink'
                    : 'text-text-neon-dim hover:text-tritium border border-transparent hover:bg-abyss-hover'
                }`}
                style={isActive?{}:{}} title={mode.label}>
                <Icon active={isActive}/>
                <span className={`text-[8px] font-bold uppercase tracking-[0.1em] ${isActive?'text-neon-pink':'text-text-neon-dim'}`}>
                  {mode.label}
                </span>
              </button>
            );
          })}
          <div className="flex-1"/>
          <div className="flex flex-col items-center gap-1 mb-2">
            <div className="w-1.5 h-1.5 rounded-full bg-neon-green" style={{boxShadow:'0 0 4px rgba(0,255,136,0.6)'}}/>
            <span className="text-[7px] font-mono text-text-neon-dim/50">SYS</span>
            <span className="text-[7px] font-mono text-tritium/40">OK</span>
          </div>
        </nav>
      );
    }

    function EmptyWorkspace({ activeMode }) {
      const modeInfo = MODES.find(m=>m.id===activeMode);
      const quotes = {
        templates:'编排 Agent 工作流 — 在数字深渊中构建秩序',
        workflow:'运行监控 — 每一行日志都是暗夜中的信号',
        agents:'定义 Agent — 赋予数字生命体独特的频率',
        single:'快速对话 — 在信息洪流中精准一击',
        settings:'系统配置 — 调试你的赛博空间',
      };
      return (
        <div className="flex-1 flex items-center justify-center relative overflow-hidden grid-bg scanlines">
          {/* Corner HUD decorations */}
          <div className="absolute top-3 left-3 text-[9px] font-mono text-text-neon-dim/40">
            SYS.IDLE // {activeMode.toUpperCase()}_MODE
          </div>
          <div className="absolute top-3 right-3 text-[9px] font-mono text-text-neon-dim/40">
            MEM:OK // CPU:04%
          </div>
          <div className="absolute bottom-3 left-3 text-[9px] font-mono text-text-neon-dim/40">
            LAT:1.2ms // NET:STABLE
          </div>
          <div className="absolute bottom-3 right-3 text-[9px] font-mono text-text-neon-dim/40">
            [ {new Date().toISOString().slice(0,10)} ]
          </div>

          {/* Center */}
          <div className="relative z-10 text-center">
            <div className="w-28 h-28 mx-auto mb-6 rounded-sm border border-neon-pink/15 flex items-center justify-center relative"
              style={{boxShadow:'0 0 40px rgba(255,0,110,0.08), 0 0 80px rgba(0,240,255,0.05)'}}>
              <div className="absolute inset-2 border border-tritium/10 rounded-sm"/>
              <span className="text-5xl font-display font-black text-neon-pink/20"
                style={{textShadow:'0 0 30px rgba(255,0,110,0.15)'}}>AS</span>
            </div>
            <h2 className="text-lg font-display font-bold text-tritium tracking-[0.2em] uppercase mb-2"
              style={{textShadow:'0 0 15px rgba(0,240,255,0.3)'}}>
              {modeInfo?.label}
            </h2>
            <p className="text-xs text-text-neon-dim font-mono max-w-md leading-relaxed">
              {'>'} {quotes[activeMode] || 'Agent Studio v2.0'}
            </p>
            <button className="mt-6 px-6 py-2 font-mono text-xs uppercase tracking-[0.15em] font-bold text-neon-pink
              border border-neon-pink/25 bg-neon-pink/5 hover:bg-neon-pink/10 neon-glow-pink smooth-neon">
              [ INITIALIZE ]
            </button>
          </div>

          {/* Floating scan line */}
          <div className="absolute left-0 right-0 h-px bg-gradient-to-r from-transparent via-tritium/20 to-transparent animate-scan-line pointer-events-none"/>
        </div>
      );
    }

    function StatusBar() {
      return (
        <footer className="h-6 flex items-center justify-between px-4 border-t border-abyss-border bg-abyss-surface/80 text-[9px] font-mono text-text-neon-dim/60 select-none shrink-0">
          <div className="flex items-center gap-3">
            <span className="flex items-center gap-1">
              <span className="w-1.5 h-1.5 rounded-full bg-neon-green" style={{boxShadow:'0 0 3px rgba(0,255,136,0.5)'}}/>
              SYSTEM_READY
            </span>
            <span className="text-abyss-border">|</span>
            <span>CLI://claude-code@2.3.1</span>
          </div>
          <div className="flex items-center gap-3">
            <span>NEON_ABYSS v0.1</span>
            <span className="text-abyss-border">|</span>
            <span>MEM_POOL: 42</span>
          </div>
        </footer>
      );
    }

    function App() {
      const [activeMode, setActiveMode] = useState('templates');
      return (
        <div className="h-screen w-screen flex flex-col bg-abyss overflow-hidden">
          <Header/>
          <div className="flex flex-1 overflow-hidden">
            <ModeRail activeMode={activeMode} onModeChange={setActiveMode}/>
            <main className="flex-1 flex flex-col overflow-hidden relative">
              <EmptyWorkspace activeMode={activeMode}/>
            </main>
          </div>
          <StatusBar/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
