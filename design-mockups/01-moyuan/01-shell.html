<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — App Shell — 墨垣 Ink & Silicon</title>

  <!-- Fonts: ZCOOL XiaoWei for brand, Inter for UI, JetBrains Mono for code -->
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'ink-base': '#0B0C10',
            'ink-surface': '#14161A',
            'ink-hover': '#1C1F26',
            'ink-border': '#2A2D35',
            'ink-border-warm': '#2F302E',
            'bronze': '#C9A96E',
            'bronze-light': '#D4BC8B',
            'bronze-dark': '#A8894F',
            'jade': '#6B8F71',
            'jade-light': '#85A88A',
            'paper': '#E8E0D5',
            'paper-dim': '#B5AFA5',
            'ink-secondary': '#8B8578',
            'cinnabar': '#C4554D',
            'cinnabar-light': '#D4706A',
            'amber-warn': '#D4953A',
          },
          fontFamily: {
            brand: ['"ZCOOL XiaoWei"', 'serif'],
            ui: ['"Inter"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          animation: {
            'pulse-ink': 'pulseInk 3s ease-in-out infinite',
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            pulseInk: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        }
      }
    }
  </script>

  <style>
    /* ── 暗纹：极淡山水纹理 ── */
    .ink-texture {
      position: relative;
    }
    .ink-texture::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        radial-gradient(ellipse at 20% 80%, rgba(201,169,110,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(107,143,113,0.2) 0%, transparent 50%),
        linear-gradient(180deg,
          transparent 0%,
          rgba(201,169,110,0.05) 30%,
          transparent 60%,
          rgba(201,169,110,0.04) 100%
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── 焦点边框金色渐变 ── */
    .bronze-glow {
      box-shadow: 0 0 0 1px rgba(201,169,110,0.25), 0 0 20px rgba(201,169,110,0.08);
    }
    .bronze-glow-strong {
      box-shadow: 0 0 0 1px rgba(201,169,110,0.4), 0 0 30px rgba(201,169,110,0.12);
    }

    /* ── 水墨晕染分隔线 ── */
    .ink-divider {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(201,169,110,0.15) 20%,
        rgba(201,169,110,0.3) 50%,
        rgba(201,169,110,0.15) 80%,
        transparent 100%
      );
    }

    /* ── ModeRail 竖直分隔线 ── */
    .rail-border {
      border-right: 1px solid rgba(201,169,110,0.12);
    }

    /* ── 毛笔起笔收笔模拟 (通过渐变模拟) ── */
    .brush-stroke-left {
      border-left: 2px solid;
      border-image: linear-gradient(180deg,
        rgba(201,169,110,0.8) 0%,
        rgba(201,169,110,0.4) 30%,
        rgba(201,169,110,0.6) 70%,
        rgba(201,169,110,0.3) 100%
      ) 1;
    }

    /* ── 选中模式左侧金线 ── */
    .mode-active-indicator {
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: linear-gradient(180deg,
        transparent 0%,
        #C9A96E 20%,
        #C9A96E 80%,
        transparent 100%
      );
      border-radius: 1px;
    }

    /* ── 状态芯片 ── */
    .status-chip {
      background: rgba(201,169,110,0.08);
      border: 1px solid rgba(201,169,110,0.2);
      transition: all 0.2s ease;
    }
    .status-chip:hover {
      background: rgba(201,169,110,0.14);
      border-color: rgba(201,169,110,0.35);
    }

    /* ── 滚动条 ── */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(201,169,110,0.2);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(201,169,110,0.35);
    }

    /* ── 过渡 ── */
    .mode-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── 品牌文字阴影 ── */
    .brand-shadow {
      text-shadow: 0 0 40px rgba(201,169,110,0.15);
    }
  </style>
</head>
<body class="bg-ink-base text-paper font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <!-- React 18 CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── SVG Icons (毛笔笔触风格简化版) ───
    const Icons = {
      Workflow: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active ? '#C9A96E' : '#8B8578'} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="6" cy="5" r="2.5" />
          <circle cx="16" cy="5" r="2.5" />
          <circle cx="11" cy="17" r="2.5" />
          <path d="M8.3 6.5 C 10 9, 12 9, 13.5 6.5" />
          <path d="M8.5 16 L 8.5 7.5" />
          <path d="M13.5 16 L 13.5 7.5" />
        </svg>
      ),
      Templates: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active ? '#C9A96E' : '#8B8578'} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5" />
          <rect x="13" y="3" width="6" height="7" rx="1.5" />
          <rect x="3" y="13" width="6" height="6" rx="1.5" />
          <rect x="13" y="13" width="6" height="6" rx="1.5" />
          <path d="M10 6.5 L 13 6.5" />
          <path d="M10 16 L 13 16" />
        </svg>
      ),
      Agents: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active ? '#C9A96E' : '#8B8578'} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="7" r="3" />
          <path d="M6 19 C 6 15, 7 13, 11 13 C 15 13, 16 15, 16 19" />
          <circle cx="8" cy="6" r="1" fill={active ? '#C9A96E' : '#8B8578'} stroke="none" opacity="0.5" />
        </svg>
      ),
      SingleRun: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active ? '#C9A96E' : '#8B8578'} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M7 4 L 7 18" />
          <path d="M15 4 L 15 18" />
          <path d="M4 8 L 18 8" />
          <circle cx="11" cy="13" r="2" />
        </svg>
      ),
      Settings: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active ? '#C9A96E' : '#8B8578'} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="3" />
          <path d="M11 3 L 11 5" />
          <path d="M11 17 L 11 19" />
          <path d="M3 11 L 5 11" />
          <path d="M17 11 L 19 11" />
          <path d="M5.5 5.5 L 6.8 6.8" />
          <path d="M15.2 15.2 L 16.5 16.5" />
          <path d="M5.5 16.5 L 6.8 15.2" />
          <path d="M15.2 6.8 L 16.5 5.5" />
        </svg>
      ),
      Logo: () => (
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="#C9A96E" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <rect x="4" y="4" width="18" height="18" rx="4" />
          <circle cx="13" cy="13" r="4" />
          <path d="M9 9 L 17 17" opacity="0.5" />
          <path d="M17 9 L 9 17" opacity="0.5" />
        </svg>
      ),
      Check: () => (
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#6B8F71" strokeWidth="1.5" strokeLinecap="round">
          <path d="M2 6 L 5 9 L 10 3" />
        </svg>
      ),
      Dot: ({ color }) => (
        <svg width="8" height="8" viewBox="0 0 8 8">
          <circle cx="4" cy="4" r="3.5" fill={color} />
        </svg>
      ),
    };

    // ─── MODE DEFINITIONS ───
    const MODES = [
      { id: 'workflow', label: '工作流', icon: Icons.Workflow },
      { id: 'templates', label: '模板', icon: Icons.Templates },
      { id: 'agents', label: 'Agent', icon: Icons.Agents },
      { id: 'single', label: '单次', icon: Icons.SingleRun },
      { id: 'settings', label: '设置', icon: Icons.Settings },
    ];

    // ─── COMPONENTS ───

    function StatusChip({ label, value, color = 'bronze' }) {
      const colorMap = {
        bronze: 'border-ink-border-warm text-paper-dim hover:border-bronze/30 hover:text-paper',
        jade: 'border-jade/20 text-jade-light',
        cinnabar: 'border-cinnabar/20 text-cinnabar-light',
      };
      return (
        <div className={`status-chip flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium cursor-default ${colorMap[color] || colorMap.bronze}`}>
          <span className="opacity-70">{label}</span>
          <span className="font-semibold text-paper font-mono text-[11px]">{value}</span>
        </div>
      );
    }

    function Header() {
      return (
        <header className="h-12 flex items-center justify-between px-4 border-b border-ink-border bg-ink-base/95 backdrop-blur-sm shrink-0 select-none z-10 relative">
          {/* Left: Brand */}
          <div className="flex items-center gap-3">
            <Icons.Logo />
            <div className="flex items-baseline gap-2">
              <h1 className="text-base font-brand text-bronze tracking-wider brand-shadow">Agent Studio</h1>
              <span className="text-[11px] text-ink-secondary font-ui tracking-wide hidden sm:inline">AI Workflow Orchestrator</span>
            </div>
          </div>

          {/* Right: Status Chips */}
          <div className="flex items-center gap-2">
            <StatusChip label="运行" value="3" />
            <StatusChip label="Tokens" value="12.5k" />
            <StatusChip label="活跃" value="2" color="jade" />
          </div>
        </header>
      );
    }

    function ModeRail({ activeMode, onModeChange }) {
      return (
        <nav className="w-16 shrink-0 rail-border bg-ink-base/90 flex flex-col items-center pt-4 pb-3 gap-1 select-none z-10 relative">
          {MODES.map((mode) => {
            const isActive = activeMode === mode.id;
            const Icon = mode.icon;
            return (
              <button
                key={mode.id}
                onClick={() => onModeChange(mode.id)}
                className={`
                  relative w-12 h-12 flex flex-col items-center justify-center gap-1 rounded-lg
                  mode-transition group
                  ${isActive
                    ? 'bg-bronze/8 text-bronze'
                    : 'text-ink-secondary hover:text-paper-dim hover:bg-ink-hover/50'
                  }
                `}
                title={mode.label}
              >
                {isActive && <div className="mode-active-indicator" />}
                <Icon active={isActive} />
                <span className="text-[9px] font-medium leading-none tracking-wide opacity-80">
                  {mode.label}
                </span>
              </button>
            );
          })}

          {/* Spacer */}
          <div className="flex-1" />

          {/* Bottom: version */}
          <span className="text-[9px] text-ink-secondary/50 font-mono mb-1">v0.1</span>
        </nav>
      );
    }

    function InkMountainBg() {
      return (
        <svg className="absolute inset-0 w-full h-full opacity-[0.03] pointer-events-none" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="mt1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#C9A96E" stopOpacity="0" />
              <stop offset="60%" stopColor="#C9A96E" stopOpacity="0.4" />
              <stop offset="100%" stopColor="#C9A96E" stopOpacity="0" />
            </linearGradient>
          </defs>
          {/* Distant mountains */}
          <path d="M0 450 Q 150 280, 280 340 Q 350 360, 420 300 Q 550 200, 680 350 Q 750 400, 800 370 L 800 600 L 0 600 Z" fill="url(#mt1)" />
          {/* Near mountains */}
          <path d="M0 500 Q 200 380, 350 430 Q 450 450, 520 400 Q 650 330, 800 420 L 800 600 L 0 600 Z" fill="url(#mt1)" opacity="0.6" />
          {/* Mist */}
          <ellipse cx="400" cy="480" rx="350" ry="60" fill="#C9A96E" opacity="0.15" />
          <ellipse cx="200" cy="350" rx="150" ry="30" fill="#C9A96E" opacity="0.08" />
        </svg>
      );
    }

    function EmptyWorkspace({ activeMode }) {
      const modeInfo = MODES.find(m => m.id === activeMode);
      return (
        <div className="flex-1 flex items-center justify-center relative overflow-hidden ink-texture">
          <InkMountainBg />

          <div className="relative z-10 text-center animate-fade-in">
            {/* Ink wash circle */}
            <div className="w-24 h-24 mx-auto mb-6 rounded-full relative flex items-center justify-center"
              style={{
                background: 'radial-gradient(circle, rgba(201,169,110,0.12) 0%, rgba(201,169,110,0.03) 60%, transparent 100%)',
              }}
            >
              <div className="w-16 h-16 rounded-full flex items-center justify-center"
                style={{
                  background: 'radial-gradient(circle, rgba(201,169,110,0.18) 0%, transparent 70%)',
                }}
              >
                <span className="text-3xl font-brand text-bronze/40">墨</span>
              </div>
            </div>

            <h2 className="text-lg font-medium text-paper mb-2 tracking-wide">
              {modeInfo?.label || 'Agent Studio'}
            </h2>
            <p className="text-sm text-ink-secondary max-w-xs leading-relaxed">
              {activeMode === 'templates' && '编排 AI Agent 工作流，像在宣纸上勾勒山水'}
              {activeMode === 'workflow' && '运行与监控工作流，每一次执行都是笔墨的痕迹'}
              {activeMode === 'agents' && '定义你的 AI Agent，赋予它们独特的气质与智慧'}
              {activeMode === 'single' && '与单个 Agent 快速对话，灵感一闪，即刻落笔'}
              {activeMode === 'settings' && '配置系统环境与连接，为创作准备笔墨纸砚'}
            </p>

            {/* Subtle CTA */}
            <button className="mt-6 px-5 py-2 rounded-lg border border-bronze/20 text-bronze/80 text-sm
              hover:bg-bronze/8 hover:border-bronze/40 hover:text-bronze
              transition-all duration-300 font-medium tracking-wide"
            >
              + 开始
            </button>
          </div>
        </div>
      );
    }

    function StatusBar() {
      return (
        <footer className="h-7 flex items-center justify-between px-4 border-t border-ink-border bg-ink-surface/60 text-[10px] text-ink-secondary/60 font-mono select-none shrink-0">
          <div className="flex items-center gap-3">
            <span className="flex items-center gap-1">
              <Icons.Dot color="#6B8F71" />
              System Ready
            </span>
            <span className="opacity-40">|</span>
            <span>CLI: Claude Code v2.3.1</span>
          </div>
          <div className="flex items-center gap-3">
            <span>macOS 26.0</span>
            <span className="opacity-40">|</span>
            <span>Memory: 42 entries</span>
          </div>
        </footer>
      );
    }

    // ─── APP ───
    function App() {
      const [activeMode, setActiveMode] = useState('templates');

      return (
        <div className="h-screen w-screen flex flex-col bg-ink-base overflow-hidden">
          <Header />
          <div className="flex flex-1 overflow-hidden">
            <ModeRail activeMode={activeMode} onModeChange={setActiveMode} />
            <main className="flex-1 flex flex-col overflow-hidden relative">
              <EmptyWorkspace activeMode={activeMode} />
            </main>
          </div>
          <StatusBar />
        </div>
      );
    }

    // ─── RENDER ───
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
