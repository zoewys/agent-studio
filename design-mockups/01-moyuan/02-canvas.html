<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨垣 · Canvas — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'ink-base': '#0B0C10',
        'ink-surface': '#14161A',
        'ink-hover': '#1C1F26',
        'ink-border': '#2A2D35',
        'bronze': '#C9A96E',
        'bronze-dark': '#A8884E',
        'jade': '#6B8F71',
        'ink-text': '#E8E0D5',
        'ink-muted': '#8B8578',
        'ink-error': '#C4554D',
        'ink-warning': '#D4953A',
        'ink-success': '#6B8F71',
      },
      fontFamily: {
        brand: ['ZCOOL XiaoWei', 'serif'],
        ui: ['Inter', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      },
    },
  },
};
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #0B0C10; color: #E8E0D5; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  #root { height: 100vh; display: flex; flex-direction: column; }

  .ink-texture {
    background: radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(107,143,113,0.03) 0%, transparent 60%),
                #0B0C10;
  }

  .bronze-glow {
    box-shadow: 0 0 12px rgba(201,169,110,0.25), 0 0 2px rgba(201,169,110,0.4);
  }

  .ink-divider {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #C9A96E 20%, #C9A96E 80%, transparent 100%);
    margin: 0;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseInk { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  .fade-in { animation: fadeIn 0.35s ease-out; }
  .pulse-ink { animation: pulseInk 2s ease-in-out infinite; }

  .scrollbar-thin::-webkit-scrollbar { width: 5px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #2A2D35; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #3A3D45; }

  .react-flow-bg { background-image: radial-gradient(circle, #1C1F26 1px, transparent 1px); background-size: 24px 24px; }

  .toolbar-btn {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 6px;
    background: transparent; color: #8B8578; border: 1px solid transparent;
    cursor: pointer; transition: all 0.2s; font-size: 15px;
  }
  .toolbar-btn:hover { background: #1C1F26; color: #E8E0D5; border-color: #2A2D35; }
  .toolbar-btn:active { background: #2A2D35; }

  .agent-node {
    background: #14161A; border: 1px solid #2A2D35; border-radius: 10px;
    padding: 14px 18px; min-width: 190px; cursor: pointer;
    transition: all 0.25s; position: relative;
  }
  .agent-node:hover { border-color: #C9A96E; box-shadow: 0 0 16px rgba(201,169,110,0.15); }
  .agent-node.selected { border-color: #C9A96E; box-shadow: 0 0 18px rgba(201,169,110,0.3), 0 0 4px rgba(201,169,110,0.5); }
  .agent-node.selected::after {
    content: ''; position: absolute; top: -1px; left: 12px; right: 12px; height: 2px;
    background: #C9A96E; border-radius: 0 0 2px 2px;
  }

  .sidebar-agent {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent; margin-bottom: 2px;
  }
  .sidebar-agent:hover { background: #1C1F26; border-color: #2A2D35; }
  .sidebar-agent.highlighted { background: #1C1F26; border-color: #C9A96E; }

  .model-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
    background: rgba(201,169,110,0.12); color: #C9A96E; font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const { useState, useCallback, useRef } = React;

// ── Data ──────────────────────────────────────────────
const DEFAULT_AGENTS = [
  { id: 'architect',  name: 'Architect',     role: 'System Architect',   model: 'Claude 4.5 Opus',  icon: '🏛️', color: '#C9A96E' },
  { id: 'reviewer',  name: 'Code Reviewer',  role: 'Code Review Lead',   model: 'Claude 4.5 Opus',  icon: '🔍', color: '#6B8F71' },
  { id: 'frontend',  name: 'Frontend Dev',   role: 'UI/UX Engineer',    model: 'Claude 4 Sonnet',  icon: '🎨', color: '#D4953A' },
  { id: 'backend',   name: 'Backend Dev',    role: 'API Engineer',      model: 'Claude 4 Sonnet',  icon: '⚙️', color: '#D4953A' },
  { id: 'qa',        name: 'QA Reviewer',    role: 'Quality Assurance', model: 'Claude 4 Haiku',   icon: '✅', color: '#6B8F71' },
];

const NODE_POSITIONS = {
  architect:  { x: 420, y: 80 },
  reviewer:   { x: 120, y: 80 },
  frontend:   { x: 120, y: 240 },
  backend:    { x: 420, y: 240 },
  qa:         { x: 270, y: 380 },
};

const EDGES = [
  { from: 'reviewer',  to: 'qa' },
  { from: 'architect', to: 'qa' },
  { from: 'frontend',  to: 'qa' },
  { from: 'backend',   to: 'qa' },
];

// ── SVG Edge ──────────────────────────────────────────
function DagEdge({ from, to }) {
  const fp = NODE_POSITIONS[from];
  const tp = NODE_POSITIONS[to];
  const fromX = fp.x + 95; // approximate center of node
  const fromY = fp.y + 36;
  const toX   = tp.x + 95;
  const toY   = tp.y;
  const midY  = (fromY + toY) / 2;

  const d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${toX} ${midY}, ${toX} ${toY}`;

  return (
    <svg style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0 }}>
      <defs>
        <linearGradient id={`edge-grad-${from}-${to}`} x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#C9A96E" stopOpacity="0.5" />
          <stop offset="100%" stopColor="#C9A96E" stopOpacity="0.15" />
        </linearGradient>
      </defs>
      <path d={d} fill="none" stroke={`url(#edge-grad-${from}-${to})`} strokeWidth="2" strokeLinecap="round" />
      <circle cx={toX} cy={toY} r="4" fill="#C9A96E" opacity="0.7" />
    </svg>
  );
}

// ── Agent Node ────────────────────────────────────────
function AgentNode({ agent, selected, onClick }) {
  return (
    <div
      className={`agent-node ${selected ? 'selected' : ''} fade-in`}
      onClick={() => onClick(agent.id)}
      style={{ position: 'absolute', left: NODE_POSITIONS[agent.id]?.x ?? 0, top: NODE_POSITIONS[agent.id]?.y ?? 0, zIndex: 10 }}
    >
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
        <span style={{ fontSize: 22 }}>{agent.icon}</span>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3 }}>{agent.name}</div>
          <div style={{ fontSize: 11, color: '#8B8578', lineHeight: 1.3 }}>{agent.role}</div>
        </div>
      </div>
      <span className="model-badge">{agent.model}</span>
    </div>
  );
}

// ── Canvas ────────────────────────────────────────────
function Canvas({ agents, selectedId, onSelectNode }) {
  return (
    <div style={{ flex: 1, position: 'relative', overflow: 'hidden', background: '#0B0C10' }}>
      <div className="react-flow-bg" style={{ position: 'absolute', inset: 0, opacity: 0.35 }} />
      {EDGES.map(e => <DagEdge key={`${e.from}-${e.to}`} from={e.from} to={e.to} />)}
      {agents.map(a => (
        <AgentNode key={a.id} agent={a} selected={selectedId === a.id} onClick={onSelectNode} />
      ))}
    </div>
  );
}

// ── MiniMap ───────────────────────────────────────────
function MiniMap({ agents, selectedId, onSelectNode }) {
  return (
    <div style={{
      position: 'absolute', bottom: 16, right: 16, width: 140, height: 110,
      background: '#14161A', border: '1px solid #2A2D35', borderRadius: 8, padding: 8,
      zIndex: 20, opacity: 0.85,
    }}>
      <div style={{ fontSize: 10, color: '#8B8578', marginBottom: 4, fontWeight: 500 }}>缩略图</div>
      <div style={{ position: 'relative', width: '100%', height: 82, overflow: 'hidden' }}>
        {agents.map(a => {
          const p = NODE_POSITIONS[a.id];
          const sx = (p.x / 650) * 124;
          const sy = (p.y / 480) * 72;
          return (
            <div key={a.id}
              onClick={() => onSelectNode(a.id)}
              style={{
                position: 'absolute', left: sx, top: sy, width: 10, height: 6,
                background: selectedId === a.id ? '#C9A96E' : '#3A3D45',
                borderRadius: 2, cursor: 'pointer',
                transition: 'background 0.2s',
              }}
              title={a.name}
            />
          );
        })}
      </div>
    </div>
  );
}

// ── Toolbar ───────────────────────────────────────────
function Toolbar({ onSave, onUndo, onRedo, onZoomIn, onZoomOut, onFit, onLayout, onSettings }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px',
      background: '#14161A', borderBottom: '1px solid #2A2D35', zIndex: 30,
    }}>
      <span style={{ fontFamily: 'ZCOOL XiaoWei', fontSize: 18, color: '#C9A96E', marginRight: 12, letterSpacing: 2 }}>墨垣</span>
      <hr style={{ width: 1, height: 22, border: 'none', background: '#2A2D35', margin: '0 6px' }} />

      <select style={{
        background: '#0B0C10', color: '#E8E0D5', border: '1px solid #2A2D35', borderRadius: 6,
        padding: '5px 10px', fontSize: 12, fontFamily: 'Inter', cursor: 'pointer',
      }}>
        <option>审核工作流</option>
        <option>部署流水线</option>
        <option>自定义模板</option>
      </select>

      <div style={{ flex: 1 }} />

      <button className="toolbar-btn" title="保存" onClick={onSave}>💾</button>
      <button className="toolbar-btn" title="撤销" onClick={onUndo}>↩️</button>
      <button className="toolbar-btn" title="重做" onClick={onRedo}>↪️</button>
      <hr style={{ width: 1, height: 22, border: 'none', background: '#2A2D35', margin: '0 4px' }} />
      <button className="toolbar-btn" title="放大" onClick={onZoomIn}>🔍</button>
      <button className="toolbar-btn" title="缩小" onClick={onZoomOut}>🔎</button>
      <button className="toolbar-btn" title="适应画布" onClick={onFit}>📐</button>
      <button className="toolbar-btn" title="自动布局" onClick={onLayout}>📋</button>
      <hr style={{ width: 1, height: 22, border: 'none', background: '#2A2D35', margin: '0 4px' }} />
      <button className="toolbar-btn" title="设置" onClick={onSettings}>⚙️</button>
    </div>
  );
}

// ── Agent Sidebar ─────────────────────────────────────
function AgentSidebar({ agents, selectedId, highlightedId, onSelect, onHighlight }) {
  return (
    <div style={{
      width: 220, background: '#14161A', borderRight: '1px solid #2A2D35',
      display: 'flex', flexDirection: 'column', zIndex: 20,
    }}>
      <div style={{ padding: '14px', borderBottom: '1px solid #2A2D35' }}>
        <div style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1, color: '#8B8578' }}>Agent 列表</div>
      </div>
      <div className="scrollbar-thin" style={{ flex: 1, overflowY: 'auto', padding: '8px 10px' }}>
        {agents.map(a => (
          <div key={a.id}
            className={`sidebar-agent ${selectedId === a.id ? 'highlighted' : ''} ${highlightedId === a.id ? 'highlighted' : ''}`}
            onClick={() => onSelect(a.id)}
            onMouseEnter={() => onHighlight(a.id)}
            onMouseLeave={() => onHighlight(null)}
            draggable
          >
            <span style={{ fontSize: 18, opacity: 0.85 }}>{a.icon}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{a.name}</div>
              <div style={{ fontSize: 10, color: '#8B8578' }}>{a.role}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Property Panel ────────────────────────────────────
function PropertyPanel({ agent, onUpdate }) {
  if (!agent) return (
    <div style={{
      width: 280, background: '#14161A', borderLeft: '1px solid #2A2D35', padding: 20,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{ textAlign: 'center', color: '#8B8578', fontSize: 13 }}>
        <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.4 }}>📋</div>
        选择一个节点<br/>查看属性
      </div>
    </div>
  );

  const [formData, setFormData] = useState({
    name: agent.name, role: agent.role, model: agent.model,
    prompt: '你是一个资深的代码审查专家，请仔细检查每一行代码的逻辑、安全性和性能问题。',
    errorHandling: 'retry',
  });

  const updateField = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));

  return (
    <div className="fade-in scrollbar-thin" style={{
      width: 280, background: '#14161A', borderLeft: '1px solid #2A2D35',
      display: 'flex', flexDirection: 'column', overflowY: 'auto',
    }}>
      <div style={{ padding: '16px', borderBottom: '1px solid #2A2D35' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 22 }}>{agent.icon}</span>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>{agent.name}</div>
            <div style={{ fontSize: 11, color: '#8B8578' }}>{agent.role}</div>
          </div>
        </div>
      </div>

      <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <label style={labelStyle}>
          <span style={labelTextStyle}>Agent 名称</span>
          <input style={inputStyle} value={formData.name} onChange={e => updateField('name', e.target.value)} />
        </label>
        <label style={labelStyle}>
          <span style={labelTextStyle}>角色</span>
          <input style={inputStyle} value={formData.role} onChange={e => updateField('role', e.target.value)} />
        </label>
        <label style={labelStyle}>
          <span style={labelTextStyle}>模型</span>
          <select style={selectStyle} value={formData.model} onChange={e => updateField('model', e.target.value)}>
            <option>Claude 4.5 Opus</option>
            <option>Claude 4 Sonnet</option>
            <option>Claude 4 Haiku</option>
            <option>DeepSeek V4</option>
            <option>GPT-4o</option>
          </select>
        </label>
        <label style={labelStyle}>
          <span style={labelTextStyle}>系统提示词</span>
          <textarea style={{ ...inputStyle, minHeight: 80, resize: 'vertical', fontFamily: 'JetBrains Mono', fontSize: 11 }}
            value={formData.prompt} onChange={e => updateField('prompt', e.target.value)} />
        </label>
        <label style={labelStyle}>
          <span style={labelTextStyle}>错误处理</span>
          <select style={selectStyle} value={formData.errorHandling} onChange={e => updateField('errorHandling', e.target.value)}>
            <option value="retry">自动重试</option>
            <option value="skip">跳过继续</option>
            <option value="abort">中止流程</option>
            <option value="fallback">回退处理</option>
          </select>
        </label>
      </div>

      <hr className="ink-divider" />
      <div style={{ padding: '12px 16px' }}>
        <div style={{ fontSize: 11, color: '#8B8578', marginBottom: 6 }}>连接状态</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#6B8F71', display: 'inline-block' }}></span>
          <span style={{ fontSize: 11, color: '#6B8F71' }}>已连接</span>
        </div>
      </div>
    </div>
  );
}

// ── Styles ────────────────────────────────────────────
const labelStyle = { display: 'flex', flexDirection: 'column', gap: 4 };
const labelTextStyle = { fontSize: 11, color: '#8B8578', fontWeight: 500, textTransform: 'uppercase', letterSpacing: 0.5 };
const inputStyle = {
  background: '#0B0C10', color: '#E8E0D5', border: '1px solid #2A2D35', borderRadius: 6,
  padding: '7px 10px', fontSize: 12, fontFamily: 'Inter', outline: 'none', width: '100%',
};
const selectStyle = { ...inputStyle, cursor: 'pointer' };

// ── App ───────────────────────────────────────────────
function App() {
  const [agents] = useState(DEFAULT_AGENTS);
  const [selectedId, setSelectedId] = useState(null);
  const [highlightedId, setHighlightedId] = useState(null);

  const selectedAgent = agents.find(a => a.id === selectedId) || null;

  const handleToolbar = (action) => {
    // Toolbar actions — feedback only for mockup
    const el = document.createElement('div');
    el.textContent = `${action} clicked`;
    el.style.cssText = 'position:fixed;top:60px;right:20px;background:#14161A;color:#C9A96E;padding:8px 16px;border-radius:6px;border:1px solid #2A2D35;z-index:999;font-size:12px;animation:fadeIn 0.3s ease-out';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      <Toolbar
        onSave={() => handleToolbar('save')}
        onUndo={() => handleToolbar('undo')}
        onRedo={() => handleToolbar('redo')}
        onZoomIn={() => handleToolbar('zoomIn')}
        onZoomOut={() => handleToolbar('zoomOut')}
        onFit={() => handleToolbar('fit')}
        onLayout={() => handleToolbar('layout')}
        onSettings={() => handleToolbar('settings')}
      />
      <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
        <AgentSidebar
          agents={agents}
          selectedId={selectedId}
          highlightedId={highlightedId}
          onSelect={setSelectedId}
          onHighlight={setHighlightedId}
        />
        <div style={{ flex: 1, position: 'relative' }}>
          <Canvas agents={agents} selectedId={selectedId} onSelectNode={setSelectedId} />
          <MiniMap agents={agents} selectedId={selectedId} onSelectNode={setSelectedId} />
        </div>
        <PropertyPanel agent={selectedAgent} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
