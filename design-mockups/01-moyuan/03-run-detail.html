<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — Run Detail — 墨垣 Ink & Silicon</title>

  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'ink-base': '#0B0C10', 'ink-surface': '#14161A', 'ink-hover': '#1C1F26',
            'ink-border': '#2A2D35', 'ink-border-warm': '#2F302E',
            'bronze': '#C9A96E', 'bronze-light': '#D4BC8B', 'bronze-dark': '#A8894F',
            'jade': '#6B8F71', 'jade-light': '#85A88A',
            'paper': '#E8E0D5', 'paper-dim': '#B5AFA5', 'ink-secondary': '#8B8578',
            'cinnabar': '#C4554D', 'cinnabar-light': '#D4706A', 'amber-warn': '#D4953A',
          },
          fontFamily: {
            brand: ['"ZCOOL XiaoWei"', 'serif'],
            ui: ['"Inter"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          animation: {
            'pulse-ink': 'pulseInk 2s ease-in-out infinite',
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
            'spin-slow': 'spin 3s linear infinite',
            'glow-pulse': 'glowPulse 2s ease-in-out infinite',
          },
          keyframes: {
            pulseInk: { '0%,100%': {opacity:'1'}, '50%': {opacity:'0.5'} },
            fadeIn: { '0%': {opacity:'0'}, '100%': {opacity:'1'} },
            slideUp: { '0%': {opacity:'0',transform:'translateY(8px)'}, '100%': {opacity:'1',transform:'translateY(0)'} },
            glowPulse: { '0%,100%': {boxShadow:'0 0 0 1px rgba(201,169,110,0.15)'}, '50%': {boxShadow:'0 0 0 1px rgba(201,169,110,0.35)'} },
          },
        }
      }
    }
  </script>

  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.15) transparent; }
    ::-webkit-scrollbar { width: 3px; height:3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.15); border-radius: 2px; }

    .ink-texture::before {
      content: ''; position: absolute; inset: 0; opacity: 0.03; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 30% 70%, rgba(201,169,110,0.3) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 30%, rgba(107,143,113,0.2) 0%, transparent 50%);
    }

    .bronze-glow {
      box-shadow: 0 0 0 1px rgba(201,169,110,0.2), 0 0 15px rgba(201,169,110,0.06);
    }

    .ink-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.1) 30%, rgba(201,169,110,0.2) 50%, rgba(201,169,110,0.1) 70%, transparent 100%);
    }

    /* ── Transcript 事件颜色 ── */
    .event-tool       { border-left: 2px solid #C9A96E; }
    .event-think      { border-left: 2px solid #8B8578; }
    .event-text       { border-left: 2px solid #6B8F71; }
    .event-error      { border-left: 2px solid #C4554D; }
    .event-result     { border-left: 2px solid #5A8FA8; }

    /* ── Step chip 连接线 ── */
    .step-connector::after {
      content: ''; position: absolute; top: 50%; right: -8px; width: 8px; height: 1px;
      background: rgba(201,169,110,0.3);
    }

    /* ── 运行时脉冲动画 ── */
    .pulse-dot {
      animation: pulseInk 1.5s ease-in-out infinite;
    }

    /* ── 过渡 ── */
    .smooth { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
  </style>
</head>
<body class="bg-ink-base text-paper font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    // ─── DATA ───
    const STEPS = [
      { id:1, label:'分析', status:'done', agent:'Code Reviewer' },
      { id:2, label:'设计', status:'done', agent:'Architect' },
      { id:3, label:'前端', status:'running', agent:'Frontend Dev', parallel:[
        { id:'3a',label:'组件',status:'running' },
        { id:'3b',label:'样式',status:'running' },
        { id:'3c',label:'测试',status:'pending' },
      ]},
      { id:4, label:'后端', status:'pending', agent:'Backend Dev' },
      { id:5, label:'审查', status:'pending', agent:'QA Reviewer' },
    ];

    const RUNS = [
      { name:'Feature: Auth System', status:'completed', time:'2m ago', duration:'4m 32s', agents:4, tokens:'8.2k' },
      { name:'Bugfix: Memory Leak', status:'running', time:'now', duration:'1m 15s', agents:2, tokens:'3.1k' },
      { name:'Refactor: API Layer', status:'completed', time:'1h ago', duration:'12m 08s', agents:5, tokens:'24.6k' },
      { name:'Code Review: PR #142', status:'error', time:'3h ago', duration:'2m 41s', agents:1, tokens:'1.8k' },
      { name:'Deploy: v2.1.0', status:'aborted', time:'5h ago', duration:'0m 45s', agents:3, tokens:'0.5k' },
      { name:'Test: E2E Suite', status:'completed', time:'1d ago', duration:'8m 20s', agents:2, tokens:'15.1k' },
    ];

    const TRANSCRIPT_EVENTS = [
      { type:'think', content:'分析用户需求：需要为认证系统添加 JWT token 刷新机制...', time:'12:03:01' },
      { type:'tool', content:'Tool: Read src/auth/token.ts', time:'12:03:02' },
      { type:'result', content:'// token.ts content loaded (156 lines)', time:'12:03:02' },
      { type:'think', content:'当前 token 实现缺少 refresh 逻辑，需要添加 refreshToken 函数和过期检测...', time:'12:03:05' },
      { type:'tool', content:'Tool: Edit src/auth/token.ts', time:'12:03:08' },
      { type:'text', content:'已实现 JWT refresh token 自动刷新机制。主要改动：\n\n1. 添加 `refreshToken()` 函数\n2. 在 token 过期前 5 分钟自动刷新\n3. 添加重试逻辑 (最多 3 次)', time:'12:03:15' },
      { type:'result', content:'File modified: src/auth/token.ts (+28 lines, -3 lines)', time:'12:03:15' },
    ];

    const ARTIFACTS = [
      { name:'token.ts', type:'ts', size:'+28/-3', path:'src/auth/' },
      { name:'test_token.ts', type:'ts', size:'+42', path:'src/auth/__tests__/' },
      { name:'CHANGELOG.md', type:'md', size:'+5', path:'/' },
    ];

    const MEMORY_REFS = [
      { text:'用户偏好：JWT 密钥存储在环境变量中', strength:0.85, category:'preference', scope:'project' },
      { text:'上次 auth 重构使用了 bcrypt', strength:0.72, category:'knowledge', scope:'global' },
      { text:'避免使用过期的 jsonwebtoken 版本', strength:0.91, category:'avoidance', scope:'global' },
    ];

    // ─── SMALL ICONS ───
    const Svg = {
      Play:  <svg className="w-3 h-3" viewBox="0 0 12 12" fill="currentColor"><path d="M3 1.5 L 10 6 L 3 10.5 Z"/></svg>,
      Check: <svg className="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M2 6 L5 9 L10 3"/></svg>,
      X:     <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 3 L11 11 M11 3 L3 11"/></svg>,
      Stop:  <svg className="w-3 h-3" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="2" width="8" height="8" rx="1"/></svg>,
      Pause: <svg className="w-3 h-3" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="2" width="3" height="8" rx="0.5"/><rect x="7" y="2" width="3" height="8" rx="0.5"/></svg>,
      Skip:  <svg className="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M2 3 L7 6 L2 9 Z"/><path d="M8 3 L8 9"/></svg>,
      Search:<svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="6" cy="6" r="4"/><path d="M9.5 9.5 L12.5 12.5"/></svg>,
      Plus:  <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M7 2 L7 12 M2 7 L12 7"/></svg>,
      ChevronDown: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 5 L7 9 L11 5"/></svg>,
      ChevronRight:<svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M5 3 L9 7 L5 11"/></svg>,
      Folder: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M2 3.5 C2 2.7 2.7 2 3.5 2 H5.5 L7 3.5 H11 C11.8 3.5 12.5 4.2 12.5 5 V11 C12.5 11.8 11.8 12.5 11 12.5 H3 C2.2 12.5 1.5 11.8 1.5 11 V3.5 Z"/></svg>,
      File:   <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M3.5 1.5 H9 L12 4.5 V12 C12 12.6 11.6 13 11 13 H3 C2.4 13 2 12.6 2 12 V2.5 C2 1.9 2.4 1.5 3.5 1.5 Z"/><path d="M9 1.5 V4.5 H12"/></svg>,
      Send:   <svg className="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 2 L14 8 L2 14 L5 8 Z"/></svg>,
      Memory: <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="7" r="5"/><circle cx="7" cy="7" r="2"/><path d="M7 2 V1 M7 13 V12 M2 7 H1 M13 7 H12"/></svg>,
      Code:   <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M4 5 L1 7 L4 9"/><path d="M10 5 L13 7 L10 9"/><path d="M8 3 L6 11"/></svg>,
      Eye:    <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="7" r="2.5"/><path d="M1 7 C3 3 11 3 13 7 C11 11 3 11 1 7 Z"/></svg>,
      Diff:   <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="1" y="2" width="5" height="5" rx="1"/><rect x="8" y="2" width="5" height="5" rx="1"/><rect x="1" y="9" width="5" height="4" rx="1"/><rect x="8" y="9" width="5" height="4" rx="1"/></svg>,
    };

    // ─── COMPONENTS ───

    function StatusBadge({ status }) {
      const map = {
        running:  { bg:'bg-amber-warn/10', text:'text-amber-warn', dot:'bg-amber-warn', label:'运行中', anim:'animate-pulse-ink' },
        completed:{ bg:'bg-jade/10', text:'text-jade-light', dot:'bg-jade-light', label:'已完成' },
        error:    { bg:'bg-cinnabar/10', text:'text-cinnabar-light', dot:'bg-cinnabar-light', label:'错误' },
        aborted:  { bg:'bg-ink-secondary/10', text:'text-ink-secondary', dot:'bg-ink-secondary', label:'已中止' },
        pending:  { bg:'bg-ink-hover/50', text:'text-paper-dim', dot:'bg-paper-dim', label:'待执行' },
        done:     { bg:'bg-jade/8', text:'text-jade', dot:'bg-jade', label:'完成' },
      };
      const s = map[status] || map.pending;
      return (
        <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-medium ${s.bg} ${s.text}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${s.dot} ${s.anim || ''}`} />
          {s.label}
        </span>
      );
    }

    // ─── Header ───
    function DetailHeader() {
      return (
        <div className="h-12 flex items-center justify-between px-4 border-b border-ink-border bg-ink-surface/80 shrink-0">
          <div className="flex items-center gap-3">
            <button className="text-ink-secondary hover:text-paper smooth p-1 rounded hover:bg-ink-hover">
              <svg className="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10 3 L5 8 L10 13"/></svg>
            </button>
            <input
              className="bg-transparent text-sm font-semibold text-paper border-b border-transparent hover:border-ink-border focus:border-bronze/40 outline-none px-1 py-0.5 smooth w-48"
              defaultValue="Bugfix: Memory Leak"
            />
            <StatusBadge status="running" />
          </div>
          <div className="flex items-center gap-3">
            <span className="text-[11px] font-mono text-ink-secondary">Tokens: <span className="text-paper-dim font-medium">3,128</span></span>
            <span className="text-[11px] font-mono text-ink-secondary">Cost: <span className="text-paper-dim font-medium">$0.42</span></span>
            <div className="w-px h-4 bg-ink-border" />
            <button className="px-3 py-1.5 rounded-md text-xs font-medium text-cinnabar/80 hover:text-cinnabar hover:bg-cinnabar/8 border border-transparent hover:border-cinnabar/20 smooth flex items-center gap-1.5">
              {Svg.Stop} 中止
            </button>
            <button className="px-3 py-1.5 rounded-md text-xs font-medium text-bronze/80 hover:text-bronze hover:bg-bronze/8 border border-transparent hover:border-bronze/20 smooth flex items-center gap-1.5">
              {Svg.Play} 重跑
            </button>
          </div>
        </div>
      );
    }

    // ─── Runs List Sidebar ───
    function RunsSidebar({ activeRun, onSelect }) {
      const [filter, setFilter] = useState('all');
      return (
        <aside className="w-56 shrink-0 border-r border-ink-border bg-ink-surface/40 flex flex-col">
          {/* Search + Filter */}
          <div className="p-3 space-y-2 border-b border-ink-border">
            <div className="flex items-center gap-2 px-2 py-1.5 rounded-md bg-ink-base border border-ink-border text-ink-secondary text-xs">
              {Svg.Search}
              <input className="bg-transparent outline-none flex-1 placeholder:text-ink-secondary/50" placeholder="搜索运行..." />
            </div>
            <div className="flex gap-1">
              {['all','running','completed','error'].map(f => (
                <button key={f} onClick={()=>setFilter(f)}
                  className={`px-2 py-0.5 rounded text-[10px] font-medium smooth ${
                    filter===f ? 'bg-bronze/10 text-bronze border border-bronze/20' : 'text-ink-secondary hover:text-paper-dim border border-transparent'
                  }`}>
                  {{all:'全部',running:'进行中',completed:'已完成',error:'错误'}[f]}
                </button>
              ))}
            </div>
          </div>

          {/* Run items */}
          <div className="flex-1 overflow-y-auto">
            {RUNS.map((run, i) => (
              <div key={i} onClick={()=>onSelect(i)}
                className={`px-3 py-2.5 cursor-pointer smooth border-b border-ink-border/50 group ${
                  activeRun===i ? 'bg-bronze/5 border-l-[2px] border-l-bronze' : 'border-l-[2px] border-l-transparent hover:bg-ink-hover/40'
                }`}>
                <div className="flex items-start justify-between gap-2">
                  <span className="text-[12px] font-medium text-paper-dim truncate group-hover:text-paper smooth leading-tight">{run.name}</span>
                  <StatusBadge status={run.status} />
                </div>
                <div className="flex items-center gap-2 mt-1.5 text-[10px] text-ink-secondary font-mono">
                  <span>{run.time}</span>
                  <span className="opacity-40">·</span>
                  <span>{run.duration}</span>
                  <span className="opacity-40">·</span>
                  <span>{run.tokens}</span>
                </div>
              </div>
            ))}
          </div>

          {/* New run button */}
          <div className="p-2 border-t border-ink-border">
            <button className="w-full py-2 rounded-lg border border-bronze/15 text-bronze/70 text-xs font-medium
              hover:bg-bronze/6 hover:border-bronze/30 hover:text-bronze smooth flex items-center justify-center gap-1.5">
              {Svg.Plus} 新建任务
            </button>
          </div>
        </aside>
      );
    }

    // ─── Step Chips ───
    function StepChips({ steps, activeStep, onStepClick }) {
      return (
        <div className="flex items-center gap-1 px-4 py-2.5 overflow-x-auto border-b border-ink-border shrink-0">
          {steps.map((step, i) => (
            <React.Fragment key={step.id}>
              {i > 0 && (
                <svg className="w-3 h-3 text-ink-border shrink-0 mx-0.5" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.2">
                  <path d="M4 2 L8 6 L4 10"/>
                </svg>
              )}
              <button onClick={()=>onStepClick(i)}
                className={`relative flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium smooth shrink-0
                  ${activeStep===i
                    ? 'bg-bronze/10 text-bronze bronze-glow'
                    : 'text-paper-dim hover:text-paper hover:bg-ink-hover/50 border border-transparent'
                  }`}
              >
                {/* Step number */}
                <span className={`w-4 h-4 rounded-full flex items-center justify-center text-[10px] font-mono font-bold
                  ${step.status==='done' ? 'bg-jade/20 text-jade-light' :
                    step.status==='running' ? 'bg-amber-warn/20 text-amber-warn animate-pulse-ink' :
                    step.status==='error' ? 'bg-cinnabar/20 text-cinnabar-light' :
                    'bg-ink-hover text-ink-secondary'}`}>
                  {step.status==='done' ? Svg.Check : step.status==='running' ? Svg.Play : step.id}
                </span>
                <span>{step.label}</span>
                <span className="text-[10px] opacity-60 font-normal">{step.agent}</span>
              </button>
            </React.Fragment>
          ))}
        </div>
      );
    }

    // ─── Parallel Step Indicator ───
    function ParallelGroup({ group, active }) {
      return (
        <div className={`flex items-center gap-1.5 px-2 py-1 rounded border ${active ? 'border-bronze/30 bg-bronze/5' : 'border-ink-border bg-ink-surface/60'} smooth`}>
          <svg className="w-3 h-3 text-bronze/60" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.3">
            <path d="M2 3 H5 M2 6 H8 M2 9 H6"/>
          </svg>
          {group.map(g => (
            <span key={g.id} className={`text-[10px] px-1.5 py-0.5 rounded font-mono ${
              g.status==='running' ? 'text-amber-warn bg-amber-warn/8' : 'text-ink-secondary bg-ink-hover/50'
            }`}>
              {g.label}
            </span>
          ))}
        </div>
      );
    }

    // ─── Prompt Viewer ───
    function PromptViewer() {
      const [expanded, setExpanded] = useState(false);
      return (
        <div className="border-b border-ink-border shrink-0">
          <button onClick={()=>setExpanded(!expanded)}
            className="w-full flex items-center justify-between px-4 py-2 text-xs text-ink-secondary hover:text-paper-dim smooth">
            <span className="flex items-center gap-2 font-medium">
              <svg className="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M3 4 H11 M3 7 H9 M3 10 H10"/></svg>
              Prompt
            </span>
            <span className="transform smooth" style={{transform:expanded?'rotate(180deg)':'rotate(0deg)'}}>{Svg.ChevronDown}</span>
          </button>
          {expanded && (
            <div className="px-4 pb-3 animate-fade-in">
              <div className="p-3 rounded-lg bg-ink-base border border-ink-border text-xs font-mono text-paper-dim leading-relaxed whitespace-pre-wrap">
{`你是一名资深前端工程师。请在 src/auth/token.ts 中实现 JWT Token 自动刷新机制。

要求：
1. Token 过期前 5 分钟自动刷新
2. 失败重试最多 3 次
3. 使用指数退避策略

相关记忆：
- JWT 密钥存储在环境变量中`}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Transcript Viewer ───
    function TranscriptViewer({ events }) {
      const typeStyles = {
        think:  'text-ink-secondary italic',
        tool:   'text-bronze',
        text:   'text-paper-dim',
        error:  'text-cinnabar-light',
        result: 'text-jade-light/70 text-[11px]',
      };
      const typeLabels = {
        think:'思考', tool:'工具调用', text:'输出', error:'错误', result:'结果',
      };
      return (
        <div className="flex-1 overflow-y-auto px-4 py-3 space-y-2 min-h-0">
          {events.map((e, i) => (
            <div key={i} className={`pl-3 py-1.5 rounded-r-md text-xs smooth ${e.type==='text'?'bg-ink-surface/60':''}`}
              style={{borderLeftWidth:'2px',borderLeftStyle:'solid',
                borderLeftColor: e.type==='think'?'#8B8578':e.type==='tool'?'#C9A96E':e.type==='text'?'#6B8F71':e.type==='error'?'#C4554D':'#5A8FA8'}}>
              <div className="flex items-center gap-2 mb-1">
                <span className="text-[10px] font-semibold uppercase tracking-wider opacity-50">{typeLabels[e.type]}</span>
                <span className="text-[10px] font-mono text-ink-secondary/50">{e.time}</span>
              </div>
              <div className={`leading-relaxed ${typeStyles[e.type] || 'text-paper-dim'}`}>{e.content}</div>
            </div>
          ))}
          {/* Running indicator */}
          <div className="flex items-center gap-2 pl-3 py-1 text-amber-warn text-[11px] animate-fade-in">
            <span className="w-2 h-2 rounded-full bg-amber-warn animate-pulse-ink" />
            <span className="font-mono">Agent is working...</span>
          </div>
        </div>
      );
    }

    // ─── Artifact Cards ───
    function ArtifactCards({ artifacts, onPreview }) {
      const extColors = { ts:'text-blue-400', tsx:'text-blue-400', md:'text-purple-400', json:'text-amber-warn', css:'text-cyan-400', html:'text-orange-400' };
      return (
        <div className="border-t border-ink-border px-4 py-2.5 shrink-0">
          <div className="flex items-center gap-2 mb-2">
            <Svg.File />
            <span className="text-[11px] font-medium text-ink-secondary uppercase tracking-wider">产出物</span>
          </div>
          <div className="flex gap-2 overflow-x-auto">

import jwt from 'jsonwebtoken';

const REFRESH_WINDOW = 5 * 60 * 1000; // 5 minutes

export async function refreshToken(
  currentToken: string
): Promise<string> {
  const decoded = jwt.decode(currentToken);
  const expiresAt = decoded.exp * 1000;
  const now = Date.now();

  if (expiresAt - now > REFRESH_WINDOW) {
    return currentToken; // Still valid
  }

  let retries = 0;
  while (retries < MAX_RETRIES) {
    try {
      const response = await fetch(...);
      return response.data.token;
    } catch (err) {
      retries++;
      await sleep(2 ** retries * 100);
    }
  }
  throw new Error('Token refresh failed');
}`;
