<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨垣 · Single Run — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'ink-base': '#0B0C10', 'ink-surface': '#14161A', 'ink-hover': '#1C1F26', 'ink-border': '#2A2D35',
        'bronze': '#C9A96E', 'bronze-dark': '#A8884E', 'jade': '#6B8F71',
        'ink-text': '#E8E0D5', 'ink-muted': '#8B8578',
        'ink-error': '#C4554D', 'ink-warning': '#D4953A', 'ink-success': '#6B8F71',
      },
      fontFamily: { brand: ['ZCOOL XiaoWei', 'serif'], ui: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
    },
  },
};
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #0B0C10; color: #E8E0D5; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  #root { height: 100vh; display: flex; flex-direction: column; }

  .ink-texture {
    background: radial-gradient(ellipse at 50% 10%, rgba(201,169,110,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(107,143,113,0.03) 0%, transparent 55%),
                #0B0C10;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseInk { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  .fade-in { animation: fadeIn 0.35s ease-out; }
  .slide-up { animation: slideUp 0.4s ease-out; }
  .pulse-ink { animation: pulseInk 2s ease-in-out infinite; }

  .scrollbar-thin::-webkit-scrollbar { width: 5px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #2A2D35; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #3A3D45; }

  .ink-divider {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent 0%, #C9A96E 20%, #C9A96E 80%, transparent 100%);
    margin: 0;
  }

  .bronze-btn {
    background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.08));
    border: 1px solid rgba(201,169,110,0.35); color: #C9A96E; border-radius: 8px;
    padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .bronze-btn:hover { background: linear-gradient(135deg, rgba(201,169,110,0.3), rgba(201,169,110,0.12)); border-color: #C9A96E; }
  .bronze-btn:active { transform: scale(0.97); }

  .event-row {
    display: flex; gap: 12px; padding: 10px 18px; border-left: 3px solid transparent;
    animation: fadeIn 0.3s ease-out; transition: background 0.2s;
  }
  .event-row:hover { background: rgba(201,169,110,0.03); }
  .event-row.think  { border-left-color: #8B8578; }
  .event-row.tool   { border-left-color: #6B8F71; }
  .event-row.text   { border-left-color: #C9A96E; }
  .event-row.result { border-left-color: #D4953A; }
  .event-row.error  { border-left-color: #C4554D; }

  .event-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
    height: fit-content; margin-top: 2px;
  }
  .event-badge.think  { background: rgba(139,133,120,0.15); color: #8B8578; }
  .event-badge.tool   { background: rgba(107,143,113,0.15); color: #6B8F71; }
  .event-badge.text   { background: rgba(201,169,110,0.12); color: #C9A96E; }
  .event-badge.result { background: rgba(212,149,58,0.15); color: #D4953A; }
  .event-badge.error  { background: rgba(196,85,77,0.15); color: #C4554D; }

  .form-input, .form-select {
    background: #0B0C10; color: #E8E0D5; border: 1px solid #2A2D35; border-radius: 6px;
    padding: 7px 10px; font-size: 12px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: #C9A96E; }
  .form-select { cursor: pointer; }

  .composer {
    display: flex; align-items: center; gap: 10px; padding: 10px 18px;
    background: #14161A; border-top: 1px solid #2A2D35;
  }
  .composer-input {
    flex: 1; background: #0B0C10; color: #E8E0D5; border: 1px solid #2A2D35; border-radius: 8px;
    padding: 9px 14px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .composer-input:focus { border-color: #C9A96E; }
  .composer-input::placeholder { color: #5A5548; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const { useState, useRef, useEffect } = React;

// ── Demo events ───────────────────────────────────────
const DEMO_EVENTS = [
  { type: 'think',  content: '分析用户请求：需要审查 src/auth/login.ts 中的身份验证逻辑...', ts: '14:32:01' },
  { type: 'tool',   content: '读取文件: src/auth/login.ts (245 行)', ts: '14:32:02' },
  { type: 'think',  content: '发现潜在问题：密码哈希使用了 SHA-256，建议升级为 bcrypt 或 argon2。JWT secret 硬编码在代码中，存在安全风险。', ts: '14:32:04' },
  { type: 'tool',   content: '执行: npm audit --json 检查依赖安全漏洞', ts: '14:32:05' },
  { type: 'text',   content: '我已完成对 src/auth/login.ts 的审查，以下是主要发现...', ts: '14:32:08' },
  { type: 'text',   content: '## 安全审查报告\n\n### 🔴 严重\n1. **硬编码密钥** — JWT_SECRET 在第 12 行直接硬编码\n2. **弱哈希算法** — 使用 SHA-256 存储密码，应使用 bcrypt\n\n### 🟡 警告\n3. **缺少速率限制** — 登录接口无速率限制\n4. **Token 过期时间过长** — 设置为 30 天\n\n### ✅ 通过项\n5. SQL 注入防护到位（使用参数化查询）\n6. XSS 防护已启用', ts: '14:32:12' },
  { type: 'result', content: '审查完成。发现 2 个严重问题，2 个警告，2 个通过项。总体评分: 6.5/10', ts: '14:32:15' },
];

// ── Header ────────────────────────────────────────────
function Header() {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', padding: '10px 18px',
      background: '#14161A', borderBottom: '1px solid #2A2D35', gap: 12,
    }}>
      <span style={{ fontFamily: 'ZCOOL XiaoWei', fontSize: 18, color: '#C9A96E', letterSpacing: 2 }}>墨垣</span>
      <span style={{ fontSize: 13, fontWeight: 500 }}>单次运行</span>
      <div style={{ flex: 1 }} />
      <span style={{ fontSize: 11, color: '#8B8578', display: 'flex', alignItems: 'center', gap: 6 }}>
        <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#6B8F71', display: 'inline-block' }}></span>
        就绪
      </span>
    </div>
  );
}

// ── Config Panel ──────────────────────────────────────
function ConfigPanel({ onStart, isRunning }) {
  const [expanded, setExpanded] = useState(true);
  const [agent, setAgent] = useState('reviewer');
  const [vendor, setVendor] = useState('claude');
  const [model, setModel] = useState('claude-opus-4.5');
  const [project, setProject] = useState('/src/auth');
  const [prompt, setPrompt] = useState('审查 src/auth/ 目录下的所有认证相关代码，重点关注安全性和性能问题。');

  const handleStart = () => {
    if (isRunning) return;
    onStart({ agent, vendor, model, project, prompt });
  };

  return (
    <div style={{ background: '#14161A', borderBottom: '1px solid #2A2D35' }}>
      <div
        onClick={() => setExpanded(!expanded)}
        style={{
          display: 'flex', alignItems: 'center', padding: '10px 18px', cursor: 'pointer',
          userSelect: 'none', transition: 'background 0.2s',
        }}
        onMouseEnter={e => e.currentTarget.style.background = '#1C1F26'}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
      >
        <span style={{
          display: 'inline-block', transition: 'transform 0.25s', fontSize: 10, color: '#8B8578',
          transform: expanded ? 'rotate(90deg)' : 'rotate(0deg)',
        }}>▶</span>
        <span style={{ fontSize: 12, fontWeight: 600, marginLeft: 8, textTransform: 'uppercase', letterSpacing: 0.5, color: '#8B8578' }}>
          运行配置
        </span>
        <div style={{ flex: 1 }} />
        {!expanded && (
          <span style={{ fontSize: 11, color: '#5A5548', fontFamily: 'JetBrains Mono' }}>
            {agent} · {model}
          </span>
        )}
      </div>

      {expanded && (
        <div className="slide-up" style={{ padding: '0 18px 14px', display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'flex-end' }}>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <span style={{ fontSize: 10, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5 }}>Agent</span>
            <select className="form-select" value={agent} onChange={e => setAgent(e.target.value)}>
              <option value="reviewer">Code Reviewer</option>
              <option value="architect">Architect</option>
              <option value="frontend">Frontend Dev</option>
              <option value="backend">Backend Dev</option>
              <option value="qa">QA Reviewer</option>
            </select>
          </label>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <span style={{ fontSize: 10, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5 }}>Vendor</span>
            <select className="form-select" value={vendor} onChange={e => setVendor(e.target.value)}>
              <option value="claude">Anthropic</option>
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
            </select>
          </label>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <span style={{ fontSize: 10, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5 }}>模型</span>
            <select className="form-select" value={model} onChange={e => setModel(e.target.value)}>
              <option value="claude-opus-4.5">Claude 4.5 Opus</option>
              <option value="claude-sonnet-4">Claude 4 Sonnet</option>
              <option value="deepseek-v4">DeepSeek V4</option>
              <option value="gpt-4o">GPT-4o</option>
            </select>
          </label>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <span style={{ fontSize: 10, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5 }}>项目路径</span>
            <input className="form-input" style={{ width: 140 }} value={project} onChange={e => setProject(e.target.value)} placeholder="/src" />
          </label>
          <button className="bronze-btn" onClick={handleStart} disabled={isRunning}
            style={isRunning ? { opacity: 0.5, cursor: 'not-allowed' } : {}}
          >
            {isRunning ? '⏳ 运行中...' : '▶ 开始运行'}
          </button>
        </div>
      )}

      {expanded && (
        <div style={{ padding: '0 18px 12px' }}>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <span style={{ fontSize: 10, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5 }}>提示词</span>
            <textarea className="form-input" style={{ width: '100%', minHeight: 50, resize: 'vertical', fontFamily: 'JetBrains Mono', fontSize: 11 }}
              value={prompt} onChange={e => setPrompt(e.target.value)} />
          </label>
        </div>
      )}
    </div>
  );
}

// ── Transcript ────────────────────────────────────────
function Transcript({ events, isRunning }) {
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [events]);

  return (
    <div className="scrollbar-thin" style={{
      flex: 1, overflowY: 'auto', background: '#0B0C10',
      backgroundImage: 'radial-gradient(ellipse at 50% 80%, rgba(201,169,110,0.03) 0%, transparent 60%)',
    }}>
      {events.length === 0 && !isRunning && (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', opacity: 0.5 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📜</div>
          <div style={{ fontSize: 14, color: '#8B8578' }}>配置运行参数，点击「开始运行」</div>
          <div style={{ fontSize: 11, color: '#5A5548', marginTop: 4 }}>事件流将在此显示</div>
        </div>
      )}

      {events.map((evt, i) => (
        <div key={i} className={`event-row ${evt.type}`}>
          <span className={`event-badge ${evt.type}`}>{evt.type}</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              fontSize: 12, lineHeight: 1.7, whiteSpace: 'pre-wrap', wordBreak: 'break-word',
              fontFamily: evt.type === 'text' || evt.type === 'result' ? 'Inter' : 'JetBrains Mono',
            }}>{evt.content}</div>
          </div>
          <span style={{ fontSize: 10, color: '#5A5548', fontFamily: 'JetBrains Mono', whiteSpace: 'nowrap', marginTop: 2 }}>{evt.ts}</span>
        </div>
      ))}

      {isRunning && (
        <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span className="pulse-ink" style={{ fontSize: 16, color: '#C9A96E' }}>⏳</span>
          <span style={{ fontSize: 12, color: '#8B8578' }}>处理中...</span>
        </div>
      )}
      <div ref={bottomRef} />
    </div>
  );
}

// ── ComposerBar ───────────────────────────────────────
function ComposerBar({ isRunning, onSend }) {
  const [text, setText] = useState('');
  const inputRef = useRef(null);

  const handleSend = () => {
    if (!text.trim() || isRunning) return;
    onSend(text);
    setText('');
    inputRef.current?.focus();
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  return (
    <div className="composer">
      <input
        ref={inputRef}
        className="composer-input"
        placeholder="输入消息与 Agent 交互..."
        value={text}
        onChange={e => setText(e.target.value)}
        onKeyDown={handleKeyDown}
        disabled={isRunning}
      />
      <button
        onClick={handleSend}
        disabled={isRunning || !text.trim()}
        style={{
          background: text.trim() && !isRunning
            ? 'linear-gradient(135deg, #C9A96E, #A8884E)'
            : '#1C1F26',
          color: text.trim() && !isRunning ? '#0B0C10' : '#5A5548',
          border: 'none', borderRadius: 8, padding: '9px 16px',
          fontSize: 13, fontWeight: 600, cursor: text.trim() && !isRunning ? 'pointer' : 'default',
          transition: 'all 0.2s',
        }}
      >发送</button>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  const [events, setEvents] = useState([]);
  const [isRunning, setIsRunning] = useState(false);
  const timerRef = useRef(null);

  const handleStart = (config) => {
    setIsRunning(true);
    setEvents([]);
    let idx = 0;
    timerRef.current = setInterval(() => {
      if (idx < DEMO_EVENTS.length) {
        setEvents(prev => [...prev, DEMO_EVENTS[idx]]);
        idx++;
      } else {
        clearInterval(timerRef.current);
        setIsRunning(false);
      }
    }, 900);
  };

  const handleSend = (text) => {
    setEvents(prev => [...prev, {
      type: 'think',
      content: `用户输入: ${text}`,
      ts: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
    }]);
  };

  useEffect(() => {
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, []);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      <Header />
      <ConfigPanel onStart={handleStart} isRunning={isRunning} />
      <Transcript events={events} isRunning={isRunning} />
      <ComposerBar isRunning={isRunning} onSend={handleSend} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
