<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨垣 · Agent Editor — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'ink-base': '#0B0C10', 'ink-surface': '#14161A', 'ink-hover': '#1C1F26', 'ink-border': '#2A2D35',
        'bronze': '#C9A96E', 'bronze-dark': '#A8884E', 'jade': '#6B8F71',
        'ink-text': '#E8E0D5', 'ink-muted': '#8B8578',
        'ink-error': '#C4554D', 'ink-warning': '#D4953A', 'ink-success': '#6B8F71',
      },
      fontFamily: { brand: ['ZCOOL XiaoWei', 'serif'], ui: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
    },
  },
};
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #0B0C10; color: #E8E0D5; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  #root { height: 100vh; display: flex; flex-direction: column; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 600px; } }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  .slide-down { animation: slideDown 0.4s ease-out; overflow: hidden; }

  .scrollbar-thin::-webkit-scrollbar { width: 5px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #2A2D35; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #3A3D45; }

  .ink-divider {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent 0%, #C9A96E 20%, #C9A96E 80%, transparent 100%);
    margin: 0;
  }

  .bronze-glow {
    box-shadow: 0 0 12px rgba(201,169,110,0.25), 0 0 2px rgba(201,169,110,0.4);
  }

  .agent-list-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    margin-bottom: 3px;
  }
  .agent-list-item:hover { background: #1C1F26; border-color: #2A2D35; }
  .agent-list-item.active { background: #1C1F26; border-color: #C9A96E; }
  .agent-list-item.active::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px;
    background: #C9A96E; border-radius: 0 2px 2px 0;
  }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 10px; color: #8B8578; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .form-input, .form-select {
    background: #0B0C10; color: #E8E0D5; border: 1px solid #2A2D35; border-radius: 6px;
    padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s; width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: #C9A96E; }
  .form-select { cursor: pointer; }

  .collapsible-header {
    display: flex; align-items: center; gap: 8px; padding: 10px 0;
    cursor: pointer; user-select: none; transition: color 0.2s;
  }
  .collapsible-header:hover { color: #C9A96E; }

  .strength-bar {
    height: 4px; border-radius: 2px; background: #2A2D35; overflow: hidden; margin-top: 4px;
  }
  .strength-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  .category-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap;
  }
  .category-badge.episodic { background: rgba(201,169,110,0.12); color: #C9A96E; }
  .category-badge.semantic { background: rgba(107,143,113,0.12); color: #6B8F71; }
  .category-badge.procedural { background: rgba(212,149,58,0.12); color: #D4953A; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const { useState } = React;

// ── Agent data ────────────────────────────────────────
const ALL_AGENTS = [
  { id: 'reviewer',  name: 'Code Reviewer',  role: '代码审查专家',        icon: '🔍', vendor: 'anthropic', model: 'Claude 4.5 Opus',  permission: 'auto',    prompt: '你是一个资深的代码审查专家。请仔细检查每一行代码的逻辑、安全性和性能问题。重点关注：\n1. 安全漏洞（注入、XSS、CSRF）\n2. 性能瓶颈\n3. 代码规范\n4. 可维护性' },
  { id: 'architect', name: 'Architect',       role: '系统架构师',          icon: '🏛️', vendor: 'anthropic', model: 'Claude 4.5 Opus',  permission: 'approve', prompt: '你是一个系统架构师。负责设计可扩展、高可用的系统架构。请考虑：\n1. 微服务边界\n2. 数据一致性\n3. 容错设计\n4. 扩展策略' },
  { id: 'frontend',  name: 'Frontend Dev',    role: '前端工程师',          icon: '🎨', vendor: 'anthropic', model: 'Claude 4 Sonnet',  permission: 'auto',    prompt: '你是一个资深前端开发工程师。专注于：\n1. React/Vue 组件设计\n2. 状态管理\n3. 性能优化\n4. 无障碍访问' },
  { id: 'backend',   name: 'Backend Dev',     role: '后端工程师',          icon: '⚙️', vendor: 'deepseek',  model: 'DeepSeek V4',      permission: 'auto',    prompt: '你是一个后端开发工程师。擅长：\n1. API 设计\n2. 数据库优化\n3. 缓存策略\n4. 消息队列' },
  { id: 'qa',        name: 'QA Reviewer',     role: '质量保证工程师',      icon: '✅', vendor: 'anthropic', model: 'Claude 4 Haiku',   permission: 'approve', prompt: '你是一个 QA 工程师。负责：\n1. 测试用例设计\n2. 边界条件检查\n3. 回归测试\n4. 覆盖率分析' },
  { id: 'devops',    name: 'DevOps',          role: 'DevOps 工程师',       icon: '🚀', vendor: 'anthropic', model: 'Claude 4 Sonnet',  permission: 'auto',    prompt: '你是一个 DevOps 工程师。关注：\n1. CI/CD 流水线\n2. 容器化部署\n3. 监控告警\n4. 基础设施即代码' },
];

const MEMORY_ENTRIES = [
  { id: 1, content: '用户偏好使用 TypeScript 严格模式', category: 'episodic', strength: 0.85, scope: 'user' },
  { id: 2, content: '项目采用 pnpm monorepo 架构', category: 'semantic', strength: 0.92, scope: 'project' },
  { id: 3, content: '代码审查流程需经过两轮审批', category: 'procedural', strength: 0.78, scope: 'workspace' },
  { id: 4, content: 'API 接口遵循 RESTful 规范，使用 OpenAPI 3.0 文档', category: 'semantic', strength: 0.88, scope: 'project' },
  { id: 5, content: '上周修复了 auth 模块的 CSRF 漏洞', category: 'episodic', strength: 0.65, scope: 'project' },
];

// ── Header ────────────────────────────────────────────
function Header() {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', padding: '10px 18px',
      background: '#14161A', borderBottom: '1px solid #2A2D35', gap: 10,
    }}>
      <span style={{ fontFamily: 'ZCOOL XiaoWei', fontSize: 18, color: '#C9A96E', letterSpacing: 2 }}>墨垣</span>
      <span style={{ fontSize: 13, fontWeight: 500 }}>Agent 编辑器</span>
      <div style={{ flex: 1 }} />
      <button style={{
        background: 'linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.08))',
        border: '1px solid rgba(201,169,110,0.35)', color: '#C9A96E', borderRadius: 6,
        padding: '6px 16px', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all 0.2s',
      }}>💾 保存</button>
    </div>
  );
}

// ── Agent List Item ───────────────────────────────────
function AgentListItem({ agent, active, onClick }) {
  return (
    <div
      className={`agent-list-item ${active ? 'active' : ''}`}
      onClick={() => onClick(agent)}
      style={{ position: 'relative' }}
    >
      <span style={{ fontSize: 20 }}>{agent.icon}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{agent.name}</div>
        <div style={{ fontSize: 10, color: '#8B8578' }}>{agent.role}</div>
      </div>
      <div style={{ fontSize: 10, padding: '2px 8px', borderRadius: 10, background: 'rgba(201,169,110,0.1)', color: '#C9A96E', fontFamily: 'JetBrains Mono', fontWeight: 500 }}>
        {agent.model.split(' ').slice(0, 2).join(' ')}
      </div>
    </div>
  );
}

// ── Collapsible Section ───────────────────────────────
function CollapsibleSection({ title, defaultOpen, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div>
      <div className="collapsible-header" onClick={() => setOpen(!open)}>
        <span style={{
          display: 'inline-block', transition: 'transform 0.25s', fontSize: 9, color: '#8B8578',
          transform: open ? 'rotate(90deg)' : 'rotate(0deg)',
        }}>▶</span>
        <span style={{ fontSize: 12, fontWeight: 600, color: '#C9A96E' }}>{title}</span>
        <div style={{ flex: 1, height: 1, background: 'linear-gradient(90deg, #2A2D35, transparent)' }} />
      </div>
      {open && <div className="slide-down">{children}</div>}
    </div>
  );
}

// ── Memory Panel ──────────────────────────────────────
function MemoryPanel() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 11, color: '#8B8578' }}>{MEMORY_ENTRIES.length} 条记忆</span>
        <button style={{
          background: 'transparent', color: '#C9A96E', border: '1px solid rgba(201,169,110,0.25)', borderRadius: 4,
          padding: '3px 10px', fontSize: 10, cursor: 'pointer',
        }}>+ 添加</button>
      </div>
      {MEMORY_ENTRIES.map(m => (
        <div key={m.id} style={{
          background: '#0B0C10', borderRadius: 8, padding: '10px 12px', border: '1px solid #2A2D35',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
            <span style={{ fontSize: 11, lineHeight: 1.5, flex: 1, marginRight: 8 }}>{m.content}</span>
            <span className={`category-badge ${m.category}`}>{m.category}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ flex: 1 }}>
              <div className="strength-bar">
                <div className="strength-bar-fill" style={{ width: `${m.strength * 100}%`, background: m.strength > 0.8 ? '#6B8F71' : m.strength > 0.6 ? '#D4953A' : '#C4554D' }} />
              </div>
            </div>
            <span style={{ fontSize: 9, color: '#5A5548', background: '#1C1F26', padding: '2px 6px', borderRadius: 4 }}>{m.scope}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Agent Editor ──────────────────────────────────────
function AgentEditor({ agent }) {
  const [form, setForm] = useState({ ...agent });
  const [saved, setSaved] = useState(false);

  const update = (field, value) => {
    setForm(prev => ({ ...prev, [field]: value }));
    setSaved(false);
  };

  if (!agent) return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0.5 }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 48, marginBottom: 10 }}>📝</div>
        <div style={{ fontSize: 13, color: '#8B8578' }}>从左侧选择一个 Agent 进行编辑</div>
      </div>
    </div>
  );

  return (
    <div className="fade-in scrollbar-thin" style={{ flex: 1, overflowY: 'auto', padding: '20px 24px' }}>
      {/* Agent header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24 }}>
        <span style={{ fontSize: 32 }}>{agent.icon}</span>
        <div>
          <h2 style={{ margin: 0, fontSize: 18, fontWeight: 600 }}>{agent.name}</h2>
          <p style={{ margin: '2px 0 0', fontSize: 12, color: '#8B8578' }}>{agent.role}</p>
        </div>
        <div style={{ flex: 1 }} />
        <button
          onClick={() => setSaved(true)}
          style={{
            background: saved ? 'rgba(107,143,113,0.15)' : 'rgba(201,169,110,0.1)',
            color: saved ? '#6B8F71' : '#C9A96E',
            border: `1px solid ${saved ? '#6B8F71' : '#C9A96E'}`, borderRadius: 6,
            padding: '6px 16px', fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all 0.2s',
          }}
        >
          {saved ? '✓ 已保存' : '💾 保存'}
        </button>
      </div>

      <hr className="ink-divider" style={{ marginBottom: 20 }} />

      {/* Basic fields */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
        <div className="form-group">
          <label className="form-label">名称</label>
          <input className="form-input" value={form.name} onChange={e => update('name', e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">角色</label>
          <input className="form-input" value={form.role} onChange={e => update('role', e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Vendor</label>
          <select className="form-select" value={form.vendor} onChange={e => update('vendor', e.target.value)}>
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI (Codex)</option>
            <option value="deepseek">DeepSeek (API)</option>
            <option value="local">本地模型</option>
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">模型</label>
          <select className="form-select" value={form.model} onChange={e => update('model', e.target.value)}>
            <option>Claude 4.5 Opus</option>
            <option>Claude 4 Sonnet</option>
            <option>Claude 4 Haiku</option>
            <option>DeepSeek V4</option>
            <option>GPT-4o</option>
            <option>GPT-4o-mini</option>
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">权限模式</label>
          <select className="form-select" value={form.permission} onChange={e => update('permission', e.target.value)}>
            <option value="auto">自动执行</option>
            <option value="approve">需审批</option>
            <option value="readonly">只读</option>
            <option value="sandbox">沙盒模式</option>
          </select>
        </div>
      </div>

      {/* System Prompt */}
      <div className="form-group" style={{ marginBottom: 20 }}>
        <label className="form-label">系统提示词 (System Prompt)</label>
        <textarea className="form-input"
          style={{ minHeight: 120, resize: 'vertical', fontFamily: 'JetBrains Mono', fontSize: 11, lineHeight: 1.6 }}
          value={form.prompt} onChange={e => update('prompt', e.target.value)}
        />
      </div>

      <hr className="ink-divider" style={{ marginBottom: 16 }} />

      {/* Codex Options */}
      <CollapsibleSection title="Codex 选项" defaultOpen={false}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 8, paddingBottom: 8 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div className="form-group">
              <label className="form-label">Temperature</label>
              <input className="form-input" type="number" defaultValue="0.7" min="0" max="2" step="0.1" />
            </div>
            <div className="form-group">
              <label className="form-label">Max Tokens</label>
              <input className="form-input" type="number" defaultValue="4096" />
            </div>
            <div className="form-group">
              <label className="form-label">Top P</label>
              <input className="form-input" type="number" defaultValue="0.9" min="0" max="1" step="0.05" />
            </div>
            <div className="form-group">
              <label className="form-label">Frequency Penalty</label>
              <input className="form-input" type="number" defaultValue="0" min="0" max="2" step="0.1" />
            </div>
          </div>
        </div>
      </CollapsibleSection>

      <hr className="ink-divider" style={{ marginBottom: 16 }} />

      {/* Reflection Settings */}
      <CollapsibleSection title="反思设置" defaultOpen={false}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 8, paddingBottom: 8 }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
            <input type="checkbox" defaultChecked style={{ accentColor: '#C9A96E' }} />
            <span style={{ fontSize: 12 }}>启用自我反思</span>
          </label>
          <div className="form-group">
            <label className="form-label">反思深度</label>
            <select className="form-select" defaultValue="medium">
              <option value="light">浅层</option>
              <option value="medium">中等</option>
              <option value="deep">深度</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">最大反思轮次</label>
            <input className="form-input" type="number" defaultValue="3" min="1" max="10" />
          </div>
        </div>
      </CollapsibleSection>

      <hr className="ink-divider" style={{ marginBottom: 16 }} />

      {/* Memory Panel */}
      <CollapsibleSection title="记忆面板" defaultOpen={true}>
        <div style={{ paddingTop: 8, paddingBottom: 8 }}>
          <MemoryPanel />
        </div>
      </CollapsibleSection>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  const [selectedAgent, setSelectedAgent] = useState(ALL_AGENTS[0]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      <Header />
      <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
        {/* Agent List */}
        <div className="scrollbar-thin" style={{
          width: 240, background: '#14161A', borderRight: '1px solid #2A2D35',
          overflowY: 'auto', padding: '10px 10px',
        }}>
          <div style={{ padding: '4px 6px 10px' }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5 }}>
              Agents ({ALL_AGENTS.length})
            </span>
          </div>
          {ALL_AGENTS.map(a => (
            <AgentListItem
              key={a.id}
              agent={a}
              active={selectedAgent?.id === a.id}
              onClick={setSelectedAgent}
            />
          ))}
        </div>

        {/* Editor */}
        <AgentEditor agent={selectedAgent} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
