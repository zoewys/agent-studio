<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨垣 · Settings — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'ink-base': '#0B0C10', 'ink-surface': '#14161A', 'ink-hover': '#1C1F26', 'ink-border': '#2A2D35',
        'bronze': '#C9A96E', 'bronze-dark': '#A8884E', 'jade': '#6B8F71',
        'ink-text': '#E8E0D5', 'ink-muted': '#8B8578',
        'ink-error': '#C4554D', 'ink-warning': '#D4953A', 'ink-success': '#6B8F71',
      },
      fontFamily: { brand: ['ZCOOL XiaoWei', 'serif'], ui: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
    },
  },
};
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #0B0C10; color: #E8E0D5; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
  #root { height: 100vh; display: flex; flex-direction: column; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseBronze { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0.4); } 50% { box-shadow: 0 0 0 6px rgba(201,169,110,0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  .pulse-bronze { animation: pulseBronze 1.8s ease-in-out infinite; }

  .scrollbar-thin::-webkit-scrollbar { width: 5px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #2A2D35; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #3A3D45; }

  .ink-divider {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent 0%, #C9A96E 20%, #C9A96E 80%, transparent 100%);
    margin: 0;
  }

  .bronze-glow {
    box-shadow: 0 0 12px rgba(201,169,110,0.25), 0 0 2px rgba(201,169,110,0.4);
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    font-size: 13px; color: #8B8578; margin-bottom: 2px;
  }
  .nav-item:hover { background: #1C1F26; color: #E8E0D5; }
  .nav-item.active { background: #1C1F26; color: #C9A96E; border-color: rgba(201,169,110,0.25); }
  .nav-item.active::before {
    content: ''; width: 3px; height: 18px; background: #C9A96E; border-radius: 2px;
  }

  .provider-card {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    background: #0B0C10; border: 1px solid #2A2D35; border-radius: 10px;
    cursor: pointer; transition: all 0.2s; margin-bottom: 6px;
  }
  .provider-card:hover { border-color: #C9A96E; background: #1C1F26; }
  .provider-card.selected { border-color: #C9A96E; background: rgba(201,169,110,0.06); }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .status-dot.connected { background: #6B8F71; box-shadow: 0 0 6px rgba(107,143,113,0.5); }
  .status-dot.disconnected { background: #C4554D; box-shadow: 0 0 6px rgba(196,85,77,0.4); }
  .status-dot.testing { background: #D4953A; box-shadow: 0 0 6px rgba(212,149,58,0.4); }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 10px; color: #8B8578; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  .form-input, .form-select {
    background: #0B0C10; color: #E8E0D5; border: 1px solid #2A2D35; border-radius: 6px;
    padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s; width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: #C9A96E; }
  .form-select { cursor: pointer; }

  .preset-btn {
    background: #1C1F26; color: #8B8578; border: 1px solid #2A2D35; border-radius: 6px;
    padding: 6px 14px; font-size: 11px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .preset-btn:hover { color: #C9A96E; border-color: #C9A96E; background: rgba(201,169,110,0.08); }

  .test-btn {
    background: linear-gradient(135deg, rgba(107,143,113,0.2), rgba(107,143,113,0.05));
    border: 1px solid rgba(107,143,113,0.35); color: #6B8F71; border-radius: 8px;
    padding: 8px 18px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .test-btn:hover { background: linear-gradient(135deg, rgba(107,143,113,0.3), rgba(107,143,113,0.1)); border-color: #6B8F71; }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(201,169,110,0.2);
    border-top-color: #C9A96E; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

const { useState, useCallback } = React;

// ── Navigation items ──────────────────────────────────
const NAV_ITEMS = [
  { id: 'cli',      label: 'CLI 管理',     icon: '⌨️' },
  { id: 'providers', label: 'API 提供商',   icon: '🔌' },
  { id: 'data',     label: '数据管理',      icon: '💾' },
  { id: 'memory',   label: '记忆系统',      icon: '🧠' },
  { id: 'bg-run',   label: '后台运行',      icon: '🔄' },
  { id: 'feishu',   label: '飞书机器人',    icon: '🤖' },
];

// ── Provider data ─────────────────────────────────────
const DEFAULT_PROVIDERS = [
  { id: 'deepseek',  name: 'DeepSeek',     type: '官方 API',   url: 'https://api.deepseek.com/v1',   key: 'sk-••••••••••••••••8f3a', status: 'connected' },
  { id: 'kimi',      name: 'Kimi (月之暗面)', type: '官方 API', url: 'https://api.moonshot.cn/v1',     key: 'sk-••••••••••••••••a1b2', status: 'connected' },
  { id: 'silicon',   name: 'SiliconFlow',  type: '中转服务',   url: 'https://api.siliconflow.cn/v1',  key: 'sk-••••••••••••••••c3d4', status: 'connected' },
  { id: 'openai',    name: 'OpenAI',       type: '官方 API',   url: 'https://api.openai.com/v1',      key: '',                          status: 'disconnected' },
];

const PRESETS = [
  { name: 'DeepSeek',  type: '官方 API', url: 'https://api.deepseek.com/v1' },
  { name: 'Kimi',      type: '官方 API', url: 'https://api.moonshot.cn/v1' },
  { name: 'SiliconFlow', type: '中转服务', url: 'https://api.siliconflow.cn/v1' },
];

// ── Header ────────────────────────────────────────────
function Header() {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', padding: '10px 18px',
      background: '#14161A', borderBottom: '1px solid #2A2D35', gap: 10,
    }}>
      <span style={{ fontFamily: 'ZCOOL XiaoWei', fontSize: 18, color: '#C9A96E', letterSpacing: 2 }}>墨垣</span>
      <span style={{ fontSize: 13, fontWeight: 500 }}>设置</span>
    </div>
  );
}

// ── Navigation Sidebar ────────────────────────────────
function SettingsNav({ activeId, onSelect }) {
  return (
    <div style={{
      width: 210, background: '#14161A', borderRight: '1px solid #2A2D35',
      padding: '14px 10px', display: 'flex', flexDirection: 'column',
    }}>
      {NAV_ITEMS.map(item => (
        <div
          key={item.id}
          className={`nav-item ${activeId === item.id ? 'active' : ''}`}
          onClick={() => onSelect(item.id)}
        >
          <span style={{ fontSize: 16 }}>{item.icon}</span>
          <span>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

// ── Provider Card ─────────────────────────────────────
function ProviderCard({ provider, selected, onClick }) {
  const statusLabel = {
    connected: { text: '已连接', cls: 'connected', color: '#6B8F71' },
    disconnected: { text: '未连接', cls: 'disconnected', color: '#C4554D' },
    testing: { text: '测试中', cls: 'testing', color: '#D4953A' },
  };
  const st = statusLabel[provider.status] || statusLabel.disconnected;

  return (
    <div className={`provider-card ${selected ? 'selected' : ''} fade-in`} onClick={() => onClick(provider)}>
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
          <span style={{ fontSize: 14, fontWeight: 600 }}>{provider.name}</span>
          <span style={{ fontSize: 9, padding: '2px 6px', borderRadius: 8, background: '#1C1F26', color: '#8B8578' }}>{provider.type}</span>
        </div>
        <div style={{ fontSize: 10, color: '#5A5548', fontFamily: 'JetBrains Mono', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {provider.url}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
        <span className={`status-dot ${st.cls}`} />
        <span style={{ fontSize: 10, color: st.color }}>{st.text}</span>
      </div>
    </div>
  );
}

// ── API Providers Panel ───────────────────────────────
function ApiProvidersPanel() {
  const [providers, setProviders] = useState(DEFAULT_PROVIDERS);
  const [selectedProvider, setSelectedProvider] = useState(providers[0]);
  const [showAdd, setShowAdd] = useState(false);
  const [testingId, setTestingId] = useState(null);

  // Form state
  const [formName, setFormName] = useState('');
  const [formUrl, setFormUrl] = useState('');
  const [formKey, setFormKey] = useState('');
  const [formType, setFormType] = useState('官方 API');

  const handleSelect = (p) => {
    setSelectedProvider(p);
    setShowAdd(false);
    setFormName(p.name);
    setFormUrl(p.url);
    setFormKey(p.key);
    setFormType(p.type);
  };

  const handlePreset = (preset) => {
    setFormName(preset.name);
    setFormUrl(preset.url);
    setFormType(preset.type);
    setFormKey('');
    setShowAdd(true);
    setSelectedProvider(null);
  };

  const handleTest = (providerId) => {
    setTestingId(providerId);
    setProviders(prev => prev.map(p => p.id === providerId ? { ...p, status: 'testing' } : p));
    setTimeout(() => {
      setProviders(prev => prev.map(p => p.id === providerId ? { ...p, status: 'connected' } : p));
      setTestingId(null);
    }, 2000);
  };

  const handleSave = () => {
    if (!formName.trim()) return;
    setProviders(prev => {
      const exists = prev.find(p => p.id === selectedProvider?.id);
      if (exists && selectedProvider) {
        return prev.map(p => p.id === selectedProvider.id
          ? { ...p, name: formName, url: formUrl, key: formKey || p.key, type: formType }
          : p);
      }
      const newProvider = {
        id: 'custom-' + Date.now(),
        name: formName, url: formUrl, key: formKey ? 'sk-••••' : '',
        type: formType, status: 'disconnected',
      };
      setSelectedProvider(newProvider);
      return [...prev, newProvider];
    });
    setShowAdd(false);
  };

  const selectedIsTesting = testingId === selectedProvider?.id;

  return (
    <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
      {/* Provider List */}
      <div className="scrollbar-thin" style={{
        width: 280, borderRight: '1px solid #2A2D35', overflowY: 'auto', padding: '14px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <span style={{ fontSize: 11, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5, fontWeight: 600 }}>
            已配置 ({providers.length})
          </span>
          <button
            onClick={() => { setShowAdd(true); setSelectedProvider(null); setFormName(''); setFormUrl(''); setFormKey(''); setFormType('官方 API'); }}
            style={{
              background: 'rgba(201,169,110,0.1)', color: '#C9A96E', border: '1px solid rgba(201,169,110,0.25)',
              borderRadius: 5, padding: '3px 10px', fontSize: 10, cursor: 'pointer',
            }}
          >+ 添加</button>
        </div>
        {providers.map(p => (
          <ProviderCard key={p.id} provider={p} selected={selectedProvider?.id === p.id} onClick={handleSelect} />
        ))}
      </div>

      {/* Provider Form */}
      <div className="scrollbar-thin fade-in" style={{ flex: 1, overflowY: 'auto', padding: '24px' }}>
        {!selectedProvider && !showAdd ? (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', opacity: 0.5 }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>🔌</div>
              <div style={{ fontSize: 13, color: '#8B8578' }}>选择一个提供商或添加新的</div>
            </div>
          </div>
        ) : (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600 }}>
                {showAdd ? '添加新提供商' : selectedProvider?.name}
              </h3>
              {selectedProvider && (
                <span style={{ fontSize: 10, padding: '2px 8px', borderRadius: 8, background: '#1C1F26', color: '#8B8578' }}>
                  {selectedProvider.type}
                </span>
              )}
            </div>

            <hr className="ink-divider" style={{ marginBottom: 20 }} />

            {/* Preset buttons */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 10, color: '#8B8578', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 8 }}>快速预设</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {PRESETS.map(p => (
                  <button key={p.name} className="preset-btn" onClick={() => handlePreset(p)}>{p.name}</button>
                ))}
              </div>
            </div>

            {/* Form fields */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14, maxWidth: 480 }}>
              <div className="form-group">
                <label className="form-label">名称</label>
                <input className="form-input" value={formName} onChange={e => setFormName(e.target.value)} placeholder="例如: DeepSeek, OpenAI" />
              </div>
              <div className="form-group">
                <label className="form-label">API Base URL</label>
                <input className="form-input" value={formUrl} onChange={e => setFormUrl(e.target.value)} placeholder="https://api.example.com/v1" style={{ fontFamily: 'JetBrains Mono', fontSize: 11 }} />
              </div>
              <div className="form-group">
                <label className="form-label">API Key</label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <input className="form-input" value={formKey} onChange={e => setFormKey(e.target.value)} placeholder={selectedProvider?.key || 'sk-...'} type="password" style={{ fontFamily: 'JetBrains Mono', fontSize: 11 }} />
                  <button style={{
                    background: '#1C1F26', color: '#8B8578', border: '1px solid #2A2D35', borderRadius: 6,
                    padding: '8px 12px', cursor: 'pointer', fontSize: 11,
                  }}>👁️</button>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">提供商类型</label>
                <select className="form-select" value={formType} onChange={e => setFormType(e.target.value)}>
                  <option>官方 API</option>
                  <option>中转服务</option>
                  <option>自部署</option>
                  <option>本地模型</option>
                </select>
              </div>

              {/* Actions */}
              <div style={{ display: 'flex', gap: 10, marginTop: 6 }}>
                <button className="test-btn"
                  onClick={() => selectedProvider && handleTest(selectedProvider.id)}
                  disabled={selectedIsTesting}
                >
                  {selectedIsTesting ? <><span className="spinner" />测试中...</> : '🔗 测试连接'}
                </button>
                <button
                  onClick={handleSave}
                  style={{
                    background: 'linear-gradient(135deg, #C9A96E, #A8884E)', color: '#0B0C10',
                    border: 'none', borderRadius: 8, padding: '8px 22px', fontSize: 12, fontWeight: 600,
                    cursor: 'pointer', transition: 'all 0.2s',
                  }}
                >💾 保存</button>
              </div>
            </div>

            {/* Connected status */}
            {selectedProvider && selectedProvider.status === 'connected' && (
              <div style={{
                marginTop: 24, padding: '14px 18px', background: 'rgba(107,143,113,0.06)',
                border: '1px solid rgba(107,143,113,0.2)', borderRadius: 8, maxWidth: 480,
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span className="status-dot connected pulse-bronze" style={{ boxShadow: '0 0 8px rgba(107,143,113,0.5)' }} />
                  <span style={{ fontSize: 13, fontWeight: 500, color: '#6B8F71' }}>连接正常</span>
                </div>
                <div style={{ fontSize: 11, color: '#8B8578', marginTop: 4 }}>
                  最后验证: {new Date().toLocaleDateString('zh-CN')} — 延迟 42ms
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── Placeholder Panel ─────────────────────────────────
function PlaceholderPanel({ sectionId }) {
  const item = NAV_ITEMS.find(n => n.id === sectionId);
  return (
    <div style={{
      flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0.5,
    }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>{item?.icon || '📄'}</div>
        <div style={{ fontSize: 15, fontWeight: 500, color: '#8B8578' }}>{item?.label || '面板'}</div>
        <div style={{ fontSize: 11, color: '#5A5548', marginTop: 4 }}>配置面板开发中</div>
      </div>
    </div>
  );
}

// ── Main Content Router ───────────────────────────────
function SettingsContent({ activeSection }) {
  if (activeSection === 'providers') {
    return <ApiProvidersPanel />;
  }
  return <PlaceholderPanel sectionId={activeSection} />;
}

// ── App ───────────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState('providers');

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      <Header />
      <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
        <SettingsNav activeId={activeSection} onSelect={setActiveSection} />
        <SettingsContent activeSection={activeSection} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
