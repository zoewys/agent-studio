  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'soil-dark':'#1A1B1A','soil-surface':'#242524','soil-hover':'#2A2B2A','soil-border':'#333433',
            'moss':'#5B8C5A','moss-light':'#7AAA79','moss-warm':'#4A7A49',
            'ochre':'#8B6F47','ochre-light':'#A68B60',
            'terracotta':'#D4956B','terracotta-light':'#E0B090',
            'lake':'#5A8FA8',
            'earth-text':'#E8E6E0','earth-text-dim':'#8C8A84',
            'earth-error':'#C4705A','earth-success':'#557C53',
          },
          fontFamily: {
            display:['"Newsreader"','Georgia','serif'],ui:['"Inter"','system-ui','sans-serif'],mono:['"JetBrains Mono"','monospace'],
          },
          animation: {
            'breathe':'breathe 4s ease-in-out infinite','breathe-fast':'breathe 2.5s ease-in-out infinite',
            'grow-in':'growIn 0.4s cubic-bezier(0.34,1.56,0.64,1)',
            'warm-fade':'warmFade 0.4s ease-out','sway':'sway 6s ease-in-out infinite',
          },
          keyframes: {
            breathe:{'0%,100%':{transform:'scale(1)',opacity:'0.8'},'50%':{transform:'scale(1.04)',opacity:'1'}},
            growIn:{'0%':{transform:'scale(0.95)',opacity:'0'},'100%':{transform:'scale(1)',opacity:'1'}},
            warmFade:{'0%':{opacity:'0',transform:'translateY(5px)'},'100%':{opacity:'1',transform:'translateY(0)'}},
            sway:{'0%,100%':{transform:'rotate(0deg)'},'25%':{transform:'rotate(0.5deg)'},'75%':{transform:'rotate(-0.5deg)'}},
          },
        }
      }
    }
  </script>

  <style>
    * { scrollbar-width:thin;scrollbar-color:rgba(91,140,90,0.12) transparent; }
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(91,140,90,0.12);border-radius:2px;}

    .earth-texture::before{
      content:'';position:absolute;inset:0;opacity:0.025;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse at 30% 40%,rgba(212,149,107,0.15) 0%,transparent 60%),
                radial-gradient(ellipse at 70% 60%,rgba(91,140,90,0.12) 0%,transparent 50%);

    .warm-gradient{background:linear-gradient(135deg,rgba(91,140,90,0.06) 0%,rgba(139,111,71,0.04) 50%,rgba(212,149,107,0.03) 100%);}

    .breathe-glow{box-shadow:0 0 0 1px rgba(91,140,90,0.12),0 0 15px rgba(91,140,90,0.04);}
    .breathe-glow-strong{box-shadow:0 0 0 1px rgba(91,140,90,0.2),0 0 25px rgba(91,140,90,0.08);}

    .moss-press{transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
    .moss-press:active{transform:scale(0.96);}

    .organic-transition{transition:all 0.35s cubic-bezier(0.4,0,0.2,1);}

    /* 事件类型左边框颜色 */
    .evt-think{border-left:2px solid #8B6F47;}
    .evt-tool{border-left:2px solid #D4956B;}
    .evt-text{border-left:2px solid #5B8C5A;}
    .evt-error{border-left:2px solid #C4705A;}
    .evt-result{border-left:2px solid #5A8FA8;}

  </style>

    function FilePreviewPanel({ file, onClose }) {
      const [tab,setTab]=useState('code');
      if(!file) return null;
      const codeContent=`// src/auth/token.ts
import jwt from 'jsonwebtoken';
import { env } from '../config';

const REFRESH_WINDOW = 5 * 60 * 1000;
const MAX_RETRIES = 3;

export async function refreshToken(
  currentToken: string
): Promise<string> {
  const decoded = jwt.decode(currentToken);
  const expiresAt = decoded.exp * 1000;
  if (expiresAt - Date.now() > REFRESH_WINDOW)
    return currentToken;

  let retries = 0;
  while (retries < MAX_RETRIES) {
    try {
      return (await fetch(/*...*/)).data.token;
    } catch {
      retries++;
      await sleep(2 ** retries * 100);
    }
  }
  throw new Error('Token refresh failed');
}`;

          </div>
          <div className="flex border-b border-soil-border">
            {['代码','预览','差异'].map(t=>(
              <button key={t} onClick={()=>setTab(t)}
                className={`px-4 py-2.5 text-[11px] font-medium organic-transition border-b-2 ${
                  tab===t?'border-moss text-moss':'border-transparent text-earth-text-dim hover:text-earth-text'
                }`}>{t}</button>
            ))}
          </div>
          <div className="flex-1 overflow-y-auto p-3">
            {tab==='代码'&&<pre className="text-[10px] font-mono text-earth-text-dim leading-relaxed whitespace-pre overflow-x-auto"><code>{codeContent}</code></pre>}
            {tab==='预览'&&(
              <div className="text-xs text-earth-text-dim space-y-3">
                <div className="p-3 rounded-organic-sm border border-soil-border bg-soil-dark">
                  <h3 className="font-semibold text-earth-text mb-2">Token 刷新逻辑</h3>
                  <p className="mb-1.5">🌱 过期前 <code className="px-1.5 py-0.5 rounded bg-terracotta/10 text-terracotta-light text-[10px]">5 分钟</code> 自动刷新</p>
                  <p className="mb-1.5">🔄 最多重试 <code className="px-1.5 py-0.5 rounded bg-terracotta/10 text-terracotta-light text-[10px]">3 次</code></p>
                  <div className="flex gap-2 mt-3 text-[10px]">
                    <span className="px-2 py-0.5 rounded-full bg-earth-success/8 text-earth-success">+28 行</span>
                    <span className="px-2 py-0.5 rounded-full bg-earth-error/8 text-earth-error">−3 行</span>
                  </div>
                </div>
              </div>
            )}
            {tab==='差异'&&(
              <pre className="text-[10px] font-mono leading-relaxed overflow-x-auto">
                <code>
                  <span className="text-earth-text-dim/60">{'@@ -3,6 +3,28 @@\n'}</span>
                  <span className="text-earth-text-dim">{' import jwt...\n'}</span>
                  <span className="text-earth-success">{'+const REFRESH_WINDOW = 5 * 60 * 1000;\n+const MAX_RETRIES = 3;\n+export async function refreshToken...\n'}</span>
                </code>
              </pre>
            )}
          </div>
        </aside>
      );
    }

    function RunDetail() {
      const [activeStep,setActiveStep]=useState(2);
      const [previewFile,setPreviewFile]=useState(null);
      const cur=STEPS[activeStep];
      return (
        <div className="flex-1 flex flex-col min-w-0 bg-soil-dark relative earth-texture">
          <DetailHeader/>
          <div className="px-4 pt-3 pb-2 shrink-0">
            <StepChips steps={STEPS} activeStep={activeStep} onStepClick={setActiveStep}/>
            {cur?.parallel&&<div className="mt-2 animate-warm-fade"><ParallelGroup group={cur.parallel}/></div>}
          </div>
          <div className="warm-divider mx-4"/>
          <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
            <PromptViewer/>
            <TranscriptViewer events={TRANSCRIPT}/>
          </div>
          <ArtifactCards artifacts={ARTIFACTS} onPreview={setPreviewFile}/>
          <MemoryRefs memories={MEMORIES}/>
          <ComposerBar/>
          <FilePreviewPanel file={previewFile} onClose={()=>setPreviewFile(null)}/>
        </div>
      );
    }

    function App() {
      const [activeRun,setActiveRun]=useState(1);
      return (
        <div className="h-screen w-screen flex bg-soil-dark overflow-hidden">
          <RunsSidebar activeRun={activeRun} onSelect={setActiveRun}/>
          <RunDetail/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
