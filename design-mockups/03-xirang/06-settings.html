<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>息壤 · Settings — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400&family=Newsreader:opsz,wght@6..72,200..800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'soil-dark':    '#1A1B1A',
          'soil-surface': '#242524',
          'soil-hover':   '#2A2B2A',
          'soil-border':  '#333433',
          primary:   '#5B8C5A',
          accent:    '#8B6F47',
          tertiary:  '#D4956B',
          'text-primary':   '#E8E6E0',
          'text-secondary': '#8C8A84',
          error:   '#C4705A',
          success: '#557C53',
          info:    '#5A8FA8',
        },
        fontFamily: {
          display: ['Newsreader', 'serif'],
          ui:      ['Inter', 'system-ui', 'sans-serif'],
          mono:    ['JetBrains Mono', 'monospace'],
        },
        borderRadius: {
          'organic-sm': '8px',
          'organic-md': '12px',
          'organic-lg': '16px',
          'organic-xl': '20px',
        },
        animation: {
          breathe: 'breathe 4s ease-in-out infinite',
        },
        keyframes: {
          breathe: {
            '0%, 100%': { opacity: '0.5', boxShadow: '0 0 10px rgba(91,140,90,0.12)' },
            '50%':      { opacity: '1',   boxShadow: '0 0 20px rgba(91,140,90,0.25)' },
          },
        },
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1A1B1A;
    color: #E8E6E0;
    height: 100vh;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1A1B1A; }
  ::-webkit-scrollbar-thumb { background: #333433; border-radius: 3px; }

  .earth-texture {
    background:
      radial-gradient(ellipse at 25% 35%, rgba(91,140,90,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 65%, rgba(139,111,71,0.06) 0%, transparent 55%),
      #1A1B1A;
  }
  .warm-gradient {
    background: linear-gradient(135deg, rgba(139,111,71,0.2) 0%, rgba(91,140,90,0.15) 50%, rgba(212,149,107,0.1) 100%);
  }
  .warm-gradient-subtle {
    background: linear-gradient(135deg, rgba(139,111,71,0.08) 0%, rgba(91,140,90,0.05) 100%);
  }
  .breathe-glow {
    box-shadow: 0 0 18px rgba(91,140,90,0.2), 0 0 36px rgba(91,140,90,0.07);
  }
  .organic-transition {
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .moss-press {
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .moss-press:active {
    transform: scale(0.94);
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    color: #8C8A84;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid transparent;
  }
  .nav-item:hover {
    background: #2A2B2A;
    color: #E8E6E0;
  }
  .nav-item.active {
    background: rgba(91,140,90,0.1);
    border-color: rgba(91,140,90,0.25);
    color: #5B8C5A;
  }
  .provider-card {
    border: 1.5px solid #333433;
    border-radius: 14px;
    background: #242524;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .provider-card:hover {
    border-color: #444544;
  }
  .provider-card.connected {
    border-color: rgba(91,140,90,0.3);
    background: linear-gradient(135deg, rgba(91,140,90,0.06), #242524);
  }
  .toggle-track {
    width: 40px;
    height: 22px;
    border-radius: 11px;
    background: #333433;
    cursor: pointer;
    transition: background 0.3s;
    position: relative;
  }
  .toggle-track.on {
    background: #5B8C5A;
  }
  .toggle-knob {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #E8E6E0;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: left 0.3s;
  }
  .toggle-track.on .toggle-knob {
    left: 20px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.online {
    background: #557C53;
    box-shadow: 0 0 8px rgba(85,124,83,0.4);
    animation: breathe 4s ease-in-out infinite;
  }
  .status-dot.offline {
    background: #555;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback } = React;

/* ─── Header ─── */
const SettingsHeader = () => (
  <header className="flex items-center px-5 py-2"
    style={{ background: '#242524', borderBottom: '1px solid #333433', height: 48 }}>
    <div className="flex items-center gap-3">
      <span className="font-display text-lg font-medium" style={{ color: '#5B8C5A' }}>息壤</span>
      <span className="text-sm text-text-secondary font-ui">/ 设置</span>
    </div>
  </header>
);

/* ─── Settings Nav ─── */
const navSections = [
  { id: 'providers', label: 'API 提供商', icon: '🔌' },
  { id: 'general',   label: '通用设置',   icon: '⚙️' },
  { id: 'appearance',label: '外观',       icon: '🎨' },
  { id: 'notifications', label: '通知',   icon: '🔔' },
  { id: 'security',  label: '安全',       icon: '🔒' },
  { id: 'about',     label: '关于',       icon: 'ℹ️' },
];

const SettingsNav = ({ activeSection, onSelect }) => (
  <nav className="flex flex-col p-3 space-y-1"
    style={{ width: 220, background: '#1E1F1E', borderRight: '1px solid #333433' }}>
    <div className="px-3 py-2 text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary">
      设置
    </div>
    {navSections.map(s => (
      <div key={s.id} onClick={() => onSelect(s.id)}
        className={`nav-item moss-press ${activeSection === s.id ? 'active' : ''}`}>
        <span>{s.icon}</span>
        <span className="font-ui">{s.label}</span>
        {s.id === 'providers' && activeSection === 'providers' && (
          <span className="ml-auto status-dot online" />
        )}
      </div>
    ))}
    <div className="mt-auto pt-4" style={{ borderTop: '1px solid #333433' }}>
      <div className="px-3 py-2 text-[10px] text-text-secondary font-mono">
        Agent Studio v0.1.0
      </div>
      <div className="px-3 text-[10px] text-text-secondary font-mono">
        息壤 · Breathing Earth
      </div>
    </div>
  </nav>
);

/* ─── Toggle Switch ─── */
const Toggle = ({ on, onChange }) => (
  <div className={`toggle-track ${on ? 'on' : ''}`} onClick={() => onChange(!on)}>
    <div className="toggle-knob" />
  </div>
);

/* ─── Provider Card ─── */
const ProviderCard = ({ provider, onToggle, onConfigure }) => {
  const isConnected = provider.enabled && provider.configured;

  return (
    <div className={`provider-card p-4 ${isConnected ? 'connected' : ''}`}>
      <div className="flex items-start justify-between">
        <div className="flex items-center gap-3">
          <div className="text-3xl">{provider.icon}</div>
          <div>
            <div className="text-sm font-ui font-medium text-text-primary">{provider.name}</div>
            <div className="text-xs text-text-secondary mt-0.5">{provider.description}</div>
          </div>
        </div>
        <Toggle on={provider.enabled} onChange={onToggle} />
      </div>

      <div className="flex items-center gap-3 mt-4">
        {isConnected ? (
          <>
            <span className="status-dot online" />
            <span className="text-xs font-mono text-success">已连接</span>
            {provider.models && (
              <span className="text-[10px] text-text-secondary font-mono ml-auto">
                {provider.models.length} 个模型可用
              </span>
            )}
          </>
        ) : provider.enabled ? (
          <>
            <span className="status-dot offline" />
            <span className="text-xs text-text-secondary">未配置</span>
          </>
        ) : (
          <span className="text-xs text-text-secondary">已禁用</span>
        )}
      </div>

      {provider.enabled && (
        <div className="mt-3 pt-3" style={{ borderTop: '1px solid #333433' }}>
          {isConnected && provider.models ? (
            <div className="flex flex-wrap gap-1.5">
              {provider.models.map(m => (
                <span key={m} className="text-[10px] px-2 py-0.5 rounded-full font-mono"
                  style={{ background: 'rgba(91,140,90,0.08)', color: '#5B8C5A',
                    border: '1px solid rgba(91,140,90,0.15)' }}>
                  {m}
                </span>
              ))}
            </div>
          ) : (
            <button onClick={onConfigure}
              className="moss-press w-full py-2 rounded-organic-sm text-xs font-ui font-medium
                bg-primary/12 text-primary border border-primary/20
                hover:bg-primary/20 organic-transition">
              配置 API 密钥
            </button>
          )}
        </div>
      )}
    </div>
  );
};

/* ─── API Providers Panel ─── */
const defaultProviders = [
  {
    id: 'anthropic',
    name: 'Anthropic',
    icon: '🧬',
    description: 'Claude 系列模型 — Opus, Sonnet, Haiku',
    enabled: true,
    configured: true,
    models: ['Claude Opus 4', 'Claude Sonnet 4', 'Claude Haiku 3.5'],
  },
  {
    id: 'openai',
    name: 'OpenAI',
    icon: '🤖',
    description: 'GPT-4o, GPT-4, o3 系列模型',
    enabled: true,
    configured: true,
    models: ['GPT-4o', 'GPT-4o-mini', 'o3-mini'],
  },
  {
    id: 'google',
    name: 'Google AI',
    icon: '🌐',
    description: 'Gemini 系列模型',
    enabled: false,
    configured: false,
    models: ['Gemini 2.5 Pro', 'Gemini 2.5 Flash'],
  },
  {
    id: 'deepseek',
    name: 'DeepSeek',
    icon: '🔮',
    description: 'DeepSeek-V3, DeepSeek-R1',
    enabled: false,
    configured: false,
    models: ['DeepSeek-V3', 'DeepSeek-R1'],
  },
  {
    id: 'ollama',
    name: 'Ollama',
    icon: '🦙',
    description: '本地模型部署与推理',
    enabled: true,
    configured: true,
    models: ['llama3.1:70b', 'mistral:latest', 'codellama:34b'],
  },
];

const ApiProvidersPanel = ({ providers, onToggleProvider, onConfigureProvider }) => (
  <div className="flex-1 overflow-y-auto p-6">
    <div className="mb-6">
      <h2 className="text-xl font-display font-medium text-text-primary mb-2">API 提供商</h2>
      <p className="text-sm text-text-secondary">
        管理连接到 Agent Studio 的 AI 模型提供商。启用后，其模型即可在工作流中使用。
      </p>
    </div>

    {/* Status overview */}
    <div className="warm-gradient rounded-organic-lg p-4 mb-6 flex items-center gap-6">
      <div className="text-center">
        <div className="text-2xl font-display font-semibold text-text-primary">
          {providers.filter(p => p.enabled && p.configured).length}
        </div>
        <div className="text-[10px] text-text-secondary uppercase tracking-wider mt-1">已连接</div>
      </div>
      <div className="w-px h-8 bg-soil-border" />
      <div className="text-center">
        <div className="text-2xl font-display font-semibold text-text-primary">
          {providers.reduce((sum, p) => sum + (p.enabled && p.configured ? p.models.length : 0), 0)}
        </div>
        <div className="text-[10px] text-text-secondary uppercase tracking-wider mt-1">可用模型</div>
      </div>
      <div className="w-px h-8 bg-soil-border" />
      <div className="text-center">
        <div className="text-2xl font-display font-semibold"
          style={{ color: providers.filter(p => p.enabled).length > 0 ? '#557C53' : '#8C8A84' }}>
          {providers.filter(p => p.enabled).length}
        </div>
        <div className="text-[10px] text-text-secondary uppercase tracking-wider mt-1">已启用</div>
      </div>
    </div>

    {/* Provider list */}
    <div className="space-y-3">
      {providers.map(provider => (
        <ProviderCard key={provider.id}
          provider={provider}
          onToggle={() => onToggleProvider(provider.id)}
          onConfigure={() => onConfigureProvider(provider.id)} />
      ))}
    </div>

    {/* Add custom provider */}
    <div className="mt-4 rounded-organic-lg p-4 text-center cursor-pointer organic-transition
      hover:bg-soil-hover"
      style={{ border: '1px dashed #333433' }}>
      <span className="text-sm text-text-secondary">+ 添加自定义提供商</span>
    </div>
  </div>
);

/* ─── Configuration Modal (inline) ─── */
const ConfigModal = ({ provider, onClose, onSave }) => {
  const [apiKey, setApiKey] = useState('');
  const [baseUrl, setBaseUrl] = useState('');

  const handleSave = () => {
    onSave(provider.id, { apiKey, baseUrl });
    onClose();
  };

  return (
    <div className="absolute inset-0 flex items-center justify-center z-50"
      style={{ background: 'rgba(26,27,26,0.75)', backdropFilter: 'blur(4px)' }}>
      <div className="warm-gradient rounded-organic-xl p-6"
        style={{ width: 420, background: '#242524', border: '1px solid #333433' }}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm font-ui font-semibold text-text-primary">
            配置 {provider?.name}
          </h3>
          <button onClick={onClose}
            className="moss-press text-text-secondary hover:text-text-primary organic-transition text-lg leading-none">&times;</button>
        </div>
        <div className="space-y-4">
          <div>
            <label className="block text-xs text-text-secondary mb-1.5">API 密钥</label>
            <input type="password" value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="sk-…"
              className="w-full px-3 py-2.5 rounded-organic-sm text-sm font-mono text-text-primary
                bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition" />
          </div>
          <div>
            <label className="block text-xs text-text-secondary mb-1.5">Base URL (可选)</label>
            <input type="text" value={baseUrl}
              onChange={e => setBaseUrl(e.target.value)}
              placeholder="https://api.anthropic.com"
              className="w-full px-3 py-2.5 rounded-organic-sm text-sm font-mono text-text-primary
                bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition" />
          </div>
        </div>
        <div className="flex justify-end gap-3 mt-5">
          <button onClick={onClose}
            className="moss-press px-4 py-2 rounded-organic-sm text-sm font-ui text-text-secondary
              hover:bg-soil-hover organic-transition">取消</button>
          <button onClick={handleSave}
            className="moss-press px-4 py-2 rounded-organic-md text-sm font-ui font-semibold
              bg-primary text-[#1A1B1A] hover:opacity-90 organic-transition">保存</button>
        </div>
      </div>
    </div>
  );
};

/* ─── Generic Placeholder Panel ─── */
const PlaceholderPanel = ({ title }) => (
  <div className="flex-1 flex items-center justify-center">
    <div className="text-center">
      <div className="text-5xl mb-4">🌿</div>
      <h2 className="text-lg font-display font-medium text-text-primary mb-2">{title}</h2>
      <p className="text-sm text-text-secondary">此设置面板正在生长中…</p>
    </div>
  </div>
);

/* ─── Main App ─── */
const SettingsApp = () => {
  const [activeSection, setActiveSection] = useState('providers');
  const [providers, setProviders] = useState(defaultProviders);
  const [configuring, setConfiguring] = useState(null);

  const handleToggleProvider = useCallback((id) => {
    setProviders(prev => prev.map(p =>
      p.id === id ? { ...p, enabled: !p.enabled } : p
    ));
  }, []);

  const handleConfigureProvider = useCallback((id) => {
    const provider = providers.find(p => p.id === id);
    setConfiguring(provider);
  }, [providers]);

  const handleSaveConfig = useCallback((id, config) => {
    setProviders(prev => prev.map(p =>
      p.id === id ? { ...p, configured: true } : p
    ));
  }, []);

  const renderContent = () => {
    switch (activeSection) {
      case 'providers':
        return (
          <ApiProvidersPanel
            providers={providers}
            onToggleProvider={handleToggleProvider}
            onConfigureProvider={handleConfigureProvider} />
        );
      case 'general':
        return <PlaceholderPanel title="通用设置" />;
      case 'appearance':
        return <PlaceholderPanel title="外观设置" />;
      case 'notifications':
        return <PlaceholderPanel title="通知设置" />;
      case 'security':
        return <PlaceholderPanel title="安全设置" />;
      case 'about':
        return (
          <div className="flex-1 flex items-center justify-center">
            <div className="text-center warm-gradient rounded-organic-xl p-8" style={{ border: '1px solid #333433' }}>
              <div className="text-5xl mb-4">🌱</div>
              <h2 className="text-xl font-display font-medium text-text-primary mb-3">息壤 · Breathing Earth</h2>
              <p className="text-sm text-text-secondary mb-4">Agent Studio v0.1.0</p>
              <div className="text-xs text-text-secondary font-mono space-y-1">
                <div>设计方向：有机科技 · 大地美学</div>
                <div>呼吸频率：约 15/分钟</div>
                <div>生长于土壤之中，连接如菌丝网络</div>
              </div>
            </div>
          </div>
        );
      default:
        return null;
    }
  };

  return (
    <div className="flex flex-col h-screen earth-texture">
      <SettingsHeader />
      <div className="flex flex-1 overflow-hidden relative">
        <SettingsNav activeSection={activeSection} onSelect={setActiveSection} />
        {renderContent()}
        {configuring && (
          <ConfigModal
            provider={configuring}
            onClose={() => setConfiguring(null)}
            onSave={handleSaveConfig} />
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SettingsApp />);
</script>
</body>
</html>
