<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Studio — App Shell — 息壤 Breathing Earth</title>

  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'soil-dark': '#1A1B1A', 'soil-surface': '#242524', 'soil-hover': '#2A2B2A',
            'soil-border': '#333433',
            'moss': '#5B8C5A', 'moss-light': '#7AAA79', 'moss-warm': '#4A7A49',
            'ochre': '#8B6F47', 'ochre-light': '#A68B60',
            'terracotta': '#D4956B', 'terracotta-light': '#E0B090',
            'lake': '#5A8FA8',
            'earth-text': '#E8E6E0', 'earth-text-dim': '#8C8A84',
            'earth-error': '#C4705A', 'earth-success': '#557C53',
          },
          fontFamily: {
            display: ['"Newsreader"', 'Georgia', 'serif'],
            ui: ['"Inter"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          animation: {
            'breathe': 'breathe 4s ease-in-out infinite',
            'breathe-slow': 'breathe 6s ease-in-out infinite',
            'grow-in': 'growIn 0.5s cubic-bezier(0.34,1.56,0.64,1)',
            'tendril': 'tendril 3s ease-in-out infinite',
            'warm-fade': 'warmFade 0.5s ease-out',
            'leaf-sway': 'leafSway 3s ease-in-out infinite',
          },
          keyframes: {
            breathe: {
              '0%,100%': { transform:'scale(1)', opacity:'0.8' },
              '50%': { transform:'scale(1.03)', opacity:'1' },
            },
            growIn: {
              '0%': { transform:'scale(0.9)', opacity:'0' },
              '100%': { transform:'scale(1)', opacity:'1' },
            },
            tendril: {
              '0%,100%': { strokeDashoffset:'20' },
              '50%': { strokeDashoffset:'0' },
            },
            warmFade: {
              '0%': { opacity:'0', transform:'translateY(6px)' },
              '100%': { opacity:'1', transform:'translateY(0)' },
            },
            leafSway: {
              '0%,100%': { transform:'rotate(-1deg)' },
              '50%': { transform:'rotate(1deg)' },
            },
          },
          borderRadius: {
            'organic': '12px',
            'organic-lg': '16px',
            'organic-sm': '8px',
          },
        }
      }
    }
  </script>

  <style>
    * { scrollbar-width: thin; scrollbar-color: rgba(91,140,90,0.15) transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(91,140,90,0.15); border-radius: 2px; }

    /* ── 纸纹/纤维质感背景 ── */
    .earth-texture {
      position: relative;
    }
    .earth-texture::before {
      content: '';
      position: absolute; inset: 0; opacity: 0.03; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(212,149,107,0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(91,140,90,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(139,111,71,0.1) 0%, transparent 40%);
    }

    /* ── 温润渐变 ── */
    .warm-gradient {
      background: linear-gradient(135deg, rgba(91,140,90,0.08) 0%, rgba(139,111,71,0.05) 50%, rgba(212,149,107,0.04) 100%);
    }
    .warm-gradient-top {
      background: linear-gradient(180deg, rgba(212,149,107,0.06) 0%, transparent 100%);
    }

    /* ── 苔藓按压效果 (spring 动画替代) ── */
    .moss-press {
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .moss-press:active {
      transform: scale(0.96);
    }

    /* ── 模式激活指示器 (有机生长线) ── */
    .mode-active-earth {
      position: relative;
    }
    .mode-active-earth::before {
      content: '';
      position: absolute; left: 2px; top: 6px; bottom: 6px; width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, #5B8C5A, #8B6F47, #D4956B);
      opacity: 0.8;
    }

    /* ── 菌丝网络连接线 ── */
    .mycelium-border {
      border-color: rgba(91,140,90,0.12);
    }

    /* ── 呼吸发光 ── */
    .breathe-glow {
      box-shadow: 0 0 0 1px rgba(91,140,90,0.15), 0 0 20px rgba(91,140,90,0.05);
    }

    /* ── 过渡 ── */
    .organic-transition {
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    }
  </style>
</head>
<body class="bg-soil-dark text-earth-text font-ui antialiased overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const Icons = {
      Workflow: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#5B8C5A':'#8C8A84'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="6" cy="5" r="2.5"/><circle cx="16" cy="5" r="2.5"/><circle cx="11" cy="17" r="2.5"/>
          <path d="M8.3 6.5 C10 9,12 9,13.5 6.5"/><path d="M8.5 16 L8.5 7.5"/><path d="M13.5 16 L13.5 7.5"/>
        </svg>
      ),
      Templates: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#5B8C5A':'#8C8A84'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="2"/><rect x="13" y="3" width="6" height="7" rx="2"/>
          <rect x="3" y="13" width="6" height="6" rx="2"/><rect x="13" y="13" width="6" height="6" rx="2"/>
          <path d="M10 6.5 L13 6.5"/><path d="M10 16 L13 16"/>
        </svg>
      ),
      Agents: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#5B8C5A':'#8C8A84'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="7" r="3"/><path d="M6 19 C6 15,7 13,11 13 C15 13,16 15,16 19"/>
          <circle cx="8" cy="6" r="1" fill={active?'#5B8C5A':'#8C8A84'} opacity="0.5"/>
        </svg>
      ),
      SingleRun: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#5B8C5A':'#8C8A84'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M7 4 L7 18"/><path d="M15 4 L15 18"/><path d="M4 8 L18 8"/><circle cx="11" cy="13" r="2"/>
        </svg>
      ),
      Settings: ({ active }) => (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={active?'#5B8C5A':'#8C8A84'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="3"/><path d="M11 3 L11 5 M11 17 L11 19 M3 11 L5 11 M17 11 L19 11"/>
          <path d="M5.5 5.5 L6.8 6.8 M15.2 15.2 L16.5 16.5 M5.5 16.5 L6.8 15.2 M15.2 6.8 L16.5 5.5"/>
        </svg>
      ),
    };

    const MODES = [
      { id:'workflow', label:'工作流', icon:Icons.Workflow },
      { id:'templates', label:'模板', icon:Icons.Templates },
      { id:'agents', label:'Agent', icon:Icons.Agents },
      { id:'single', label:'单次', icon:Icons.SingleRun },
      { id:'settings', label:'设置', icon:Icons.Settings },
    ];

    function Header() {
      return (
        <header className="h-12 flex items-center justify-between px-5 border-b border-soil-border bg-soil-dark/95 backdrop-blur-sm shrink-0 select-none relative z-10">
          <div className="flex items-center gap-3">
            {/* Organic logo mark */}
            <div className="w-8 h-8 rounded-organic-sm relative flex items-center justify-center overflow-hidden warm-gradient"
              style={{border:'1px solid rgba(91,140,90,0.25)'}}>
              <span className="text-base font-display font-semibold text-moss tracking-tight" style={{fontStyle:'italic'}}>a</span>
              <svg className="absolute inset-0 w-full h-full opacity-20" viewBox="0 0 32 32" fill="none" stroke="#5B8C5A" strokeWidth="0.5">
                <path d="M8 28 Q16 8,24 28" strokeDasharray="2 2"/>
                <path d="M4 28 Q16 12,28 28" strokeDasharray="3 3" opacity="0.5"/>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <h1 className="text-base font-display font-medium text-earth-text tracking-tight">Agent Studio</h1>
              <span className="text-[10px] text-earth-text-dim font-ui tracking-wide hidden sm:inline">— a living tool</span>
            </div>
          </div>

          {/* Warm status chips */}
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-1.5 px-3 py-1 rounded-organic-sm bg-soil-surface border border-soil-border text-[11px] text-earth-text-dim">
              <span className="w-1.5 h-1.5 rounded-full bg-moss animate-breathe"/>
              <span className="font-medium">3 运行中</span>
            </div>
            <div className="flex items-center gap-1.5 px-3 py-1 rounded-organic-sm bg-soil-surface border border-soil-border text-[11px] text-earth-text-dim">
              <span className="font-mono text-earth-text/80 text-[10px]">12.5k</span>
              <span>tokens</span>
            </div>
          </div>
        </header>
      );
    }

    function ModeRail({ activeMode, onModeChange }) {
      return (
        <nav className="w-[68px] shrink-0 border-r border-soil-border bg-soil-dark/90 flex flex-col items-center pt-5 pb-3 gap-1 select-none relative z-10">
          {MODES.map(mode => {
            const isActive = activeMode === mode.id;
            const Icon = mode.icon;
            return (
              <button key={mode.id} onClick={()=>onModeChange(mode.id)}
                className={`relative w-12 h-12 flex flex-col items-center justify-center gap-1 rounded-organic-sm organic-transition moss-press group ${
                  isActive
                    ? 'mode-active-earth warm-gradient text-moss'
                    : 'text-earth-text-dim hover:text-earth-text hover:bg-soil-hover/50'
                }`}
                title={mode.label}>
                <Icon active={isActive}/>
                <span className="text-[9px] font-medium tracking-wide opacity-80">{mode.label}</span>
              </button>
            );
          })}

          <div className="flex-1"/>

          {/* Organic growth indicator */}
          <div className="flex flex-col items-center gap-1.5 mb-2">
            <svg className="w-4 h-4 opacity-30" viewBox="0 0 16 16" fill="none" stroke="#5B8C5A" strokeWidth="1.2" strokeLinecap="round">
              <path d="M8 14 V6"/><path d="M5 9 Q8 4,11 9"/>
            </svg>
            <span className="text-[8px] text-earth-text-dim/40 font-mono">v0.1</span>
          </div>
        </nav>
      );
    }

    function EmptyWorkspace({ activeMode }) {
      const modeInfo = MODES.find(m=>m.id===activeMode);
      const descriptions = {
        templates:'编排 AI 工作流，像藤蔓在土壤中自然延展',
        workflow:'运行与监控 — 观察每一次执行的生长脉络',
        agents:'培育你的 AI Agent，赋予它们独特的生命力',
        single:'快速对话，像播下一粒种子',
        settings:'调试系统环境，为生长准备沃土',
      };

      return (
        <div className="flex-1 flex items-center justify-center relative overflow-hidden earth-texture">
          {/* Mycelial network background */}
          <svg className="absolute inset-0 w-full h-full opacity-[0.03]" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs>
              <radialGradient id="node1"><stop offset="0%" stopColor="#5B8C5A"/><stop offset="100%" stopColor="transparent"/></radialGradient>
              <radialGradient id="node2"><stop offset="0%" stopColor="#D4956B"/><stop offset="100%" stopColor="transparent"/></radialGradient>
            </defs>
            {/* Mycelial threads */}
            <path d="M100 400 Q200 300,250 350 Q320 420,400 320" fill="none" stroke="#5B8C5A" strokeWidth="1" opacity="0.3"/>
            <path d="M600 200 Q500 300,550 380 Q580 420,530 480" fill="none" stroke="#D4956B" strokeWidth="1" opacity="0.3"/>
            <path d="M300 200 Q380 250,420 200 Q480 150,550 250" fill="none" stroke="#8B6F47" strokeWidth="0.8" opacity="0.3"/>
            <path d="M200 450 Q350 380,450 420 Q520 450,620 380" fill="none" stroke="#5B8C5A" strokeWidth="0.8" opacity="0.25"/>
            {/* Nodes */}
            <circle cx="250" cy="350" r="20" fill="url(#node1)" opacity="0.4"/>
            <circle cx="400" cy="320" r="25" fill="url(#node2)" opacity="0.3"/>
            <circle cx="550" cy="250" r="18" fill="url(#node1)" opacity="0.35"/>
          </svg>

          <div className="relative z-10 text-center animate-grow-in">
            {/* Organic centerpiece — like a seed or spore */}
            <div className="w-28 h-28 mx-auto mb-6 relative flex items-center justify-center">
              <div className="absolute inset-0 rounded-full animate-breathe-slow opacity-20"
                style={{background:'radial-gradient(circle, rgba(91,140,90,0.4) 0%, transparent 70%)'}}/>
              <div className="absolute inset-2 rounded-full animate-breathe opacity-30"
                style={{background:'radial-gradient(circle, rgba(139,111,71,0.2) 0%, transparent 60%)'}}/>
              <div className="w-16 h-16 rounded-organic-lg warm-gradient flex items-center justify-center breathe-glow">
                <span className="text-4xl font-display text-moss/40" style={{fontStyle:'italic'}}>a</span>
              </div>
            </div>

            <h2 className="text-lg font-display font-medium text-earth-text mb-2 tracking-tight">
              {modeInfo?.label}
            </h2>
            <p className="text-sm text-earth-text-dim max-w-xs leading-relaxed font-light">
              {descriptions[activeMode] || 'Agent Studio — 会呼吸的 AI 工具'}
            </p>

            <button className="mt-6 px-5 py-2.5 rounded-organic-sm border border-moss/15 text-moss/70 text-sm
              hover:bg-moss/5 hover:border-moss/30 hover:text-moss
              organic-transition font-medium moss-press">
              + 开始生长
            </button>
          </div>
        </div>
      );
    }

    function StatusBar() {
      return (
        <footer className="h-7 flex items-center justify-between px-4 border-t border-soil-border bg-soil-surface/60 text-[10px] text-earth-text-dim/60 font-mono select-none shrink-0">
          <div className="flex items-center gap-3">
            <span className="flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-moss animate-breathe"/>
              Ready
            </span>
            <span className="opacity-30">·</span>
            <span>CLI: Claude Code v2.3.1</span>
          </div>
          <div className="flex items-center gap-3">
            <span>macOS</span>
            <span className="opacity-30">·</span>
            <span>42 memories</span>
          </div>
        </footer>
      );
    }

    function App() {
      const [activeMode, setActiveMode] = useState('templates');
      return (
        <div className="h-screen w-screen flex flex-col bg-soil-dark overflow-hidden">
          <Header/>
          <div className="flex flex-1 overflow-hidden">
            <ModeRail activeMode={activeMode} onModeChange={setActiveMode}/>
            <main className="flex-1 flex flex-col overflow-hidden relative">
              <EmptyWorkspace activeMode={activeMode}/>
            </main>
          </div>
          <StatusBar/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
