<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>息壤 · Agent Editor — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400&family=Newsreader:opsz,wght@6..72,200..800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'soil-dark':    '#1A1B1A',
          'soil-surface': '#242524',
          'soil-hover':   '#2A2B2A',
          'soil-border':  '#333433',
          primary:   '#5B8C5A',
          accent:    '#8B6F47',
          tertiary:  '#D4956B',
          'text-primary':   '#E8E6E0',
          'text-secondary': '#8C8A84',
          error:   '#C4705A',
          success: '#557C53',
          info:    '#5A8FA8',
        },
        fontFamily: {
          display: ['Newsreader', 'serif'],
          ui:      ['Inter', 'system-ui', 'sans-serif'],
          mono:    ['JetBrains Mono', 'monospace'],
        },
        borderRadius: {
          'organic-sm': '8px',
          'organic-md': '12px',
          'organic-lg': '16px',
          'organic-xl': '20px',
        },
        animation: {
          breathe: 'breathe 4s ease-in-out infinite',
          'pulse-active': 'pulseActive 3s ease-in-out infinite',
        },
        keyframes: {
          breathe: {
            '0%, 100%': { opacity: '0.6', boxShadow: '0 0 12px rgba(91,140,90,0.15)' },
            '50%':      { opacity: '1',   boxShadow: '0 0 24px rgba(91,140,90,0.3)' },
          },
          pulseActive: {
            '0%, 100%': { borderColor: 'rgba(91,140,90,0.25)' },
            '50%':      { borderColor: 'rgba(91,140,90,0.55)' },
          },
        },
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1A1B1A;
    color: #E8E6E0;
    height: 100vh;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1A1B1A; }
  ::-webkit-scrollbar-thumb { background: #333433; border-radius: 3px; }

  .earth-texture {
    background:
      radial-gradient(ellipse at 30% 40%, rgba(91,140,90,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 60%, rgba(139,111,71,0.06) 0%, transparent 55%),
      #1A1B1A;
  }
  .warm-gradient {
    background: linear-gradient(135deg, rgba(139,111,71,0.22) 0%, rgba(91,140,90,0.18) 50%, rgba(212,149,107,0.1) 100%);
  }
  .warm-gradient-light {
    background: linear-gradient(135deg, rgba(139,111,71,0.12) 0%, rgba(91,140,90,0.08) 100%);
  }
  .breathe-glow {
    box-shadow: 0 0 18px rgba(91,140,90,0.25), 0 0 36px rgba(91,140,90,0.08);
  }
  .organic-transition {
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .moss-press {
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .moss-press:active {
    transform: scale(0.94);
  }
  .agent-card {
    border: 1.5px solid #333433;
    border-radius: 14px;
    background: #242524;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .agent-card:hover {
    border-color: #444544;
    background: #2A2B2A;
  }
  .agent-card.active {
    border-color: #5B8C5A;
    animation: pulseActive 3s ease-in-out infinite;
  }
  .memory-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    background: rgba(91,140,90,0.1);
    border: 1px solid rgba(91,140,90,0.18);
    color: #8C8A84;
  }
  .memory-chip.key {
    background: rgba(139,111,71,0.1);
    border-color: rgba(139,111,71,0.18);
    color: #8B6F47;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

/* ─── Header ─── */
const EditorHeader = () => (
  <header className="flex items-center justify-between px-5 py-2"
    style={{ background: '#242524', borderBottom: '1px solid #333433', height: 48 }}>
    <div className="flex items-center gap-3">
      <span className="font-display text-lg font-medium" style={{ color: '#5B8C5A' }}>息壤</span>
      <span className="text-sm text-text-secondary font-ui">/ 代理编辑器</span>
    </div>
    <div className="flex items-center gap-2">
      <button className="moss-press px-3 py-1 rounded-organic-sm text-sm font-ui text-text-secondary
        hover:bg-soil-hover organic-transition border border-soil-border">
        导入
      </button>
      <button className="moss-press px-3 py-1 rounded-organic-sm text-sm font-ui text-text-secondary
        hover:bg-soil-hover organic-transition border border-soil-border">
        导出
      </button>
      <button className="moss-press px-3 py-1.5 rounded-organic-md text-sm font-ui font-semibold
        bg-primary text-[#1A1B1A] hover:opacity-90 organic-transition">
        保存
      </button>
    </div>
  </header>
);

/* ─── Agent List ─── */
const defaultAgents = [
  { id: 'a1', name: '检索代理', type: 'tool', icon: '🔍', status: 'active', lastEdited: '2 小时前' },
  { id: 'a2', name: '分析代理', type: 'llm', icon: '🧠', status: 'idle', lastEdited: '昨天' },
  { id: 'a3', name: '代码代理', type: 'tool', icon: '💻', status: 'draft', lastEdited: '3 天前' },
  { id: 'a4', name: '审查代理', type: 'llm', icon: '✅', status: 'active', lastEdited: '1 小时前' },
  { id: 'a5', name: '通知代理', type: 'output', icon: '📬', status: 'idle', lastEdited: '5 天前' },
];

const statusColors = {
  active: { bg: 'rgba(91,140,90,0.15)', text: '#5B8C5A', dot: '#5B8C5A', label: '活跃' },
  idle:   { bg: 'rgba(51,52,51,0.4)', text: '#8C8A84', dot: '#8C8A84', label: '空闲' },
  draft:  { bg: 'rgba(139,111,71,0.12)', text: '#8B6F47', dot: '#8B6F47', label: '草稿' },
};

const AgentList = ({ agents, selectedId, onSelect, onCreate }) => (
  <aside className="flex flex-col"
    style={{ width: 280, background: '#1E1F1E', borderRight: '1px solid #333433' }}>
    <div className="flex items-center justify-between px-4 py-3" style={{ borderBottom: '1px solid #333433' }}>
      <h3 className="text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary">代理列表</h3>
      <button onClick={onCreate}
        className="moss-press text-xs px-2 py-1 rounded-organic-sm bg-primary/15 text-primary
          hover:bg-primary/25 organic-transition">
        + 新建
      </button>
    </div>
    <div className="flex-1 overflow-y-auto p-2 space-y-1.5">
      {agents.map(agent => {
        const sc = statusColors[agent.status] || statusColors.idle;
        const isActive = agent.id === selectedId;
        return (
          <div key={agent.id} onClick={() => onSelect(agent.id)}
            className={`agent-card cursor-pointer px-3 py-2.5 ${isActive ? 'active warm-gradient-light' : ''}`}>
            <div className="flex items-center gap-2.5">
              <span className="text-xl">{agent.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-ui font-medium text-text-primary truncate">{agent.name}</div>
                <div className="text-[11px] text-text-secondary mt-0.5">{agent.lastEdited}</div>
              </div>
            </div>
            <div className="flex items-center gap-2 mt-2">
              <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-mono"
                style={{ background: sc.bg, color: sc.text }}>
                <span className="w-1.5 h-1.5 rounded-full" style={{ background: sc.dot,
                  animation: agent.status === 'active' ? 'breathe 4s ease-in-out infinite' : 'none' }} />
                {sc.label}
              </span>
              <span className="text-[10px] text-text-secondary font-mono uppercase">{agent.type}</span>
            </div>
          </div>
        );
      })}
    </div>
  </aside>
);

/* ─── Editor Form ─── */
const EditorForm = ({ agent, onUpdate, onDelete }) => {
  if (!agent) {
    return (
      <div className="flex-1 flex items-center justify-center text-text-secondary">
        <div className="text-center">
          <div className="text-4xl mb-3">🌱</div>
          <div className="text-sm">选择一个代理进行编辑</div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex-1 overflow-y-auto p-6">
      {/* Agent header card */}
      <div className="warm-gradient rounded-organic-lg p-5 mb-6">
        <div className="flex items-center gap-3 mb-3">
          <span className="text-3xl">{agent.icon}</span>
          <div>
            <input value={agent.name}
              onChange={e => onUpdate('name', e.target.value)}
              className="text-xl font-display font-medium text-text-primary bg-transparent
                border-b border-transparent hover:border-soil-border focus:border-primary focus:outline-none
                organic-transition w-full" />
            <div className="text-xs text-text-secondary font-mono mt-1">ID: {agent.id}</div>
          </div>
          <span className="ml-auto px-2.5 py-1 rounded-full text-xs"
            style={{ background: statusColors[agent.status]?.bg || 'rgba(51,52,51,0.4)',
              color: statusColors[agent.status]?.text || '#8C8A84' }}>
            {statusColors[agent.status]?.label || '空闲'}
          </span>
        </div>
      </div>

      {/* Form fields */}
      <div className="space-y-5">
        <div>
          <label className="block text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary mb-2">类型</label>
          <select value={agent.type}
            onChange={e => onUpdate('type', e.target.value)}
            className="w-full px-3 py-2.5 rounded-organic-sm text-sm font-ui text-text-primary
              bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition">
            <option value="llm">LLM 代理</option>
            <option value="tool">工具代理</option>
            <option value="output">输出代理</option>
            <option value="input">输入代理</option>
          </select>
        </div>

        <div>
          <label className="block text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary mb-2">系统提示词</label>
          <textarea rows={4}
            value={agent.systemPrompt || ''}
            onChange={e => onUpdate('systemPrompt', e.target.value)}
            placeholder="定义代理的行为、角色和约束…"
            className="w-full px-3 py-2.5 rounded-organic-sm text-sm font-mono text-text-primary
              bg-soil-dark border border-soil-border focus:outline-none focus:border-primary
              organic-transition resize-none leading-relaxed" />
        </div>

        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary mb-2">模型</label>
            <select value={agent.model || 'Claude Opus 4'}
              onChange={e => onUpdate('model', e.target.value)}
              className="w-full px-3 py-2.5 rounded-organic-sm text-sm font-ui text-text-primary
                bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition">
              <option>Claude Opus 4</option>
              <option>Claude Sonnet 4</option>
              <option>GPT-4o</option>
            </select>
          </div>
          <div>
            <label className="block text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary mb-2">温度</label>
            <div className="flex items-center gap-2">
              <input type="range" min="0" max="1" step="0.1"
                value={agent.temperature || 0.7}
                onChange={e => onUpdate('temperature', parseFloat(e.target.value))}
                className="flex-1 accent-[#5B8C5A]" />
              <span className="text-sm font-mono text-text-primary w-8 text-right">{agent.temperature || 0.7}</span>
            </div>
          </div>
        </div>

        <div>
          <label className="block text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary mb-2">工具</label>
          <div className="flex flex-wrap gap-2">
            {['web_search', 'code_exec', 'file_read', 'api_call', 'database'].map(tool => (
              <label key={tool} className="flex items-center gap-1.5 px-3 py-1.5 rounded-organic-sm
                text-xs font-mono cursor-pointer organic-transition"
                style={{
                  background: (agent.tools || []).includes(tool) ? 'rgba(91,140,90,0.12)' : '#1A1B1A',
                  border: (agent.tools || []).includes(tool) ? '1px solid rgba(91,140,90,0.3)' : '1px solid #333433',
                  color: (agent.tools || []).includes(tool) ? '#5B8C5A' : '#8C8A84',
                }}>
                <input type="checkbox" checked={(agent.tools || []).includes(tool)}
                  onChange={e => {
                    const tools = agent.tools || [];
                    const next = e.target.checked ? [...tools, tool] : tools.filter(t => t !== tool);
                    onUpdate('tools', next);
                  }}
                  className="hidden" />
                {tool}
              </label>
            ))}
          </div>
        </div>

        <div className="flex gap-3 pt-2">
          <button className="moss-press px-4 py-2 rounded-organic-md text-sm font-ui font-semibold
            bg-primary text-[#1A1B1A] hover:opacity-90 organic-transition">
            保存更改
          </button>
          <button onClick={onDelete}
            className="moss-press px-4 py-2 rounded-organic-md text-sm font-ui
            bg-error/12 text-error border border-error/20 hover:bg-error/20 organic-transition">
            删除代理
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── Memory Panel ─── */
const MemoryPanel = ({ agent }) => {
  const defaultMemories = [
    { id: 'm1', key: 'user_name', value: '张工程师', type: 'fact' },
    { id: 'm2', key: 'preferred_lang', value: 'Python, TypeScript', type: 'preference' },
    { id: 'm3', key: 'project_context', value: 'Agent Studio 工作流引擎', type: 'context' },
    { id: 'm4', key: 'last_session', value: '2026-06-13T10:30:00', type: 'meta' },
    { id: 'm5', key: 'output_format', value: 'Markdown with code blocks', type: 'preference' },
};

  return (
    <aside className="flex flex-col"
      style={{ width: 280, background: '#1E1F1E', borderLeft: '1px solid #333433' }}>
      <div className="px-4 py-3" style={{ borderBottom: '1px solid #333433' }}>
        <h3 className="text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary">记忆存储</h3>
      </div>
      <div className="flex-1 overflow-y-auto p-3 space-y-2">
        {!agent ? (
          <div className="text-center text-text-secondary text-xs mt-8">选择一个代理查看记忆</div>
        ) : (
          <>
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] text-text-secondary font-mono">{defaultMemories.length} 条记忆</span>
              <button className="moss-press text-[10px] px-2 py-0.5 rounded-organic-sm bg-primary/10 text-primary
                hover:bg-primary/20 organic-transition">+ 添加</button>
            </div>
            {defaultMemories.map(m => (
              <div key={m.id} className="p-3 rounded-organic-sm organic-transition"
                style={{ background: '#1A1B1A', border: '1px solid #333433' }}>
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="memory-chip key">{m.key}</span>
                  <span className="text-[10px] text-text-secondary font-mono ml-auto">{m.type}</span>
                </div>
                <div className="text-xs text-text-primary font-mono break-all">{m.value}</div>
              </div>
            ))}
          </>
        )}
      </div>
      <div className="p-3" style={{ borderTop: '1px solid #333433' }}>
        <div className="warm-gradient rounded-organic-md p-3">
          <div className="text-[10px] text-text-secondary uppercase tracking-wider mb-1">记忆摘要</div>
          <div className="text-xs text-text-primary">
            {agent ? `${defaultMemories.length} 条记忆，包含 ${defaultMemories.filter(m => m.type === 'preference').length} 条偏好` : '未选择代理'}
          </div>
        </div>
      </div>
    </aside>
  );
};

/* ─── Main App ─── */
const AgentEditorApp = () => {
  const [agents, setAgents] = useState(defaultAgents);
  const [selectedId, setSelectedId] = useState('a1');

  const selectedAgent = agents.find(a => a.id === selectedId);

  const handleSelect = useCallback((id) => {
    setSelectedId(id);
  }, []);

  const handleCreate = useCallback(() => {
    const newAgent = {
      id: `a${Date.now()}`,
      name: '新代理',
      type: 'tool',
      icon: '⚙️',
      status: 'draft',
      lastEdited: '刚刚',
    };
    setAgents(prev => [newAgent, ...prev]);
    setSelectedId(newAgent.id);
  }, []);

  const handleUpdate = useCallback((field, value) => {
    setAgents(prev => prev.map(a =>
      a.id === selectedId ? { ...a, [field]: value, lastEdited: '刚刚' } : a
    ));
  }, [selectedId]);

  const handleDelete = useCallback(() => {
    if (!selectedId) return;
    setAgents(prev => prev.filter(a => a.id !== selectedId));
    setSelectedId(null);
  }, [selectedId]);

  return (
    <div className="flex flex-col h-screen earth-texture">
      <EditorHeader />
      <div className="flex flex-1 overflow-hidden">
        <AgentList agents={agents} selectedId={selectedId}
          onSelect={handleSelect} onCreate={handleCreate} />
        <EditorForm agent={selectedAgent} onUpdate={handleUpdate} onDelete={handleDelete} />
        <MemoryPanel agent={selectedAgent} />
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<AgentEditorApp />);
</script>
</body>
</html>
