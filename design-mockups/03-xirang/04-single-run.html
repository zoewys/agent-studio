<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>息壤 · Single Run — Agent Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400&family=Newsreader:opsz,wght@6..72,200..800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'soil-dark':    '#1A1B1A',
          'soil-surface': '#242524',
          'soil-hover':   '#2A2B2A',
          'soil-border':  '#333433',
          primary:   '#5B8C5A',
          accent:    '#8B6F47',
          tertiary:  '#D4956B',
          'text-primary':   '#E8E6E0',
          'text-secondary': '#8C8A84',
          error:   '#C4705A',
          success: '#557C53',
          info:    '#5A8FA8',
        },
        fontFamily: {
          display: ['Newsreader', 'serif'],
          ui:      ['Inter', 'system-ui', 'sans-serif'],
          mono:    ['JetBrains Mono', 'monospace'],
        },
        borderRadius: {
          'organic-sm': '8px',
          'organic-md': '12px',
          'organic-lg': '16px',
          'organic-xl': '20px',
        },
        animation: {
          breathe: 'breathe 4s ease-in-out infinite',
          pulse: 'breathe 2s ease-in-out infinite',
        },
        keyframes: {
          breathe: {
            '0%, 100%': { opacity: '0.6' },
            '50%':      { opacity: '1' },
          },
        },
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1A1B1A;
    color: #E8E6E0;
    height: 100vh;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1A1B1A; }
  ::-webkit-scrollbar-thumb { background: #333433; border-radius: 3px; }

  .earth-texture {
    background:
      radial-gradient(ellipse at 20% 30%, rgba(91,140,90,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(139,111,71,0.07) 0%, transparent 55%),
      #1A1B1A;
  }
  .warm-gradient {
    background: linear-gradient(135deg, rgba(139,111,71,0.2) 0%, rgba(91,140,90,0.15) 50%, rgba(212,149,107,0.1) 100%);
  }
  .breathe-glow {
    box-shadow: 0 0 18px rgba(91,140,90,0.25), 0 0 36px rgba(91,140,90,0.08);
  }
  .organic-transition {
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .moss-press {
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .moss-press:active {
    transform: scale(0.94);
  }
  .breathing-indicator {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #5B8C5A;
    animation: breathe 2s ease-in-out infinite;
  }
  .breathing-indicator.active {
    background: #5B8C5A;
    box-shadow: 0 0 10px rgba(91,140,90,0.5);
    animation: breathe 1.5s ease-in-out infinite;
  }
  .breathing-indicator.done {
    background: #557C53;
    animation: none;
  }
  .breathing-indicator.error {
    background: #C4705A;
    animation: none;
  }
  .transcript-bubble {
    border-radius: 16px;
    padding: 12px 16px;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.6;
  }
  .transcript-bubble.user {
    margin-left: auto;
    background: #2A2B2A;
    border: 1px solid #333433;
    border-bottom-right-radius: 6px;
  }
  .transcript-bubble.agent {
    margin-right: auto;
    background: linear-gradient(135deg, rgba(91,140,90,0.12), rgba(36,37,36,0.9));
    border: 1px solid rgba(91,140,90,0.2);
    border-bottom-left-radius: 6px;
  }
  .code-block {
    background: #1A1B1A;
    border: 1px solid #333433;
    border-radius: 10px;
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: pre-wrap;
    color: #8C8A84;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ─── Header ─── */
const RunHeader = ({ status, startedAt }) => (
  <header className="flex items-center justify-between px-5 py-2"
    style={{ background: '#242524', borderBottom: '1px solid #333433', height: 48 }}>
    <div className="flex items-center gap-3">
      <span className="font-display text-lg font-medium" style={{ color: '#5B8C5A' }}>息壤</span>
      <span className="text-sm text-text-secondary font-ui">/ 单次运行</span>
      <div className="flex items-center gap-1.5 ml-2">
        <span className={`breathing-indicator ${status}`} />
        <span className="text-xs font-mono text-text-secondary">
          {status === 'active' ? '运行中…' : status === 'done' ? '已完成' : status === 'error' ? '出错' : '就绪'}
        </span>
      </div>
    </div>
    <div className="flex items-center gap-2 text-sm font-mono text-text-secondary">
      {startedAt && <span>{startedAt}</span>}
      <span className="px-2 py-0.5 rounded-full text-xs"
        style={{ background: status === 'active' ? 'rgba(91,140,90,0.15)' : 'rgba(51,52,51,0.5)', color: status === 'active' ? '#5B8C5A' : '#8C8A84' }}>
        {status === 'active' ? '进行中' : status === 'done' ? '成功' : status === 'error' ? '失败' : '等待'}
      </span>
      <div className="w-px h-5 bg-soil-border mx-1" />
      <button className="moss-press px-3 py-1 rounded-organic-sm text-sm font-ui text-text-secondary
        hover:bg-soil-hover organic-transition border border-soil-border">⚙️</button>
    </div>
  </header>
);

/* ─── Config Panel ─── */
const ConfigPanel = ({ config, onConfigChange, isRunning }) => {
  return (
    <div className="p-4 space-y-4 overflow-y-auto" style={{ width: 280, background: '#1E1F1E', borderRight: '1px solid #333433' }}>
      <h3 className="text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary mb-3">运行配置</h3>

      <div>
        <label className="block text-xs text-text-secondary mb-1.5">工作流</label>
        <select value={config.workflow} onChange={e => onConfigChange('workflow', e.target.value)}
          disabled={isRunning}
          className="w-full px-3 py-2 rounded-organic-sm text-sm font-ui text-text-primary
            bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition
            disabled:opacity-50">
          <option>检索与分析流程</option>
          <option>代码审查流程</option>
          <option>内容生成流程</option>
        </select>
      </div>

      <div>
        <label className="block text-xs text-text-secondary mb-1.5">模型</label>
        <select value={config.model} onChange={e => onConfigChange('model', e.target.value)}
          disabled={isRunning}
          className="w-full px-3 py-2 rounded-organic-sm text-sm font-ui text-text-primary
            bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition
            disabled:opacity-50">
          <option>Claude Opus 4</option>
          <option>Claude Sonnet 4</option>
          <option>GPT-4o</option>
        </select>
      </div>

      <div>
        <label className="block text-xs text-text-secondary mb-1.5">温度</label>
        <div className="flex items-center gap-3">
          <input type="range" min="0" max="1" step="0.1" value={config.temperature}
            onChange={e => onConfigChange('temperature', parseFloat(e.target.value))}
            disabled={isRunning}
            className="flex-1 accent-[#5B8C5A]" />
          <span className="text-sm font-mono text-text-primary w-8 text-right">{config.temperature}</span>
        </div>
      </div>

      <div>
        <label className="block text-xs text-text-secondary mb-1.5">最大步数</label>
        <input type="number" value={config.maxSteps} min={1} max={50}
          onChange={e => onConfigChange('maxSteps', parseInt(e.target.value)||5)}
          disabled={isRunning}
          className="w-full px-3 py-2 rounded-organic-sm text-sm font-mono text-text-primary
            bg-soil-dark border border-soil-border focus:outline-none focus:border-primary organic-transition
            disabled:opacity-50" />
      </div>

      <div className="flex items-center gap-2">
        <input type="checkbox" id="stream" checked={config.stream}
          onChange={e => onConfigChange('stream', e.target.checked)}
          disabled={isRunning} className="accent-[#5B8C5A]" />
        <label htmlFor="stream" className="text-sm text-text-secondary font-ui">流式输出</label>
      </div>

      <div className="pt-3" style={{ borderTop: '1px solid #333433' }}>
        <button onClick={() => onConfigChange('run', true)}
          disabled={isRunning}
          className="moss-press w-full py-2.5 rounded-organic-md text-sm font-ui font-semibold
            bg-primary text-[#1A1B1A] hover:opacity-90 disabled:opacity-40 organic-transition">
          {isRunning ? '⏳ 运行中…' : '▶ 开始运行'}
        </button>
        {isRunning && (
          <button onClick={() => onConfigChange('stop', true)}
            className="moss-press w-full mt-2 py-2 rounded-organic-md text-sm font-ui
              bg-error/15 text-error border border-error/25 hover:bg-error/25 organic-transition">
            ⏹ 停止
          </button>
        )}
      </div>

      <div className="warm-gradient rounded-organic-md p-3 mt-3">
        <div className="text-xs text-text-secondary mb-1">资源用量</div>
        <div className="flex justify-between text-xs font-mono">
          <span className="text-text-primary">Tokens: 2.4k / 200k</span>
          <span className="text-text-secondary">1.2%</span>
        </div>
        <div className="mt-1.5 h-1 rounded-full bg-soil-dark overflow-hidden">
          <div className="h-full rounded-full organic-transition" style={{ width: '1.2%', background: 'linear-gradient(90deg, #5B8C5A, #8B6F47)' }} />
        </div>
      </div>
    </div>
  );
};

/* ─── Transcript ─── */
const initialMessages = [
  { id: 1, role: 'user', content: '请分析这份销售数据并找出关键趋势。', time: '14:32:01' },
  { id: 2, role: 'agent', type: 'tool-use', content: '调用数据检索工具，查询最近6个月的销售记录…', time: '14:32:03' },
  { id: 3, role: 'agent', type: 'code', content: 'import pandas as pd\ndf = pd.read_csv("sales.csv")\ndf["month"] = pd.to_datetime(df["date"]).dt.month\ntrend = df.groupby("month")["revenue"].sum()', time: '14:32:05', language: 'python' },
  { id: 4, role: 'agent', type: 'text', content: '根据数据分析，我发现了以下三个关键趋势：\n\n1. **季节性增长**：第三季度收入较第二季度增长了 23%，主要来自华东地区的产品销售。\n2. **客户留存率提升**：复购率从 34% 上升至 41%，说明新推出的会员计划效果显著。\n3. **退货率下降**：退货率从 6.2% 降至 4.8%，产品质量和客户满意度在持续改善。\n\n需要我针对这些趋势做进一步的分析吗？', time: '14:32:12' },
];

const TranscriptMessage = ({ msg }) => {
  if (msg.role === 'user') {
    return (
      <div className="flex mb-4">
        <div className="transcript-bubble user">
          <div className="text-sm text-text-primary">{msg.content}</div>
          <div className="text-[10px] text-text-secondary mt-1 font-mono text-right">{msg.time}</div>
        </div>
      </div>
    );
  }

  if (msg.type === 'code') {
    return (
      <div className="flex mb-4">
        <div className="transcript-bubble agent" style={{ maxWidth: '92%' }}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xs font-mono px-1.5 py-0.5 rounded text-[#8B6F47]" style={{ background: 'rgba(139,111,71,0.12)' }}>CODE</span>
            <span className="text-[10px] text-text-secondary font-mono">{msg.language}</span>
          </div>
          <div className="code-block">{msg.content}</div>
          <div className="text-[10px] text-text-secondary mt-2 font-mono text-right">{msg.time}</div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex mb-4">
      <div className="transcript-bubble agent">
        {msg.type === 'tool-use' && (
          <div className="flex items-center gap-2 mb-1">
            <span className="breathing-indicator active" style={{ width: 6, height: 6 }} />
            <span className="text-xs font-mono text-accent">TOOL</span>
          </div>
        )}
        <div className="text-sm text-text-primary" style={{ whiteSpace: 'pre-wrap' }}>{msg.content}</div>
        <div className="text-[10px] text-text-secondary mt-1 font-mono text-right">{msg.time}</div>
      </div>
    </div>
  );
};

const Transcript = ({ messages, isRunning }) => (
  <div className="flex-1 flex flex-col overflow-hidden">
    <div className="flex items-center justify-between px-4 py-2" style={{ borderBottom: '1px solid #333433' }}>
      <h3 className="text-xs font-ui font-semibold uppercase tracking-wider text-text-secondary">运行记录</h3>
      <span className="text-[10px] font-mono text-text-secondary">{messages.length} 条消息</span>
    </div>
    <div className="flex-1 overflow-y-auto p-4 earth-texture">
      {messages.map(msg => (
        <TranscriptMessage key={msg.id} msg={msg} />
      ))}
      {isRunning && (
        <div className="flex mb-4">
          <div className="transcript-bubble agent flex items-center gap-2" style={{ maxWidth: 200 }}>
            <span className="breathing-indicator active" />
            <span className="text-sm text-text-secondary animate-breathe">思考中…</span>
          </div>
        </div>
      )}
    </div>
  </div>
);

/* ─── ComposerBar ─── */
const ComposerBar = ({ isRunning, onSend, inputRef }) => {
  const [composerText, setComposerText] = useState('');

  const handleSend = () => {
    if (!composerText.trim() || isRunning) return;
    onSend(composerText);
    setComposerText('');
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  return (
    <div className="flex items-end gap-2 px-4 py-3"
      style={{ background: '#242524', borderTop: '1px solid #333433' }}>
      <button className="moss-press p-2 rounded-organic-sm text-text-secondary
        hover:bg-soil-hover organic-transition" title="附加文件">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <div className="flex-1 relative">
        <textarea
          ref={inputRef}
          value={composerText}
          onChange={e => setComposerText(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder="输入消息… (Enter 发送, Shift+Enter 换行)"
          rows={1}
          disabled={isRunning}
          className="w-full px-4 py-2.5 rounded-organic-lg text-sm font-ui text-text-primary
            bg-soil-dark border border-soil-border focus:outline-none focus:border-primary
            organic-transition resize-none disabled:opacity-50"
          style={{ minHeight: 42, maxHeight: 120 }} />
      </div>
      <button onClick={handleSend} disabled={isRunning || !composerText.trim()}
        className="moss-press p-2.5 rounded-organic-md text-[#1A1B1A]
          disabled:opacity-30 organic-transition"
        style={{ background: isRunning ? '#333433' : '#5B8C5A' }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  );
};

/* ─── Main App ─── */
const SingleRunApp = () => {
  const [config, setConfig] = useState({
    workflow: '检索与分析流程',
    model: 'Claude Opus 4',
    temperature: 0.7,
    maxSteps: 10,
    stream: true,
  });
  const [status, setStatus] = useState('idle');
  const [messages, setMessages] = useState(initialMessages);
  const [startedAt, setStartedAt] = useState(null);
  const inputRef = useRef(null);

  const handleConfigChange = useCallback((key, value) => {
    if (key === 'run') {
      setStatus('active');
      setStartedAt(new Date().toLocaleTimeString('zh-CN', { hour12: false }));
      // simulate messages coming in
      let i = 0;
      const simMessages = [
        { role: 'agent', type: 'tool-use', content: '开始执行检索与分析流程…已连接数据源。', time: new Date().toLocaleTimeString('zh-CN', { hour12: false }) },
        { role: 'agent', type: 'text', content: '正在进行深度分析，这可能需要几秒钟…\n\n分析完成后，将为您呈现完整的结果报告。', time: new Date().toLocaleTimeString('zh-CN', { hour12: false }) },
      ];
      simMessages.forEach((m, idx) => {
        setTimeout(() => {
          setMessages(prev => [...prev, { ...m, id: Date.now() + idx }]);
        }, 1500 * (idx + 1));
      });
      setTimeout(() => setStatus('done'), 4000);
      return;
    }
    if (key === 'stop') {
      setStatus('idle');
      return;
    }
    setConfig(prev => ({ ...prev, [key]: value }));
  }, []);

  const handleSend = useCallback((text) => {
    const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    setMessages(prev => [...prev, { id: Date.now(), role: 'user', content: text, time: now }]);
    setStatus('active');
    setTimeout(() => {
      setMessages(prev => [...prev, {
        id: Date.now() + 10,
        role: 'agent', type: 'text',
        content: '收到您的消息。基于当前的配置，我将按照工作流逐步执行分析任务。',
        time: new Date().toLocaleTimeString('zh-CN', { hour12: false }),
      }]);
      setStatus('done');
    }, 2000);
  }, []);

  return (
    <div className="flex flex-col h-screen">
      <RunHeader status={status} startedAt={startedAt} />
      <div className="flex flex-1 overflow-hidden">
        <ConfigPanel config={config} onConfigChange={handleConfigChange}
          isRunning={status === 'active'} />
        <div className="flex-1 flex flex-col min-w-0">
          <Transcript messages={messages} isRunning={status === 'active'} />
          <ComposerBar isRunning={status === 'active'} onSend={handleSend} inputRef={inputRef} />
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SingleRunApp />);
</script>
</body>
</html>
